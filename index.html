<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#04050a;--s1:#090b12;--s2:#0e1019;
  --bd:#161a28;--brt:#1f2436;
  --em:#10b981;--em-dim:rgba(16,185,129,0.07);--em-mid:rgba(16,185,129,0.16);--em-glow:rgba(16,185,129,0.3);
  --tx:#dce0ec;--mu:#404660;--mu2:#1f2436;--red:#e05a6a;
  --mono:'DM Mono',monospace;--serif:'DM Serif Display',serif;--sans:'Noto Sans JP',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--sans);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

/* range input */
input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--brt);border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--em);border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 12px var(--em-glow);cursor:pointer;}

/* date input */
input[type=date]{color-scheme:dark;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;font-family:var(--mono);font-size:13px;color:var(--em);outline:none;transition:border-color 0.2s;}
input[type=date]:focus{border-color:var(--em);}

/* scrollbar */
.scroll::-webkit-scrollbar{display:none;}
.scroll{scrollbar-width:none;}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes glow{0%,100%{opacity:0.3;}50%{opacity:0.7;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
@keyframes popIn{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
.fade-up{animation:fadeUp 0.3s ease-out forwards;}
.slide-in{animation:slideIn 0.28s ease-out forwards;}
.pop-in{animation:popIn 0.22s cubic-bezier(0.34,1.4,0.64,1) forwards;}
.spin{animation:spin 1s linear infinite;}
.glow-pulse{animation:glow 2s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
</style>

// ── MAIN APP ──────────────────────────────────────────────────────────────
const App = () => {
  const todayStr = useMemo(() => toJSTDateStr(), []);
  const [meals, setMeals] = useState([]);       // 全履歴
  const [tab, setTab] = useState('log');
  const [syncing, setSyncing] = useState(false);
  const [toast, setToast] = useState('');
  const [selDate, setSelDate] = useState(todayStr);
  const [mealType, setMealType] = useState('昼');
  const [mainMenu, setMainMenu] = useState('');
  const [protein, setProtein] = useState(25);
  const [editMeal, setEditMeal] = useState(null);
  const [delMeal, setDelMeal] = useState(null);
  const [effect, setEffect] = useState('all');
  const [shuffleSeed, setShuffleSeed] = useState(0);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),2800); };

  // ── FETCH (初回 + 手動同期) ──────────────────────────────────────────
  const fetchData = useCallback(async () => {
    setSyncing(true);
    try {
      const r = await fetch(GAS);
      const data = await r.json();
      // GASが {history:[...]} または 配列 どちらでも対応
      const raw = Array.isArray(data) ? data : (data.history || []);
      setMeals(raw.map(m => ({
        ...m,
        _id: m._id || genId(),
        protein: Number(m.protein) || 0,
      })));
      showToast('SYNC COMPLETE');
    } catch(e) {
      showToast('OFFLINE MODE');
    } finally {
      setSyncing(false);
    }
  }, []);

  useEffect(() => { fetchData(); }, []);

  // ── 今日のログ ────────────────────────────────────────────────────────
  const filteredMeals = useMemo(() => {
    return meals.filter(m => {
      if (!m.timestamp) return false;
      const d = m.timestamp.replace(/\//g,'-').split(/[T ]/)[0];
      return d === selDate;
    }).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
  }, [meals, selDate]);

  const totalP = useMemo(() => filteredMeals.reduce((s,m) => s + m.protein, 0), [filteredMeals]);
  const gap = Math.max(0, TARGET - totalP);
  const pct = Math.min(totalP / TARGET * 100, 100);

  // ── SAVE (楽観的更新) ─────────────────────────────────────────────────
  const handleSave = async () => {
    if (!mainMenu.trim()) return;
    if (selDate > todayStr) { showToast('未来の日付は登録できません'); return; }

    const now = new Date();
    const timeStr = now.toTimeString().split(' ')[0];
    const ts = `${selDate}T${timeStr}`;
    const newMeal = {
      _id: genId(),
      timestamp: ts,
      type: mealType,
      main: mainMenu.trim(),
      protein: parseFloat(protein),
    };

    // ① 即座にローカルstateに反映 → 画面がすぐ更新される
    setMeals(prev => [newMeal, ...prev]);
    setMainMenu('');
    setProtein(25);
    showToast('SAVED');

    // ② バックグラウンドでGASに送信
    try {
      await fetch(GAS, { method:'POST', mode:'no-cors',
        body: JSON.stringify({ _action:'save', ...newMeal }) });
    } catch(e) {
      showToast('GAS SYNC FAILED');
    }
  };

  // ── EDIT SAVE ─────────────────────────────────────────────────────────
  const handleEditSave = async (updated) => {
    // ① 即座にローカル更新
    setMeals(prev => prev.map(m => m._id === updated._id ? {...m,...updated} : m));
    setEditMeal(null);
    showToast('UPDATED');

    // ② バックグラウンドでGAS
    try {
      await fetch(GAS, { method:'POST', mode:'no-cors',
        body: JSON.stringify({ _action:'update', ...updated }) });
    } catch(e) {}
  };

  // ── DELETE ────────────────────────────────────────────────────────────
  const handleDelete = async () => {
    const m = delMeal;
    // ① 即座にローカル削除
    setMeals(prev => prev.filter(x => x._id !== m._id));
    setDelMeal(null);
    showToast('DELETED');

    // ② バックグラウンドでGAS
    try {
      await fetch(GAS, { method:'POST', mode:'no-cors',
        body: JSON.stringify({ _action:'delete', timestamp: m.timestamp }) });
    } catch(e) {}
  };

  // ── 朝セット ──────────────────────────────────────────────────────────
  const recordBreakfast = async () => {
    if (selDate > todayStr) return;
    const now = new Date();
    const ts = `${selDate}T${now.toTimeString().split(' ')[0]}`;
    const newMeal = { _id:genId(), timestamp:ts, type:'朝', main:'朝セット', protein:45 };
    setMeals(prev => [newMeal, ...prev]);
    showToast('朝セット SAVED');
    try {
      await fetch(GAS, { method:'POST', mode:'no-cors',
        body: JSON.stringify({ _action:'save', ...newMeal }) });
    } catch(e) {}
  };

  // ── SUGGEST ───────────────────────────────────────────────────────────
  const suggestions = useMemo(() => {
    if (gap <= 0) return [];
    const now = new Date();
    const mon = now.getMonth(), dow = now.getDay();
    const ago7 = Date.now() - 7*864e5;
    const recent = meals.filter(m=>new Date(m.timestamp).getTime()>ago7).map(m=>m.main.toLowerCase());
    let pool = MENUS.filter(m => {
      const nm = m.main.toLowerCase();
      const notRecent = !recent.some(r=>nm.includes(r)||r.includes(nm));
      const effOk = effect==='all'||m.cat===effect;
      return notRecent && m.season.includes(mon) && m.dow.includes(dow) && effOk;
    });
    if(pool.length<3) pool = MENUS.filter(m=>effect==='all'||m.cat===effect);
    if(pool.length<3) pool = [...MENUS];
    // shuffleSeedが変わると並び替え
    const seeded = [...pool].map((m,i)=>({m,r:Math.sin(shuffleSeed*997+i*31)*10000%1}));
    seeded.sort((a,b)=>a.r-b.r);
    return seeded.slice(0,3).map(x=>x.m);
  }, [meals, gap, effect, shuffleSeed]);

  // ── STATS (7日グラフ) ──────────────────────────────────────────────────
  const weekDays = useMemo(() => {
    return Array.from({length:7},(_,i)=>{
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      const ds = toJSTDateStr(d);
      const tot = meals.filter(m=>m.timestamp?.replace(/\//g,'-').split(/[T ]/)[0]===ds)
        .reduce((s,m)=>s+m.protein,0);
      return {lbl:DAY_JP[d.getDay()],tot,isToday:ds===todayStr,ok:tot>=TARGET,has:tot>0};
    });
  },[meals,todayStr]);

  // SVG line chart
  const chartSvg = useMemo(()=>{
    const W=320,H=120,PL=30,PR=8,PT=18,PB=26;
    const cW=W-PL-PR,cH=H-PT-PB;
    const maxV=Math.max(...weekDays.map(d=>d.tot),TARGET*1.1,10);
    const xStep=cW/6;
    const grids=[0,Math.round(TARGET/2),TARGET].map(v=>{
      const y=PT+cH-(v/maxV)*cH;
      const isT=v===TARGET;
      return `<line stroke="${isT?'rgba(16,185,129,0.22)':'#161a28'}" stroke-width="1" ${isT?'stroke-dasharray="4,3"':''} x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}"/>
      <text font-family="DM Mono,monospace" font-size="7" fill="${isT?'rgba(16,185,129,0.5)':'#404660'}" text-anchor="end" x="${PL-3}" y="${(y+2.5).toFixed(1)}">${v}</text>`;
    }).join('');
    const pts=weekDays.map((d,i)=>({x:PL+i*xStep,y:PT+cH-(d.tot/maxV)*cH,d}));
    const areaD=pts.map((p,i)=>i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
      +` L${pts[6].x.toFixed(1)},${(PT+cH).toFixed(1)} L${PL},${(PT+cH).toFixed(1)} Z`;
    const lineD=pts.map((p,i)=>i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    const dots=pts.map(p=>`
      ${p.d.has?`<text font-family="DM Mono,monospace" font-size="7" fill="${p.d.ok?'#10b981':'#404660'}" text-anchor="middle" x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}">${p.d.tot.toFixed(0)}</text>`:''}
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${p.d.isToday?4.5:3}"
        fill="${p.d.ok?'#10b981':p.d.has?'#1f2436':'#0d0f18'}"
        stroke="#10b981" stroke-width="1.5"
        ${p.d.isToday?'filter="drop-shadow(0 0 4px #10b981)"':''}/>
      <text font-family="DM Mono,monospace" font-size="8" fill="${p.d.isToday?'#10b981':'#404660'}" text-anchor="middle" x="${p.x.toFixed(1)}" y="${(PT+cH+14).toFixed(1)}">${p.d.lbl}</text>`).join('');
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;overflow:visible">
      <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/><stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
      </linearGradient></defs>
      ${grids}<path fill="url(#ag)" d="${areaD}"/>
      <path fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="${lineD}"/>
      ${dots}</svg>`;
  },[weekDays]);

  const wd=weekDays.filter(d=>d.has);
  const avg=wd.length?(wd.reduce((s,d)=>s+d.tot,0)/wd.length):0;
  const streak=weekDays.slice().reverse().reduce((s,d)=>{if(s.done)return s;if(d.ok)return{...s,c:s.c+1};return{...s,done:true}},{c:0,done:false}).c;
  const best=Math.max(...weekDays.map(d=>d.tot),0);

  // ── DATE NAV ──────────────────────────────────────────────────────────
  const isToday = selDate === todayStr;
  const selDateObj = new Date(selDate+'T12:00:00');
  const selDateLbl = `${selDateObj.getMonth()+1}/${selDateObj.getDate()}(${DAY_JP[selDateObj.getDay()]})`;
  const moveDate = (n) => {
    const d = new Date(selDate+'T12:00:00'); d.setDate(d.getDate()+n);
    if(toJSTDateStr(d)>todayStr) return;
    setSelDate(toJSTDateStr(d));
  };

  // ── CSS vars as inline style helpers ─────────────────────────────────
  const card = (extra={}) => ({background:'var(--s1)',border:'1px solid var(--bd)',borderRadius:16,...extra});
  const mono = (extra={}) => ({fontFamily:'var(--mono)',...extra});
  const serif = (sz=20,extra={}) => ({fontFamily:'var(--serif)',fontSize:sz,color:'var(--em)',lineHeight:1,...extra});

  return (
    <div style={{maxWidth:430,margin:'0 auto',height:'100dvh',display:'flex',flexDirection:'column',
      background:'var(--bg)',position:'relative',overflow:'hidden',
      borderLeft:'1px solid var(--bd)',borderRight:'1px solid var(--bd)',zIndex:1}}>

      <Toast msg={toast}/>

      {/* ── HEADER ── */}
      <header style={{background:'linear-gradient(180deg,var(--s1) 0%,var(--bg) 100%)',
        borderBottom:'1px solid var(--bd)',padding:'14px 16px 16px',flexShrink:0,position:'relative',zIndex:10}}>
        {/* logo + sync */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div>
            <div style={{fontFamily:'var(--serif)',fontSize:18,color:'var(--em)',letterSpacing:'0.03em'}}>Meal OS</div>
            <div style={mono({fontSize:7,color:'var(--mu)',letterSpacing:'0.28em',textTransform:'uppercase',marginTop:3})}>Strategic Protein Monitor</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={mono({fontSize:8,color:'var(--mu)',background:'var(--s2)',border:'1px solid var(--bd)',padding:'4px 10px',borderRadius:20})}>{selDateLbl}</div>
            <button onClick={fetchData} style={{width:30,height:30,background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--mu)'}}>
              <RefreshIcon cls={syncing?'spin':''}/>
            </button>
          </div>
        </div>
        {/* gauge */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:9}}>
          <div style={mono({fontSize:7.5,color:'var(--mu)',letterSpacing:'0.2em',textTransform:'uppercase'})}>
            {isToday?'Today':'Past'} / 目標 {TARGET}g
          </div>
          <div style={{display:'flex',alignItems:'baseline',gap:3}}>
            <span style={serif(32,{color:'var(--em)'})}>
              {totalP.toFixed(1)}
            </span>
            <span style={mono({fontSize:9,color:'var(--mu)'})}> g</span>
          </div>
        </div>
        <div style={{height:2,background:'var(--bd)',borderRadius:1,marginBottom:8,position:'relative'}}>
          <div style={{height:'100%',background:'linear-gradient(90deg,#065f46,var(--em))',borderRadius:1,width:`${pct}%`,transition:'width 0.9s cubic-bezier(0.34,1.56,0.64,1)',position:'relative'}}>
            <div style={{position:'absolute',right:-1,top:-4,width:9,height:9,background:'var(--em)',borderRadius:'50%',boxShadow:'0 0 10px var(--em-glow)'}}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          <span style={mono({fontSize:7.5,color:'var(--mu)'})}>{pct.toFixed(0)}% Done</span>
          <span style={mono({fontSize:7.5,color:'var(--mu)'})}> 残り <em style={{color:'var(--em)',fontStyle:'normal'}}>{gap.toFixed(1)}g</em></span>
        </div>
      </header>

      {/* ── MAIN ── */}
      <main style={{flex:1,overflowY:'auto',overflowX:'hidden',WebkitOverflowScrolling:'touch'}} className="scroll">

        {/* ── LOG TAB ── */}
        {tab==='log' && (
          <div style={{padding:'14px 14px 120px'}} className="fade-up">
            {/* Date Nav */}
            <div style={{...card({borderRadius:14}),display:'flex',alignItems:'center',padding:4,gap:2,marginBottom:10}}>
              <button onClick={()=>moveDate(-1)} style={{width:38,height:38,background:'transparent',border:'none',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'var(--mu)',flexShrink:0}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M15 18l-6-6 6-6"/></svg>
              </button>
              <div style={{flex:1,textAlign:'center'}}>
                <div style={mono({fontSize:13,fontWeight:500,color:'var(--em)',letterSpacing:'0.05em'})}>{selDateLbl}</div>
                {!isToday && <button onClick={()=>setSelDate(todayStr)} style={{background:'var(--em)',color:'var(--bg)',border:'none',borderRadius:8,fontFamily:'var(--mono)',fontSize:7,fontWeight:500,padding:'3px 8px',letterSpacing:'0.1em',cursor:'pointer',marginTop:4}}>TODAY</button>}
              </div>
              <button onClick={()=>moveDate(1)} disabled={isToday} style={{width:38,height:38,background:'transparent',border:'none',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',cursor:isToday?'default':'pointer',color:'var(--mu)',opacity:isToday?0.25:1,flexShrink:0}}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
              </button>
            </div>

            {/* Quick Breakfast */}
            {isToday && (
              <button onClick={recordBreakfast} style={{width:'100%',...card(),padding:'12px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',marginBottom:10,transition:'all 0.15s'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:36,height:36,background:'var(--em-dim)',border:'1px solid rgba(16,185,129,0.15)',borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17}}>🥚</div>
                  <div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>朝セットを記録</div>
                    <div style={mono({fontSize:7.5,color:'var(--mu)',marginTop:2})}>卵・納豆・ヨーグルト — 45.0g P</div>
                  </div>
                </div>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width="13" height="13" style={{color:'var(--mu)'}}><path d="M9 18l6-6-6-6"/></svg>
              </button>
            )}

            {/* Form */}
            <div style={{...card({borderRadius:18}),padding:16,marginBottom:12}}>
              {/* type seg */}
              <div style={{display:'flex',background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:10,padding:3,gap:2,marginBottom:12}}>
                {['朝','昼','夜','他'].map(t=>(
                  <button key={t} onClick={()=>setMealType(t)} style={{flex:1,padding:'10px 0',fontFamily:'var(--mono)',fontSize:9,fontWeight:500,border:'none',borderRadius:7,cursor:'pointer',transition:'all 0.18s',background:mealType===t?'var(--em)':'transparent',color:mealType===t?'var(--bg)':'var(--mu)'}}>
                    {t}
                  </button>
                ))}
              </div>
              <input value={mainMenu} onChange={e=>setMainMenu(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&handleSave()}
                placeholder="主菜（タンパク源）"
                style={{width:'100%',background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:11,padding:'13px 14px',fontSize:14,fontWeight:700,color:'var(--tx)',outline:'none',marginBottom:12,fontFamily:'var(--sans)'}}/>
              <div style={{background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:11,padding:'12px 14px',marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                  <span style={mono({fontSize:7.5,color:'var(--mu)',letterSpacing:'0.18em',textTransform:'uppercase'})}>Protein</span>
                  <span style={serif(24)}>{Number(protein).toFixed(1)}<span style={mono({fontSize:8,color:'var(--mu)',marginLeft:3})}>g</span></span>
                </div>
                <input type="range" min="0" max="80" step="0.5" value={protein} onChange={e=>setProtein(e.target.value)}/>
              </div>
              <button onClick={handleSave} disabled={!mainMenu.trim()} style={{width:'100%',background:mainMenu.trim()?'var(--em)':'var(--mu2)',color:mainMenu.trim()?'var(--bg)':'var(--mu)',border:'none',borderRadius:11,padding:16,fontFamily:'var(--mono)',fontSize:11,fontWeight:500,letterSpacing:'0.2em',textTransform:'uppercase',cursor:mainMenu.trim()?'pointer':'default',transition:'all 0.18s'}}>
                記録を保存 →
              </button>
            </div>

            {/* Log list */}
            <div style={mono({fontSize:7.5,color:'var(--mu)',letterSpacing:'0.25em',textTransform:'uppercase',marginBottom:9,display:'flex',alignItems:'center',gap:8})}>
              {selDateLbl} Records
              <div style={{flex:1,height:1,background:'var(--bd)'}}/>
            </div>
            {filteredMeals.length===0
              ? <div style={{textAlign:'center',padding:32,fontFamily:'var(--mono)',fontSize:9,color:'var(--mu)',letterSpacing:'0.15em'}}>記録はありません</div>
              : filteredMeals.map((m,i)=>(
                <div key={m._id||m.timestamp} className="fade-up" style={{...card({borderRadius:13}),padding:'11px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:28,height:28,background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:7.5,color:'var(--mu)',flexShrink:0}}>
                      {m.type}
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>{m.main}</div>
                      <div style={mono({fontSize:7,color:'var(--mu)',marginTop:2})}>
                        {m.timestamp?.includes('T')?m.timestamp.split('T')[1].slice(0,5):'--:--'}
                      </div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <span style={serif(17)}>{m.protein.toFixed(1)}<span style={mono({fontSize:8,color:'var(--mu)',marginLeft:2})}>g</span></span>
                    <div style={{display:'flex',flexDirection:'column',gap:6,paddingLeft:10,borderLeft:'1px solid var(--bd)'}}>
                      <button onClick={()=>setEditMeal(m)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--mu)',display:'flex',alignItems:'center',justifyContent:'center',padding:2}}><EditIcon/></button>
                      <button onClick={()=>setDelMeal(m)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--mu)',display:'flex',alignItems:'center',justifyContent:'center',padding:2}}><TrashIcon/></button>
                    </div>
                  </div>
                </div>
              ))
            }
          </div>
        )}

        {/* ── SUGGEST TAB ── */}
        {tab==='suggest' && (
          <div style={{padding:'14px 14px 120px'}} className="fade-up">
            {/* Hero */}
            <div style={{background:'linear-gradient(135deg,var(--s2),#080a14)',border:'1px solid rgba(16,185,129,0.18)',borderRadius:16,padding:'14px 16px',marginBottom:10,position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',top:-30,right:-30,width:100,height:100,borderRadius:'50%',background:'radial-gradient(circle,rgba(16,185,129,0.07) 0%,transparent 70%)'}}/>
              <div style={mono({fontSize:7,color:'var(--em)',letterSpacing:'0.18em',textTransform:'uppercase',background:'var(--em-dim)',border:'1px solid rgba(16,185,129,0.2)',padding:'3px 9px',borderRadius:20,marginBottom:6,display:'inline-block'})}>Tonight's Strategy</div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={mono({fontSize:8,color:'var(--mu)',letterSpacing:'0.08em',marginBottom:2})}>夕食で補うタンパク質</div>
                  <div style={serif(28,{color:'var(--tx)'})}>
                    {gap.toFixed(1)}<span style={mono({fontSize:10,color:'var(--em)',marginLeft:3})}>g 不足</span>
                  </div>
                  <div style={mono({fontSize:7,color:'var(--mu)',marginTop:4})}>
                    {filteredMeals.filter(m=>m.type==='朝').reduce((s,m)=>s+m.protein,0)>0&&`朝 ${filteredMeals.filter(m=>m.type==='朝').reduce((s,m)=>s+m.protein,0).toFixed(0)}g`}
                    {filteredMeals.filter(m=>m.type==='昼').reduce((s,m)=>s+m.protein,0)>0&&` + 昼 ${filteredMeals.filter(m=>m.type==='昼').reduce((s,m)=>s+m.protein,0).toFixed(0)}g`}
                    {totalP>0&&` 摂取済み`}
                  </div>
                </div>
                <div style={{fontSize:20}}>🌙</div>
              </div>
            </div>

            {/* Effect filter */}
            <div style={{display:'flex',background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:10,padding:3,gap:2,marginBottom:10}}>
              {[['all','ALL'],['burn','燃焼'],['recovery','回復'],['antiaging','老化防止']].map(([v,l])=>(
                <button key={v} onClick={()=>setEffect(v)} style={{flex:1,padding:'9px 4px',fontFamily:'var(--mono)',fontSize:8,border:'none',background:effect===v?'var(--em)':'transparent',color:effect===v?'var(--bg)':'var(--mu)',borderRadius:7,cursor:'pointer',transition:'all 0.18s',letterSpacing:'0.04em'}}>{l}</button>
              ))}
            </div>

            {/* Cards */}
            {gap<=0
              ? <div style={{textAlign:'center',padding:'50px 20px'}}>
                  <div style={{width:72,height:72,borderRadius:'50%',border:'1px solid rgba(16,185,129,0.4)',background:'var(--em-dim)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:28}}>✓</div>
                  <div style={serif(18,{marginBottom:5})}>Goal Achieved</div>
                  <div style={mono({fontSize:7.5,color:'var(--mu)',letterSpacing:'0.15em'})}>Discipline leads to freedom.</div>
                </div>
              : suggestions.map((opt,i)=>(
                <div key={i} style={{...card({borderRadius:14,border:i===0?'1px solid rgba(16,185,129,0.38)':'1px solid var(--bd)'}),padding:'13px 14px',marginBottom:7,position:'relative',overflow:'hidden'}}>
                  {i===0&&<div style={{position:'absolute',top:0,left:0,right:0,height:1,background:'linear-gradient(90deg,transparent,var(--em),transparent)'}}/>}
                  <div style={{position:'absolute',top:-15,right:-15,width:70,height:70,borderRadius:'50%',background:'radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 70%)'}}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:5}}>
                    <div style={{flex:1}}>
                      <div style={mono({fontSize:7,color:'var(--mu)',letterSpacing:'0.18em',textTransform:'uppercase',marginBottom:4,display:'flex',alignItems:'center',gap:6})}>
                        <span style={{fontFamily:'var(--serif)',fontSize:11,color:'var(--em)'}}>{['I','II','III'][i]}</span>
                        Option {['A','B','C'][i]}
                        {i===0&&<span style={mono({fontSize:6,background:'var(--em-dim)',border:'1px solid rgba(16,185,129,0.3)',color:'var(--em)',padding:'2px 6px',borderRadius:8,letterSpacing:'0.1em'})}>Best</span>}
                      </div>
                      <div style={{fontFamily:'var(--serif)',fontSize:17,color:'var(--tx)',lineHeight:1.2,marginBottom:3}}>{opt.main}</div>
                      <div style={{fontSize:10,color:'var(--mu)',fontWeight:300,marginBottom:6}}>副菜：{opt.side}</div>
                    </div>
                    <div style={serif(24,{flexShrink:0,marginLeft:10})}>
                      {opt.p.toFixed(1)}<span style={mono({fontSize:8,color:'var(--mu)'})}> g</span>
                    </div>
                  </div>
                  {/* effect text */}
                  <div style={{fontFamily:'var(--mono)',fontSize:7.5,color:'var(--mu)',background:'var(--bg)',borderRadius:8,padding:'6px 10px',marginBottom:8,lineHeight:1.6}}
                    dangerouslySetInnerHTML={{__html:opt.effect.replace(/<em>/g,'<em style="color:var(--em);font-style:normal">')}}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap',flex:1}}>
                      {opt.tags.slice(0,3).map((t,ti)=>(
                        <span key={ti} style={mono({fontSize:6.5,padding:'2px 7px',background:'var(--bg)',border:'1px solid rgba(16,185,129,0.28)',borderRadius:5,color:'var(--em)'})}>{t}</span>
                      ))}
                    </div>
                    <button onClick={async()=>{
                      const now=new Date();
                      const ts=`${toJSTDateStr()}T${now.toTimeString().split(' ')[0]}`;
                      const newMeal={_id:genId(),timestamp:ts,type:'夜',main:opt.main,protein:opt.p};
                      setMeals(prev=>[newMeal,...prev]);
                      setTab('log');
                      showToast('SAVED');
                      try{await fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'save',...newMeal})});}catch(e){}
                    }} style={{display:'flex',alignItems:'center',gap:4,background:'transparent',border:'1px solid rgba(16,185,129,0.4)',borderRadius:8,padding:'5px 10px',fontFamily:'var(--mono)',fontSize:7,color:'var(--em)',cursor:'pointer',flexShrink:0,whiteSpace:'nowrap'}}>
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" width="10" height="10"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                      記録
                    </button>
                  </div>
                </div>
              ))
            }
            <div style={{display:'flex',justifyContent:'center',paddingTop:8,paddingBottom:4}}>
              <button onClick={()=>setShuffleSeed(s=>s+1)} style={{display:'flex',alignItems:'center',gap:7,background:'var(--s2)',border:'1px solid var(--bd)',borderRadius:12,padding:'12px 28px',fontFamily:'var(--mono)',fontSize:9,fontWeight:500,letterSpacing:'0.18em',textTransform:'uppercase',color:'var(--mu)',cursor:'pointer'}}>
                <ShuffleIcon/>Shuffle
              </button>
            </div>
          </div>
        )}

        {/* ── STATS TAB ── */}
        {tab==='stats' && (
          <div style={{padding:'14px 14px 120px'}} className="fade-up">
            <div style={mono({fontSize:7.5,color:'var(--mu)',letterSpacing:'0.25em',textTransform:'uppercase',marginBottom:9,display:'flex',alignItems:'center',gap:8})}>
              7-Day Trend<div style={{flex:1,height:1,background:'var(--bd)'}}/>
            </div>
            <div style={{...card({borderRadius:16}),padding:16,marginBottom:12}}>
              <div style={{width:'100%',height:130,marginBottom:2}} dangerouslySetInnerHTML={{__html:chartSvg}}/>
              {/* KPI */}
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:1,background:'var(--bd)',borderRadius:10,overflow:'hidden',marginTop:12}}>
                {[
                  {lbl:'7日平均',v:avg>0?avg.toFixed(0)+'g':'—',good:avg>=TARGET},
                  {lbl:'連続達成',v:streak+'日',good:streak>=3},
                  {lbl:'最高記録',v:best>0?best.toFixed(0)+'g':'—',good:best>=TARGET},
                ].map((k,i)=>(
                  <div key={i} style={{background:'var(--s1)',padding:9,textAlign:'center'}}>
                    <div style={mono({fontSize:6.5,color:'var(--mu)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:3})}>{k.lbl}</div>
                    <div style={{fontFamily:'var(--serif)',fontSize:16,color:k.good?'var(--em)':'var(--tx)'}}>{k.v}</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:4,marginTop:10}}>
                {weekDays.map((d,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:d.ok?'var(--em)':'var(--brt)'}}/>)}
              </div>
            </div>
            {/* Recent */}
            <div style={mono({fontSize:7.5,color:'var(--mu)',letterSpacing:'0.25em',textTransform:'uppercase',marginBottom:9,display:'flex',alignItems:'center',gap:8})}>
              History<div style={{flex:1,height:1,background:'var(--bd)'}}/>
            </div>
            {[...meals].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,10).map((m,i)=>{
              const t=new Date(m.timestamp);
              return (
                <div key={m._id||m.timestamp} style={{...card({borderRadius:13}),padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:7}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:28,height:28,background:'var(--bg)',border:'1px solid var(--bd)',borderRadius:7,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--mono)',fontSize:7.5,color:'var(--mu)',flexShrink:0}}>{m.type}</div>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--tx)'}}>{m.main}</div>
                      <div style={mono({fontSize:7,color:'var(--mu)',marginTop:2})}>{t.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})} {t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div>
                    </div>
                  </div>
                  <span style={serif(17)}>{m.protein.toFixed(1)}<span style={mono({fontSize:8,color:'var(--mu)',marginLeft:2})}>g</span></span>
                </div>
              );
            })}
          </div>
        )}
      </main>

      {/* ── NAV ── */}
      <nav style={{position:'absolute',bottom:0,left:0,right:0,background:'rgba(4,5,10,0.95)',backdropFilter:'blur(24px)',borderTop:'1px solid var(--bd)',display:'flex',justifyContent:'space-around',padding:`8px 0 max(10px,env(safe-area-inset-bottom))`,zIndex:100}}>
        {[
          {id:'log',label:'Log',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="19" height="19"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>},
          {id:'suggest',label:'Dinner',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="19" height="19"><path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6l-.7 4H9l-.7-4A7 7 0 0 1 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>},
          {id:'stats',label:'Stats',icon:<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" width="19" height="19"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
        ].map(t=>(
          <div key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,cursor:'pointer',padding:'7px 20px',borderRadius:12,transition:'all 0.22s',color:tab===t.id?'var(--em)':'var(--mu)',background:tab===t.id?'var(--em-dim)':'transparent'}}>
            {t.icon}
            <span style={mono({fontSize:7,letterSpacing:'0.18em',textTransform:'uppercase'})}>{t.label}</span>
          </div>
        ))}
      </nav>

      {/* ── MODALS ── */}
      {editMeal && <EditModal meal={editMeal} onSave={handleEditSave} onCancel={()=>setEditMeal(null)}/>}
      {delMeal && <ConfirmModal meal={delMeal} onConfirm={handleDelete} onCancel={()=>setDelMeal(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
