<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meal OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #04050a;
  --s1:     #090b12;
  --s2:     #0e1019;
  --bd:     #161a28;
  --brt:    #1f2436;
  --em:     #10b981;
  --em-dim: rgba(16,185,129,0.07);
  --em-mid: rgba(16,185,129,0.16);
  --em-glow:rgba(16,185,129,0.32);
  --tx:     #dce0ec;
  --mu:     #404660;
  --mu2:    #272c40;
  --red:    #e05a6a;
  --mono:'DM Mono',monospace;
  --serif:'DM Serif Display',serif;
  --sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--sans);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;border-left:1px solid var(--bd);border-right:1px solid var(--bd);z-index:1;}
.glow{position:absolute;width:360px;height:260px;border-radius:50%;background:radial-gradient(ellipse,rgba(16,185,129,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;top:-60px;left:50%;transform:translateX(-50%);}

/* ── HEADER ── */
header{background:linear-gradient(180deg,var(--s1) 0%,var(--bg) 100%);border-bottom:1px solid var(--bd);padding:16px 18px 18px;flex-shrink:0;position:relative;z-index:10;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.logo{font-family:var(--serif);font-size:19px;color:var(--em);letter-spacing:0.03em;line-height:1;}
.logo-sub{font-family:var(--mono);font-size:7px;color:var(--mu);letter-spacing:0.28em;text-transform:uppercase;margin-top:4px;}
.hdr-right{display:flex;align-items:center;gap:7px;}
.date-pill{font-family:var(--mono);font-size:8px;color:var(--mu);background:var(--s2);border:1px solid var(--bd);padding:5px 11px;border-radius:20px;letter-spacing:0.08em;}
.sync-btn{width:30px;height:30px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu);transition:all 0.2s;}
.sync-btn svg{width:12px;height:12px;}

.g-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.g-lbl{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.2em;text-transform:uppercase;}
.g-val{font-family:var(--serif);font-size:34px;color:var(--em);line-height:1;}
.g-unit{font-family:var(--mono);font-size:9px;color:var(--mu);margin-left:3px;}
.g-track{height:2px;background:var(--bd);border-radius:1px;margin-bottom:9px;position:relative;}
.g-fill{height:100%;background:linear-gradient(90deg,#065f46,var(--em));border-radius:1px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
.g-fill::after{content:'';position:absolute;right:-1px;top:-4px;width:9px;height:9px;background:var(--em);border-radius:50%;box-shadow:0 0 10px var(--em-glow);}
.g-meta{display:flex;justify-content:space-between;}
.g-pct,.g-gap{font-family:var(--mono);font-size:7.5px;color:var(--mu);}
.g-gap em{color:var(--em);font-style:normal;}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
main::-webkit-scrollbar{display:none;}
.pane{display:none;padding:14px 14px 120px;}
.pane.active{display:block;}
.sec{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--bd);}

/* ── DATE NAV ── */
.date-nav{display:flex;align-items:center;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:4px;gap:2px;margin-bottom:12px;}
.dn-arrow{width:36px;height:36px;background:transparent;border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu);transition:all 0.2s;flex-shrink:0;}
.dn-arrow:active{background:var(--bd);color:var(--tx);}
.dn-arrow svg{width:14px;height:14px;}
.dn-center{flex:1;text-align:center;}
.dn-date{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--em);letter-spacing:0.05em;}

/* quick breakfast */
.quick{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px;transition:all 0.15s;}
.q-l{display:flex;align-items:center;gap:10px;}
.q-ico{width:36px;height:36px;background:var(--em-dim);border:1px solid rgba(16,185,129,0.15);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.q-title{font-size:13px;font-weight:700;color:#ffffff;}
.q-sub{font-family:var(--mono);font-size:7.5px;color:rgba(255,255,255,0.6);margin-top:2px;}

/* form */
.form-card{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:16px;margin-bottom:12px;}
.seg{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px;}
.seg-btn{flex:1;padding:10px 0;font-family:var(--mono);font-size:9px;font-weight:500;border:none;background:transparent;color:var(--mu);border-radius:7px;cursor:pointer;transition:all 0.18s;letter-spacing:0.05em;}
.seg-btn.on{background:var(--em);color:var(--bg);}
.txt{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:13px 14px;font-size:14px;font-weight:700;color:var(--tx);outline:none;margin-bottom:12px;transition:border-color 0.2s;font-family:var(--sans);}
.txt:focus{border-color:var(--em);}
.sl-box{background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:12px 14px;margin-bottom:12px;}
.sl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sl-lbl{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.18em;text-transform:uppercase;}
.sl-val{font-family:var(--serif);font-size:24px;color:var(--em);line-height:1;}
.sl-val span{font-family:var(--mono);font-size:8px;color:var(--mu);}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--brt);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--em);border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 10px var(--em-glow);cursor:pointer;}
.save-btn{width:100%;background:var(--em);color:var(--bg);border:none;border-radius:11px;padding:18px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;}

/* log items */
.li-wrap{position:relative;overflow:hidden;border-radius:13px;margin-bottom:7px;}
.log-item{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;transition:transform 0.22s ease;}
.li-badge{width:28px;height:28px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:7.5px;color:var(--mu);flex-shrink:0;}
.li-name{font-size:13px;font-weight:700;color:var(--tx);flex:1;margin-left:10px;}
.li-p{font-family:var(--serif);font-size:17px;color:var(--em);flex-shrink:0;}
.li-actions{position:absolute;right:0;top:0;bottom:0;display:flex;z-index:1;transform:translateX(100%);transition:transform 0.22s ease;border-radius:0 13px 13px 0;overflow:hidden;}
.li-actions.show{transform:translateX(0);}
.li-edit,.li-del{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;padding:0 14px;min-width:62px;border:none;cursor:pointer;font-family:var(--mono);font-size:7px;font-weight:700;}
.li-edit{background:#0a2216;color:var(--em);}
.li-del{background:#251018;color:var(--red);}

/* ── SUGGEST TAB ── */
.sug-hero{background:linear-gradient(135deg,var(--s2),#080a14);border:1px solid rgba(16,185,129,0.18);border-radius:16px;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;}
.sh-badge{font-family:var(--mono);font-size:7px;color:var(--em);letter-spacing:0.18em;text-transform:uppercase;background:var(--em-dim);border:1px solid rgba(16,185,129,0.2);padding:3px 9px;border-radius:20px;margin-bottom:6px;display:inline-block;}
.sh-gap{font-family:var(--serif);font-size:30px;color:var(--tx);line-height:1;}
.sh-gap em{font-family:var(--mono);font-size:10px;color:var(--em);font-style:normal;margin-left:3px;}

.effect-row{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:2px;margin-bottom:10px;}
.eff-btn{flex:1;padding:10px 4px;font-family:var(--mono);font-size:10px;border:none;background:transparent;color:var(--mu);border-radius:7px;cursor:pointer;transition:all 0.18s;}
.eff-btn.on{background:var(--em);color:var(--bg);font-weight:700;}

.sug-inner-wrap{min-height:300px;}
.sug-card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden;}
.sc-name{font-family:var(--serif);font-size:18px;color:var(--tx);line-height:1.2;flex:1;}
.sc-p{font-family:var(--serif);font-size:16px;color:var(--em);line-height:1;}
.sc-tag{font-family:var(--mono);font-size:9px;padding:3px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--em);margin-right:4px;}
.sc-comment-area{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px;}
.sc-comment-lbl{font-family:var(--mono);font-size:6.5px;color:var(--mu);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;}
.sc-comment-txt{font-size:10px;line-height:1.4;color:var(--tx);font-weight:300;}

.shuffle-row{display:flex;justify-content:center;padding:10px 0 20px;}
.shuffle-btn{
    width:80%;background:var(--s2);border:1px solid var(--bd);
    color:var(--em);padding:20px;border-radius:16px;
    font-family:var(--mono);font-size:13px;font-weight:900;
    letter-spacing:0.25em;text-transform:uppercase;cursor:pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
}
.shuffle-btn:active { transform: scale(0.96); background: var(--em-dim); }

/* ── STATS ── */
.stats-card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;}
.bar-area{display:flex;gap:8px;align-items:flex-end;height:160px;padding:10px 0;background:rgba(0,0,0,0.1);border-radius:12px;}
.bar-fill {background: var(--brt);border-radius: 4px 4px 0 0;transition: height 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); width: 100%;}
.bar-fill.ok {background: linear-gradient(180deg, var(--em) 0%, #064e3b 100%); box-shadow: 0 0 12px var(--em-glow);}

/* ── NAV ── */
nav{position:absolute;bottom:0;left:0;right:0;background:rgba(4,5,10,0.95);backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 max(10px,env(safe-area-inset-bottom));z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:10px 16px;border-radius:16px;transition:all 0.3s;color:var(--mu);min-width: 80px;}
.nav-btn.on{color:var(--em);background:var(--em-dim);}
.nav-lbl{font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;}

/* Modals */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--s1);border:1px solid var(--bd);border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);}
.modal-bg.open .modal-sheet{transform:translateY(0);}

.toast-host{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;}
.toast{background:var(--em);color:var(--bg);padding:7px 16px;border-radius:20px;font-family:var(--mono);font-size:9px;font-weight:700;}
</style>
</head>
<body>
<div id="app">
<div class="glow"></div>

<header>
  <div class="hdr-row">
    <div><div class="logo">Meal OS</div><div class="logo-sub">Strategic Protein Monitor</div></div>
    <div class="hdr-right"><div class="date-chip" id="date-chip"></div><div class="sync-btn" onclick="fetchData()">🔄</div></div>
  </div>
  <div class="g-row">
    <div class="g-lbl"><span id="g-date-lbl">Today</span> / Target 120g</div>
    <div style="display:flex;align-items:baseline;"><div class="g-val" id="hdr-p">0.0</div><div class="g-unit">g</div></div>
  </div>
  <div class="g-track"><div class="g-fill" id="g-fill" style="width:0%"></div></div>
  <div class="g-meta"><div class="g-pct" id="g-pct">0% Done</div><div class="g-gap">残り <em id="g-gap">120.0g</em></div></div>
</header>

<main>
  <div id="pane-log" class="pane active">
    <button class="quick" onclick="recordBreakfast()">
      <div class="q-l">
        <div class="q-ico">🥚</div>
        <div><div class="q-title">朝セットを記録</div><div class="q-sub">45.0g P</div></div>
      </div>
    </button>
    <div class="form-card">
      <div class="date-nav">
        <button class="dn-arrow" onclick="moveDate(-1)">◀</button>
        <div class="dn-center"><div class="dn-date" id="view-date-display">—</div></div>
        <button class="dn-arrow" onclick="moveDate(1)">▶</button>
      </div>
      <div class="seg" id="type-seg">
        <button class="seg-btn" onclick="setType('朝',this)">朝</button>
        <button class="seg-btn on" onclick="setType('昼',this)">昼</button>
        <button class="seg-btn" onclick="setType('夜',this)">夜</button>
        <button class="seg-btn" onclick="setType('他',this)">他</button>
      </div>
      <input class="txt" id="in-main" type="text" placeholder="主菜"/>
      <div class="sl-box">
        <div class="sl-hd"><div class="sl-lbl">Protein</div><div class="sl-val" id="sl-val">25.0<span>g</span></div></div>
        <input type="range" id="in-p" min="0" max="60" step="0.5" value="25" oninput="document.getElementById('sl-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>g</span>'"/>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveForm()">記録を保存 →</button>
    </div>
    <div class="sec" id="log-sec-hd">Records</div>
    <div id="log-list"></div>
  </div>

  <div id="pane-suggest" class="pane">
    <div class="sug-hero">
      <div class="sh-badge">Tonight's Strategy</div>
      <div class="sh-gap" id="sh-gap-val">—<em>g 不足</em></div>
    </div>
    <div class="sec">Strategy / Focus Effect</div>
    <div class="effect-row" id="effect-selector">
      <button class="eff-btn on" onclick="setEffect('all',this)">ALL</button>
      <button class="eff-btn" onclick="setEffect('muscle',this)">筋肉増強</button>
      <button class="eff-btn" onclick="setEffect('recovery',this)">回復</button>
      <button class="eff-btn" onclick="setEffect('antiaging',this)">アンチエイジング</button>
    </div>
    <div id="sug-inner" class="sug-inner-wrap"></div>
    <div class="shuffle-row"><button class="shuffle-btn" onclick="renderSuggest(true)">SHUFFLE / CHANGE</button></div>
  </div>

  <div id="pane-stats" class="pane">
    <div class="sec">Protein Weekly Trend</div>
    <div class="stats-card"><div id="bar-area" class="bar-area"></div></div>
    <div class="sec">History</div>
    <div id="recent-list"></div>
  </div>
</main>

<nav>
  <div class="nav-btn on" id="nav-log" onclick="switchTab('log')"><div class="nav-lbl">Log</div></div>
  <div class="nav-btn" id="nav-suggest" onclick="switchTab('suggest')"><div class="nav-lbl">Dinner</div></div>
  <div class="nav-btn" id="nav-stats" onclick="switchTab('stats')"><div class="nav-lbl">Stats</div></div>
</nav>
</div>

<!-- Edit Modal -->
<div class="modal-bg" id="edit-modal" onclick="if(event.target===this)closeModal('edit-modal')">
  <div class="modal-sheet">
    <div style="font-family:var(--serif); font-size:18px; margin-bottom:15px; color:var(--tx);">記録を修正</div>
    <input class="txt" id="edit-main" type="text" placeholder="主菜"/>
    <div class="sl-box">
      <div class="sl-hd">
        <div class="sl-val" id="edit-sl-val">25.0<span>g</span></div>
      </div>
      <input type="range" id="edit-p" min="0" max="60" step="0.5" value="25" oninput="document.getElementById('edit-sl-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>g</span>'"/>
    </div>
    <button class="save-btn" onclick="commitEdit()">保存する →</button>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec";
const TARGET = 120;

// 脳機能をアンチエイジングに置換。馬・鹿・メカジキは完全に排除済み。
const MENUS = [
  { main:"生ラムのたたき", side:"オニオンスライス", p:28.0, tags:["羊", "カルニチン", "亜鉛"], cat:"muscle" },
  { main:"金目鯛のアクアパッツァ", side:"ズッキーニ・トマト", p:24.0, tags:["魚", "アスタキサンチン", "Tie2"], cat:"antiaging" },
  { main:"鶏むね肉のバジルソテー", side:"ナッツサラダ", p:32.0, tags:["鶏", "抗酸化", "ビタミンE"], cat:"recovery" },
  { main:"茹でダコのカルパッチョ", side:"セロリ・オリーブ油", p:18.0, tags:["タウリン", "血管柔軟性", "低脂質"], cat:"recovery" },
  { main:"牛赤身肉のタリアータ", side:"ルッコラ・バルサミコ", p:30.0, tags:["牛", "アルギニン", "鉄分"], cat:"muscle" },
  { main:"豚ヒレのロースト", side:"ローズマリー・温野菜", p:29.0, tags:["豚", "ビタミンB1", "疲労回復"], cat:"recovery" },
  { main:"サケのムニエル（皮ごと）", side:"ほうれん草のソテー", p:26.0, tags:["サケ", "アスタキサンチン", "DHA"], cat:"antiaging" },
  { main:"ホタテとアスパラの炒め", side:"舞茸のソテー", p:22.0, tags:["タウリン", "亜鉛", "Tie2"], cat:"antiaging" },
  { main:"鶏ササミの梅大葉巻き", side:"叩ききゅうり", p:28.0, tags:["鶏", "クエン酸", "超低脂質"], cat:"muscle" },
  { main:"ブリの塩麹焼き", side:"小松菜の煮浸し", p:25.0, tags:["魚", "発酵", "血管掃除"], cat:"recovery" },
  { main:"穴子の白焼き", side:"焼きナス・わさび", p:22.0, tags:["精力", "ビタミンA", "スタミナ"], cat:"recovery" },

let S = { history:[], viewLogs:[], type:'昼', viewDate:new Date(), effect:'all' };
let _editIdx = null, _sw = {};

(function init(){
  updateDateNav();
  fetchData();
})();

async function fetchData(){
  try {
    const r = await fetch(GAS);
    const raw = await r.json();
    S.history = raw.map(d=>({ main:d.main, protein:parseFloat(d.protein||0), timestamp:d.timestamp, type:d.type }));
    filterLogs();
  } catch(e){ console.log("offline"); }
  renderAll();
}

function filterLogs(){
  const ds = S.viewDate.toDateString();
  S.viewLogs = S.history.filter(m=>new Date(m.timestamp).toDateString()===ds);
}

function renderAll(){
  const tot = S.viewLogs.reduce((s,m)=>s+m.protein,0);
  const gap = Math.max(0,TARGET-tot);
  const pct = Math.min(tot/TARGET*100,100);
  document.getElementById('hdr-p').textContent = tot.toFixed(1);
  document.getElementById('g-fill').style.width = pct+'%';
  document.getElementById('g-pct').textContent = pct.toFixed(0)+'% Done';
  document.getElementById('g-gap').textContent = gap.toFixed(1)+'g';
  const isToday = S.viewDate.toDateString() === new Date().toDateString();
  document.getElementById('g-date-lbl').textContent = isToday ? "Today" : S.viewDate.toLocaleDateString('ja-JP', {month:'short', day:'numeric'});
  renderLog();
  renderSuggest();
  renderStats();
}

function renderLog(){
  const el = document.getElementById('log-list');
  if(!el) return;
  el.innerHTML = S.viewLogs.length ? S.viewLogs.map((m,i)=>`
    <div class="li-wrap" id="liw-${i}">
      <div class="log-item" id="lii-${i}"
        ontouchstart="swipeStart(event,${i})"
        ontouchmove="swipeMove(event,${i})"
        ontouchend="swipeEnd(${i})">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="li-badge">${m.type}</div>
          <div class="li-name">${m.main}</div>
        </div>
        <div class="li-p">${m.protein.toFixed(1)}g</div>
      </div>
      <div class="li-actions" id="lia-${i}">
        <button class="li-edit" onclick="openEdit(${i})">修正</button>
        <button class="li-del" onclick="deleteMeal(${i})">削除</button>
      </div>
    </div>`).join('') : '<div style="padding:20px;text-align:center;color:var(--mu);font-size:10px;">No records.</div>';
}

function renderSuggest(refresh = false){
  const el = document.getElementById('sug-inner');
  if(!el) return;
  const tot = S.viewLogs.reduce((s,m)=>s+m.protein,0);
  const gap = Math.max(0,TARGET-tot);
  document.getElementById('sh-gap-val').innerHTML = gap > 0 ? `${gap.toFixed(1)}<em>g 不足</em>` : "Goal Achieved!";
  if(gap <= 0) { el.innerHTML = ""; return; }
  
  let pool = [...MENUS];
  if(S.selectedEffect !== 'all') pool = pool.filter(m => m.cat === S.selectedEffect);
  
  pool.sort(() => Math.random() - 0.5);
  let sorted = pool.slice(0, 3);
  
  el.innerHTML = sorted.map(opt => `
    <div class="sug-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="sc-name">${opt.main}</div>
        <div style="text-align:right;">
          <div class="sc-p">${opt.p.toFixed(1)}g</div>
          <div style="display:flex;gap:3px;justify-content:flex-end;margin-top:4px;">
            ${opt.tags.map(t=>`<span class="sc-tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="sc-comment-area">
        <div class="sc-comment-lbl">副菜 / アンチエイジングの狙い</div>
        <div class="sc-comment-txt">${opt.side}。${opt.tags.join('、')}等の成分により細胞の老化防止と血管ケアを狙います。</div>
      </div>
    </div>`).join('');
}

function renderStats(){
  const barArea = document.getElementById('bar-area');
  if(!barArea) return;
  const labels = ['月','火','水','木','金','土','日'];
  const now = new Date();
  const weekData = [];
  for(let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(now.getDate() - i);
    const ds = d.toDateString();
    const dayTotal = S.history.filter(m => new Date(m.timestamp).toDateString() === ds).reduce((s,m)=>s+m.protein,0);
    weekData.push({ val:dayTotal, label:labels[d.getDay()===0?6:d.getDay()-1] });
  }
  const maxVal = Math.max(...weekData.map(d=>d.val), TARGET, 1);
  barArea.innerHTML = weekData.map(d => `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;">
      <div style="flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;">
        <div class="bar-fill ${d.val>=TARGET?'ok':''}" style="height:${(d.val/maxVal)*100}%;min-height:4px;"></div>
      </div>
      <div style="font-family:var(--mono);font-size:7px;color:var(--mu);">${d.label}</div>
    </div>`).join('');

  const recent = [...S.history].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0, 10);
  document.getElementById('recent-list').innerHTML = recent.length ? recent.map(m => `
    <div class="log-item" style="margin-bottom:7px;padding:10px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="li-badge" style="width:24px;height:24px;font-size:7px;">${m.type}</div>
        <div style="font-size:12px;">${m.main}</div>
      </div>
      <div class="li-p" style="font-size:14px;">${m.protein.toFixed(1)}g</div>
    </div>`).join('') : '<div class="empty">History unavailable.</div>';
}

// ── ACTIONS ──
function swipeStart(e,i){_sw[i]={x:e.touches[0].clientX,y:e.touches[0].clientY};}
function swipeMove(e,i){
  if(!_sw[i])return;
  const dx=_sw[i].x-e.touches[0].clientX;
  if(dx>40){
    document.getElementById('lia-'+i).classList.add('show');
    document.getElementById('lii-'+i).style.transform='translateX(-124px)';
  } else if(dx<-40){
    document.getElementById('lia-'+i).classList.remove('show');
    document.getElementById('lii-'+i).style.transform='';
  }
}
function swipeEnd(i){delete _sw[i];}

function openEdit(i){
  _editIdx = i;
  const m = S.viewLogs[i];
  document.getElementById('edit-main').value = m.main;
  document.getElementById('edit-p').value = m.protein;
  document.getElementById('edit-sl-val').innerHTML = m.protein.toFixed(1)+'<span>g</span>';
  document.getElementById('edit-modal').classList.add('open');
}

function commitEdit(){
  if(_editIdx===null)return;
  const main = document.getElementById('edit-main').value.trim();
  const p = parseFloat(document.getElementById('edit-p').value);
  const ts = S.viewLogs[_editIdx].timestamp;
  const hi = S.history.findIndex(h => h.timestamp === ts);
  if(hi>=0) { S.history[hi].main = main; S.history[hi].protein = p; }
  closeModal('edit-modal'); filterLogs(); renderAll(); toast("UPDATED");
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'update',timestamp:ts,main,protein:p})}).catch(()=>{});
}

function deleteMeal(i){
  const ts = S.viewLogs[i].timestamp;
  S.history = S.history.filter(h => h.timestamp !== ts);
  filterLogs(); renderAll(); toast("DELETED");
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'delete',timestamp:ts})}).catch(()=>{});
}

function closeModal(id){document.getElementById(id).classList.remove('open');}

function moveDate(n){
  S.viewDate.setDate(S.viewDate.getDate() + n);
  updateDateNav(); filterLogs(); renderAll();
}

function updateDateNav(){
  const disp = document.getElementById('view-date-display');
  const chip = document.getElementById('date-chip');
  if(disp) disp.textContent = S.viewDate.toLocaleDateString('ja-JP', {year:'numeric', month:'2-digit', day:'2-digit'});
  if(chip) chip.textContent = S.viewDate.toLocaleDateString('ja-JP', {month:'2-digit', day:'2-digit'});
}

function switchTab(id){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('on'));
  document.getElementById('nav-'+id).classList.add('on');
  if(id==='suggest') renderSuggest();
  if(id==='stats') renderStats();
}

function setType(t,btn){
  S.type=t;
  document.querySelectorAll('#type-seg .seg-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function setEffect(eff,btn){
  S.selectedEffect = eff;
  document.querySelectorAll('#effect-selector .eff-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderSuggest(true);
}

async function recordBreakfast(){ await doSave({main:'朝セット',protein:45,type:'朝'}); }

async function saveForm(){
  const main = document.getElementById('in-main').value.trim();
  const p = parseFloat(document.getElementById('in-p').value);
  if(!main) return;
  await doSave({main,protein:p,type:S.type});
  document.getElementById('in-main').value = '';
}

async function doSave(data){
  const rec = new Date(S.viewDate); const now = new Date();
  rec.setHours(now.getHours(), now.getMinutes(), now.getSeconds());
  const meal = {...data, timestamp:rec.toISOString()};
  S.history.unshift(meal); filterLogs(); renderAll();
  const btn = document.getElementById('save-btn'); if(btn) btn.disabled=true;
  try { await fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify(meal)}); toast("SAVED"); }
  catch(e){ toast("OFFLINE SAVE"); }
  finally { if(btn) btn.disabled=false; }
}

function toast(m){
  const h=document.getElementById('toast-host');
  const d=document.createElement('div'); d.className='toast'; d.textContent=m;
  h.appendChild(d); setTimeout(()=>d.remove(),3000);
}

window.addEventListener('load', () => { setTimeout(renderStats, 500); });
</script>
