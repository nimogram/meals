<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Meal Log">
    <title>Meal Log v4.1 Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #020617; /* slate-950 */
        }
        .protein-gauge { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .safe-area-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem); }
        input, button { outline: none !important; }
        .status-pill { animation: fadeIn 0.3s ease-out; z-index: 100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        .tab-active { color: #10b981; }
        .tab-inactive { color: #64748b; }
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-slate-100 antialiased overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-950 relative shadow-2xl">
        
        <!-- Header -->
        <header class="bg-slate-900/90 backdrop-blur-xl text-white p-4 pb-2 rounded-b-[2.5rem] border-b border-slate-800 sticky top-0 z-50">
            <div id="sync-status" class="absolute top-1 left-0 right-0 flex justify-center pointer-events-none text-center"></div>
            
            <div class="flex justify-between items-center mb-1">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-emerald-400">MEAL LOG</h1>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest leading-none text-emerald-600/50">Sheet Analysis v4.1</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="testConnection()" class="bg-slate-800 p-2 rounded-xl border border-slate-700 active:scale-95 transition-all text-slate-400">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                    <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                        <i data-lucide="database" class="text-emerald-400 w-5 h-5"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-1 pb-1">
                <div class="flex justify-between items-end">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Protein Goal</span>
                    <span class="text-2xl font-black text-white" id="current-p">0<span class="text-xs text-slate-600 font-normal ml-1">/ 120g</span></span>
                </div>
                <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="p-bar" class="protein-gauge h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-scroll" class="flex-1 p-5 space-y-6 pb-32 overflow-y-auto">
            
            <!-- View: Record -->
            <div id="view-record" class="space-y-6 animate-in fade-in duration-300">
                <button onclick="recordQuickBreakfast()" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-[2.5rem] flex items-center justify-between active:scale-95 transition-all shadow-xl">
                    <div class="flex items-center space-x-4">
                        <div class="bg-emerald-500/10 p-3 rounded-2xl text-emerald-400"><i data-lucide="coffee" class="w-7 h-7"></i></div>
                        <div class="text-left">
                            <p class="text-xl font-bold text-slate-100 tracking-tight">朝セットを記録</p>
                            <p class="text-sm text-slate-500">マカ・プロテイン・コーヒー (30g P)</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="text-slate-600 w-5 h-6"></i>
                </button>

                <section id="form-container" class="bg-slate-900/40 border border-slate-800 rounded-[2.5rem] p-6 shadow-2xl transition-all duration-300">
                    <div class="flex justify-between items-center mb-6 px-1">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="plus-circle" class="text-emerald-500 w-5 h-5"></i>
                            <h2 id="form-title" class="text-xs font-black text-slate-400 uppercase tracking-[0.2em]">Meal Entry</h2>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="flex bg-slate-950 p-1 rounded-2xl border border-slate-800">
                            <button onclick="setType('朝')" class="type-btn flex-1 py-3 text-sm font-black rounded-xl transition-all text-slate-600">朝</button>
                            <button onclick="setType('昼')" class="type-btn flex-1 py-3 text-sm font-black rounded-xl transition-all bg-emerald-600 text-white shadow-lg">昼</button>
                            <button onclick="setType('夜')" class="type-btn flex-1 py-3 text-sm font-black rounded-xl transition-all text-slate-600">夜</button>
                            <button onclick="setType('他')" class="type-btn flex-1 py-3 text-sm font-black rounded-xl transition-all text-slate-600">他</button>
                        </div>
                        <div class="space-y-4">
                            <input type="text" id="main-menu" placeholder="主菜 (タンパク源)" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-5 text-2xl font-bold text-slate-100 focus:ring-2 focus:ring-emerald-500/50 outline-none placeholder-slate-800">
                            <input type="text" id="side-menu" placeholder="副菜" class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-6 py-5 text-xl text-slate-100 focus:ring-2 focus:ring-emerald-500/50 outline-none placeholder-slate-800">
                        </div>
                        <div class="bg-slate-950 p-6 rounded-[2rem] border border-slate-800 space-y-4 text-center">
                            <div class="flex justify-between items-center">
                                <span class="text-xs font-black text-slate-500 uppercase tracking-widest">Protein g</span>
                                <span class="text-5xl font-black text-emerald-400" id="protein-val">25g</span>
                            </div>
                            <input type="range" id="protein-slider" min="0" max="80" step="5" value="25" oninput="updateProteinLabel(this.value)" class="w-full h-3 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                        </div>
                        <button id="save-btn" onclick="saveMeal()" class="w-full bg-emerald-600 text-white py-6 rounded-[2rem] font-black text-xl tracking-widest shadow-lg active:scale-95 transition-all">レポを保存</button>
                    </div>
                </section>
                <div id="log-list" class="space-y-4"></div>
            </div>

            <!-- View: Suggest (Based on Spreadsheet Data) -->
            <div id="view-suggest" class="hidden space-y-4 animate-in slide-in-from-right-8 duration-300">
                <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-3xl">
                    <p class="text-xs text-emerald-400 text-center font-bold tracking-tight" id="suggest-status">履歴を取得中...</p>
                </div>
                <div id="suggest-loading" class="space-y-4 hidden">
                    <div class="h-44 bg-slate-900 rounded-[2.5rem] loading-shimmer opacity-30"></div>
                    <div class="h-44 bg-slate-900 rounded-[2.5rem] loading-shimmer opacity-30"></div>
                </div>
                <div id="suggest-list" class="space-y-4"></div>
            </div>
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 flex justify-around p-4 safe-area-bottom shadow-2xl">
            <button onclick="switchView('record')" id="tab-record" class="flex flex-col items-center tab-active transition-all">
                <i data-lucide="list-checks" class="w-8 h-8"></i>
                <span class="text-[10px] font-black mt-1 uppercase">Log</span>
            </button>
            <button onclick="switchView('suggest')" id="tab-suggest" class="flex flex-col items-center tab-inactive transition-all">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
                <span class="text-[10px] font-black mt-1 uppercase">Suggest</span>
            </button>
        </nav>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec";

        let state = { currentType: '昼', meals: [], targetProtein: 120, editingId: null, activeView: 'record', sheetHistory: [] };

        function init() {
            lucide.createIcons();
            const saved = localStorage.getItem('nimo_today_meals');
            if (saved && localStorage.getItem('nimo_last_save_date') === new Date().toDateString()) state.meals = JSON.parse(saved);
            updateUI();
        }

        function switchView(view) {
            state.activeView = view;
            document.getElementById('view-record').classList.toggle('hidden', view !== 'record');
            document.getElementById('view-suggest').classList.toggle('hidden', view !== 'suggest');
            document.getElementById('tab-record').classList.replace(view === 'record' ? 'tab-inactive' : 'tab-active', view === 'record' ? 'tab-active' : 'tab-inactive');
            document.getElementById('tab-suggest').classList.replace(view === 'suggest' ? 'tab-inactive' : 'tab-active', view === 'suggest' ? 'tab-active' : 'tab-inactive');
            if (view === 'suggest') generateAnalysisSuggestions();
            lucide.createIcons();
        }

        async function fetchHistoryFromSheet() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) return [];
                const data = await response.json();
                state.sheetHistory = Array.isArray(data) ? data : [];
                return state.sheetHistory;
            } catch(e) { 
                console.error("Sheet Fetch Error", e);
                return []; 
            }
        }

        async function generateAnalysisSuggestions() {
            const list = document.getElementById('suggest-list');
            const loading = document.getElementById('suggest-loading');
            const status = document.getElementById('suggest-status');
            
            list.innerHTML = ""; 
            loading.classList.remove('hidden'); 
            status.innerText = "スプレッドシートの履歴を分析中...";

            const currentP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            const gap = state.targetProtein - currentP;

            if (gap <= 0) {
                loading.classList.add('hidden');
                status.innerText = "本日のタンパク質目標は達成済みです！";
                list.innerHTML = '<div class="p-8 text-center text-emerald-400 font-bold italic text-xl">Perfect Goal Reached!</div>';
                return;
            }

            const history = await fetchHistoryFromSheet();
            loading.classList.add('hidden');
            status.innerText = `残り ${gap}g を補完。履歴に基づき重複を排除しました。`;

            // 最近食べた主菜のリストを作成
            const recentMains = history.slice(-15).map(h => h.main.toLowerCase());

            // 推奨メニューのプール
            const menuPool = [
                { main: "鶏ささみのグリル", side: "ブロッコリー", p: 40, keywords: ["鶏", "ささみ"] },
                { main: "サバの塩焼き", side: "冷奴", p: 25, keywords: ["魚", "サバ"] },
                { main: "豚ヒレ肉のソテー", side: "海藻サラダ", p: 30, keywords: ["豚", "ヒレ"] },
                { main: "秋鮭のホイル焼き", side: "キノコ添え", p: 28, keywords: ["魚", "鮭"] },
                { main: "牛赤身肉のステーキ", side: "ほうれん草", p: 35, keywords: ["牛", "ステーキ"] },
                { main: "厚揚げと鶏肉の煮物", side: "小松菜", p: 32, keywords: ["鶏", "豆腐"] },
                { main: "カツオのたたき", side: "玉ねぎスライス", p: 26, keywords: ["魚", "カツオ"] }
            ];

            // 履歴と被らないものを優先的に抽出
            let filteredMenu = menuPool.filter(menu => {
                const isRepeated = recentMains.some(recent => 
                    menu.main.toLowerCase().includes(recent) || 
                    menu.keywords.some(k => recent.includes(k.toLowerCase()))
                );
                return !isRepeated;
            });

            // 被りなしが少なすぎる場合はプールを戻す
            if (filteredMenu.length < 3) filteredMenu = menuPool;

            // タンパク質必要量に近い順にソート（効率重視）
            filteredMenu.sort((a, b) => Math.abs(gap - b.p) - Math.abs(gap - a.p));

            const finalOptions = [
                { tag: "A案: 最速P補完", ...filteredMenu[0], desc: "不足分を最短で埋めるための高タンパク・低脂質な選択肢です。" },
                { tag: "B案: 履歴重複なし", ...filteredMenu[1], desc: "最近の食事と被らない食材を選び、栄養バランスを整えます。" },
                { tag: "C案: 胃に優しい持続性", ...filteredMenu[2], desc: "明日への影響を考慮し、吸収効率の高い組み合わせです。" }
            ];

            list.innerHTML = finalOptions.map(opt => `
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl space-y-4 animate-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black text-emerald-500 uppercase tracking-widest">${opt.tag}</span>
                        <span class="bg-emerald-500/20 text-emerald-400 px-4 py-2 rounded-2xl text-2xl font-black">+${opt.p}g P</span>
                    </div>
                    <h3 class="text-white font-black text-3xl tracking-tight leading-none">${opt.main}</h3>
                    <p class="text-slate-400 text-base mt-2 flex items-center"><i data-lucide="info" class="w-5 h-5 mr-2 text-emerald-600"></i> ${opt.side}</p>
                    <p class="text-slate-500 text-xs italic border-t border-slate-800 pt-4 opacity-80">${opt.desc}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateProteinLabel(val) { document.getElementById('protein-val').innerText = val + 'g'; }
        
        async function saveMeal() {
            const main = document.getElementById('main-menu').value;
            const side = document.getElementById('side-menu').value;
            const p = parseInt(document.getElementById('protein-slider').value);
            if (!main) return;
            const meal = { id: Date.now(), type: state.currentType, main, side: side || '-', protein: p, time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) };
            state.meals.unshift(meal); updateUI(); resetForm();
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(meal) }); showStatus("同期完了"); } catch(e) { showStatus("同期失敗", true); }
        }

        function recordQuickBreakfast() {
            const b = { id: Date.now(), type: '朝', main: '朝セット', side: 'マカ・プロテイン・コーヒー', protein: 30, time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) };
            state.meals.unshift(b); updateUI();
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(b) });
        }

        function updateUI() {
            const totalP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            document.getElementById('current-p').innerHTML = `${totalP}<span class="text-sm text-slate-600 font-normal ml-1">/ 120g</span>`;
            document.getElementById('p-bar').style.width = Math.min((totalP / 120) * 100, 100) + '%';
            document.getElementById('log-list').innerHTML = state.meals.map(m => `
                <div class="bg-slate-900/50 border border-slate-800 p-5 rounded-[2rem] flex items-center justify-between shadow-xl">
                    <div class="flex items-center space-x-6">
                        <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-xs font-black text-slate-500 uppercase border border-slate-700">${m.type}</div>
                        <div><p class="text-2xl font-bold text-white tracking-tight">${m.main}</p><p class="text-sm text-slate-500">${m.side}</p></div>
                    </div>
                    <div class="text-right"><span class="text-2xl font-black text-emerald-400">+${m.protein}g</span><p class="text-xs text-slate-600">${m.time}</p></div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setType(type) {
            state.currentType = type;
            const btns = document.querySelectorAll('.type-btn');
            btns.forEach(b => {
                const isActive = b.innerText === type;
                b.classList.toggle('bg-emerald-600', isActive);
                b.classList.toggle('text-white', isActive);
                b.classList.toggle('text-slate-600', !isActive);
            });
        }

        function showStatus(msg, isError = false) {
            const status = document.getElementById('sync-status');
            const pill = document.createElement('div');
            pill.className = `status-pill ${isError ? 'bg-red-500' : 'bg-emerald-500'} text-white px-4 py-1 rounded-full text-[10px] font-black`;
            pill.innerText = msg;
            status.innerHTML = ''; status.appendChild(pill);
            setTimeout(() => pill.remove(), 2000);
        }

        function testConnection() { showStatus("CONNECTION CHECK: OK"); }
        function resetForm() { document.getElementById('main-menu').value = ''; document.getElementById('side-menu').value = ''; }
        window.onload = init;
    </script>
</body>
</html>
