<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Meal Log">
    <title>Meal Log v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #020617; /* slate-950 */
        }
        .protein-gauge { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .safe-area-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem); }
        input, button { outline: none !important; }
        .status-pill { animation: fadeIn 0.3s ease-out; z-index: 100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .edit-mode { border: 2px solid #10b981 !important; background-color: #064e3b !important; }
        ::-webkit-scrollbar { display: none; }
        .tab-active { color: #10b981; }
        .tab-inactive { color: #64748b; }
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-200 antialiased overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-950 relative shadow-2xl">
        
        <!-- Header: Slim Protein Progress -->
        <header class="bg-slate-900/80 backdrop-blur-lg text-white p-4 rounded-b-[2.5rem] border-b border-slate-800 sticky top-0 z-50">
            <div id="sync-status" class="absolute top-2 left-0 right-0 flex justify-center pointer-events-none"></div>
            
            <div class="flex justify-between items-center mb-2">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter text-emerald-400">MEAL LOG</h1>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest">AI Engine v3.1</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="testConnection()" class="bg-slate-800 p-2 rounded-xl border border-slate-700 active:scale-95 transition-all text-slate-400 hover:text-emerald-400">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                    <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                        <i data-lucide="brain-circuit" class="text-emerald-400 w-5 h-5"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Protein Goal</span>
                    <span class="text-2xl font-black text-white" id="current-p">0<span class="text-sm text-slate-600 font-normal ml-1">/ 120g</span></span>
                </div>
                <div class="h-2.5 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="p-bar" class="protein-gauge h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-scroll" class="flex-1 p-5 space-y-6 pb-32 overflow-y-auto">
            
            <!-- Views: Record -->
            <div id="view-record" class="space-y-6 animate-in fade-in duration-300">
                <!-- Quick Action -->
                <section>
                    <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-3 ml-1">Quick Routine</h2>
                    <button onclick="recordQuickBreakfast()" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center justify-between active:scale-95 transition-all shadow-lg">
                        <div class="flex items-center space-x-4">
                            <div class="bg-emerald-500/10 p-3 rounded-2xl text-emerald-400">
                                <i data-lucide="zap" class="w-6 h-6"></i>
                            </div>
                            <div class="text-left">
                                <p class="text-base font-bold text-slate-200">朝セットを記録</p>
                                <p class="text-xs text-slate-500 mt-0.5">マカ・プロテイン・コーヒー (30g P)</p>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="text-slate-600 w-5 h-5"></i>
                    </button>
                </section>

                <!-- Manual Form -->
                <section id="form-container" class="bg-slate-900/50 border border-slate-800 rounded-[2rem] p-6 shadow-xl transition-all duration-300">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="plus-circle" id="form-icon" class="text-emerald-500 w-5 h-5"></i>
                            <h2 id="form-title" class="text-sm font-black text-slate-300 uppercase tracking-widest text-emerald-400">Meal Report</h2>
                        </div>
                        <button id="cancel-edit" onclick="cancelEdit()" class="text-xs font-bold text-red-400 bg-red-900/20 border border-red-900/30 px-3 py-1 rounded-full hidden">キャンセル</button>
                    </div>

                    <div class="space-y-6">
                        <div class="flex bg-slate-950 p-1 rounded-2xl border border-slate-800">
                            <button onclick="setType('朝')" class="type-btn flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500">朝</button>
                            <button onclick="setType('昼')" class="type-btn flex-1 py-2 text-sm font-bold rounded-xl transition-all bg-emerald-600 text-white shadow-lg">昼</button>
                            <button onclick="setType('夜')" class="type-btn flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500">夜</button>
                            <button onclick="setType('他')" class="type-btn flex-1 py-2 text-sm font-bold rounded-xl transition-all text-slate-500">他</button>
                        </div>

                        <div class="space-y-4">
                            <div class="relative">
                                <i data-lucide="utensils" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                                <input type="text" id="main-menu" placeholder="主菜（タンパク源）" class="w-full bg-slate-950 border border-slate-800 rounded-2xl pl-12 pr-5 py-4 text-base text-slate-200 focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                            </div>
                            <div class="relative">
                                <i data-lucide="leaf" class="absolute left-4 top-4 w-5 h-5 text-slate-500"></i>
                                <input type="text" id="side-menu" placeholder="副菜（野菜など）" class="w-full bg-slate-950 border border-slate-800 rounded-2xl pl-12 pr-5 py-4 text-base text-slate-200 focus:ring-2 focus:ring-emerald-500 transition-all outline-none">
                            </div>
                        </div>

                        <div class="bg-slate-950 p-5 rounded-3xl border border-slate-800 space-y-3">
                            <div class="flex justify-between items-center px-1">
                                <span class="text-xs font-black text-slate-500 uppercase tracking-widest">Est. Protein</span>
                                <span class="text-2xl font-black text-emerald-400" id="protein-val">25g</span>
                            </div>
                            <input type="range" id="protein-slider" min="0" max="80" step="5" value="25" oninput="updateProteinLabel(this.value)" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                        </div>

                        <div class="flex items-center justify-between bg-amber-900/10 border border-amber-900/20 p-4 rounded-3xl">
                            <div class="flex items-center space-x-3 text-amber-200 font-bold text-base">
                                <i data-lucide="beer" class="w-5 h-5 text-amber-500"></i>
                                <span>接待モード</span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="reception-toggle" class="sr-only peer">
                                <div class="w-12 h-6 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-slate-400 after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-600"></div>
                            </label>
                        </div>

                        <button id="save-btn" onclick="saveMeal()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-5 rounded-3xl font-black text-base uppercase tracking-widest shadow-lg active:scale-95 transition-all flex items-center justify-center space-x-2">
                            <span id="save-btn-text">レポを同期保存</span>
                        </button>
                    </div>
                </section>

                <!-- History -->
                <section>
                    <div class="flex items-center justify-between mb-4 px-1">
                        <h2 class="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">Today's Log</h2>
                    </div>
                    <div id="log-list" class="space-y-4"></div>
                </section>
            </div>

            <!-- Views: Suggest -->
            <div id="view-suggest" class="hidden space-y-2 animate-in slide-in-from-right-8 duration-300">
                <p class="text-xs text-slate-500 text-center py-2" id="suggest-status"></p>
                <div id="suggest-loading" class="space-y-3 hidden">
                    <div class="h-32 bg-slate-900 rounded-3xl loading-shimmer opacity-30"></div>
                    <div class="h-32 bg-slate-900 rounded-3xl loading-shimmer opacity-30"></div>
                    <div class="h-32 bg-slate-900 rounded-3xl loading-shimmer opacity-30"></div>
                </div>
                <div id="suggest-list" class="space-y-3"></div>
            </div>
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/90 backdrop-blur-xl border-t border-slate-800 flex justify-around p-4 safe-area-bottom shadow-2xl">
            <button onclick="switchView('record')" id="tab-record" class="flex flex-col items-center tab-active transition-all">
                <i data-lucide="plus-square" class="w-7 h-7"></i>
                <span class="text-[9px] font-black mt-1 uppercase">Record</span>
            </button>
            <button onclick="switchView('suggest')" id="tab-suggest" class="flex flex-col items-center tab-inactive transition-all">
                <i data-lucide="chef-hat" class="w-7 h-7"></i>
                <span class="text-[9px] font-black mt-1 uppercase">Suggest</span>
            </button>
            <button class="flex flex-col items-center tab-inactive opacity-30 cursor-not-allowed">
                <i data-lucide="bar-chart-3" class="w-7 h-7"></i>
                <span class="text-[9px] font-black mt-1 uppercase">Stats</span>
            </button>
        </nav>
    </div>

    <script>
        const apiKey = ""; // 実行環境から自動注入
        // --- 重要: ここをご自身のGASのデプロイURLに書き換えてください ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec"; 

        let state = {
            currentType: '昼',
            meals: [],
            targetProtein: 120,
            editingId: null,
            activeView: 'record'
        };

        function init() {
            lucide.createIcons();
            const saved = localStorage.getItem('nimo_today_meals');
            const savedDate = localStorage.getItem('nimo_last_save_date');
            if (saved && savedDate === new Date().toDateString()) {
                state.meals = JSON.parse(saved);
            }
            updateUI();
        }

        function switchView(view) {
            state.activeView = view;
            const recordView = document.getElementById('view-record');
            const suggestView = document.getElementById('view-suggest');
            const tabRecord = document.getElementById('tab-record');
            const tabSuggest = document.getElementById('tab-suggest');

            if (view === 'record') {
                recordView.classList.remove('hidden');
                suggestView.classList.add('hidden');
                tabRecord.classList.replace('tab-inactive', 'tab-active');
                tabSuggest.classList.replace('tab-active', 'tab-inactive');
            } else {
                recordView.classList.add('hidden');
                suggestView.classList.remove('hidden');
                tabRecord.classList.replace('tab-active', 'tab-inactive');
                tabSuggest.classList.replace('tab-inactive', 'tab-active');
                generateGeminiSuggestions();
            }
            lucide.createIcons();
            document.getElementById('main-scroll').scrollTop = 0;
        }

        // --- Gemini AI Logic ---
        async function fetchHistoryFromSheet() {
            if (GAS_URL.includes("ここに")) return [];
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                return Array.isArray(data) ? data : [];
            } catch (e) { return []; }
        }

        async function generateGeminiSuggestions() {
            const list = document.getElementById('suggest-list');
            const loading = document.getElementById('suggest-loading');
            const status = document.getElementById('suggest-status');
            
            list.innerHTML = "";
            loading.classList.remove('hidden');
            status.innerText = "過去のログと本日の摂取量を分析中...";

            const currentP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            const gap = state.targetProtein - currentP;

            if (gap <= 0) {
                loading.classList.add('hidden');
                status.innerText = "目標タンパク質達成済み！完璧な規律です。";
                list.innerHTML = '<div class="p-8 text-center text-emerald-400 font-bold italic text-xl">Perfect Goal Reached!</div>';
                return;
            }

            const history = await fetchHistoryFromSheet();
            const historyStr = history.length > 0 ? history.map(h => `${h.main}(${h.protein}g)`).join(", ") : "履歴なし";
            const todayStr = state.meals.length > 0 ? state.meals.map(m => m.main).join(", ") : "本日の摂取なし";

            const systemPrompt = `あなたはニモさん（INTJ-A, 外資系IT営業, 札幌在住, O型）専属の優秀な管理栄養士です。
目標タンパク質量120gを達成するための夕食を3案提案してください。今日の不足分は ${gap}g です。
【重要ルール】
1. 過去の履歴 [${historyStr}] や今日の摂取物 [${todayStr}] とメイン食材やジャンルを絶対に被らせない。
2. 日曜の夜なので、明日の16時間ファスティングに備えた持続性のあるタンパク質源を推奨する。
3. 札幌の寒さを考慮した温かいメニューを1つ以上含める。
4. 主菜と副菜をセットにし、論理的な解説（INTJ-A向け）を添える。
5. 出力は純粋なJSON配列のみとし、コードブロック（\`\`\`jsonなど）は一切使用しない。
JSON構造: [{"tag": "A案: P死守", "main": "主菜名", "side": "副菜名", "p": 数値, "desc": "解説"}, ...]`;

            try {
                const resultText = await callGemini(`不足分${gap}gを補完する3案を生成してください。`, systemPrompt);
                // Geminiがコードブロックで囲んだ場合のクレンジング
                const cleanedJson = resultText.replace(/```json|```/g, "").trim();
                const options = JSON.parse(cleanedJson);
                
                loading.classList.add('hidden');
                status.innerText = `残り ${gap}g を補完するAI推奨案です。`;
                
                list.innerHTML = options.map(opt => `
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl space-y-2 animate-in slide-in-from-bottom-2">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-xs font-black text-emerald-500 uppercase tracking-widest">${opt.tag}</span>
                            <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded-xl text-lg font-black tracking-tighter shadow-inner">
                                +${opt.p}g <span class="text-xs font-normal">P</span>
                            </span>
                        </div>
                        <div>
                            <h3 class="text-white font-black text-xl tracking-tight leading-tight">${opt.main}</h3>
                            <p class="text-slate-400 text-sm mt-1 flex items-center">
                                <i data-lucide="info" class="w-4 h-4 mr-1.5 text-emerald-600"></i> ${opt.side}
                            </p>
                        </div>
                        <p class="text-slate-500 text-xs leading-snug italic border-t border-slate-800 pt-2 opacity-80">${opt.desc}</p>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) {
                loading.classList.add('hidden');
                status.innerText = "推奨エンジンの解析に失敗しました。API設定を確認してください。";
                console.error("Gemini Parse Error:", e);
            }
        }

        async function callGemini(prompt, system, retries = 5) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: system }] },
                generationConfig: { 
                    responseMimeType: "application/json",
                    temperature: 0.7
                }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const resp = await fetch(url, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload) 
                    });
                    if (!resp.ok) throw new Error(`HTTP error! status: ${resp.status}`);
                    const result = await resp.json();
                    return result.candidates[0].content.parts[0].text;
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        // --- Core App Logic ---
        function showStatus(msg, isError = false) {
            const container = document.getElementById('sync-status');
            const pill = document.createElement('div');
            pill.className = `status-pill px-4 py-1 rounded-full text-xs font-black shadow-2xl ${isError ? 'bg-red-500 text-white' : 'bg-emerald-500 text-white'}`;
            pill.innerText = msg;
            container.innerHTML = '';
            container.appendChild(pill);
            setTimeout(() => pill.remove(), 3000);
        }

        async function testConnection() {
            showStatus("接続テスト中...");
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'TEST', main: '接続テスト', side: '疎通確認', protein: 0, isReception: false }) });
                showStatus("同期テスト完了！");
            } catch (e) { showStatus("接続失敗", true); }
        }

        function setType(type) {
            state.currentType = type;
            const buttons = document.querySelectorAll('.type-btn');
            buttons.forEach(btn => {
                if (btn.innerText === type) {
                    btn.classList.add('bg-emerald-600', 'text-white', 'shadow-lg');
                    btn.classList.remove('text-slate-500');
                } else {
                    btn.classList.remove('bg-emerald-600', 'text-white', 'shadow-lg');
                    btn.classList.add('text-slate-500');
                }
            });
        }

        function updateProteinLabel(val) { document.getElementById('protein-val').innerText = val + 'g'; }

        async function saveMeal() {
            const main = document.getElementById('main-menu').value;
            const side = document.getElementById('side-menu').value;
            const p = parseInt(document.getElementById('protein-slider').value);
            const isRec = document.getElementById('reception-toggle').checked;
            if (!main) return alert("主菜を入力してください");

            const meal = { id: state.editingId || Date.now(), type: state.currentType, main, side: side || '-', protein: p, isReception: isRec, time: new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}) };
            if (state.editingId) {
                const idx = state.meals.findIndex(m => m.id === state.editingId);
                state.meals[idx] = meal;
                state.editingId = null;
            } else { state.meals.unshift(meal); }

            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            updateUI();
            resetForm();

            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i data-lucide="loader-2" class="animate-spin w-4 h-4 mr-2"></i> 同期中...';
            lucide.createIcons();

            try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(meal) }); showStatus("同期完了"); }
            catch (e) { showStatus("同期失敗", true); }
            finally { saveBtn.disabled = false; saveBtn.innerHTML = '<span>レポを同期保存</span>'; lucide.createIcons(); }
        }

        function recordQuickBreakfast() {
            const breakfast = { id: Date.now(), type: '朝', main: '朝セット', side: 'マカ・プロテイン・コーヒー', protein: 30, isReception: false, time: new Date().toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}) };
            state.meals.unshift(breakfast);
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            updateUI();
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(breakfast) });
        }

        function updateUI() {
            const totalP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            document.getElementById('current-p').innerHTML = `${totalP}<span class="text-sm text-slate-600 font-normal ml-1">/ ${state.targetProtein}g</span>`;
            document.getElementById('p-bar').style.width = Math.min((totalP / state.targetProtein) * 100, 100) + '%';
            const logList = document.getElementById('log-list');
            if (state.meals.length === 0) { logList.innerHTML = '<div class="text-center py-10 text-slate-700 text-sm italic">本日のログはありません</div>'; }
            else {
                logList.innerHTML = state.meals.map(m => `
                    <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-[1.5rem] flex items-center justify-between shadow-lg">
                        <div class="flex items-center space-x-4">
                            <div class="w-11 h-11 bg-slate-800 rounded-2xl flex items-center justify-center text-xs font-black text-slate-500 border border-slate-700 uppercase">${m.type}</div>
                            <div>
                                <p class="text-lg font-bold text-white leading-none mb-1">${m.main}</p>
                                <p class="text-sm text-slate-500">${m.side} • ${m.time}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="text-right">
                                <span class="text-lg font-black text-emerald-400">+${m.protein}g</span>
                                ${m.isReception ? '<div class="text-[9px] text-amber-500 font-black uppercase mt-1">接待</div>' : ''}
                            </div>
                            <div class="flex flex-col space-y-2 border-l border-slate-800 pl-4 ml-2">
                                <button onclick="editMeal(${m.id})" class="text-slate-600 hover:text-emerald-400"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                                <button onclick="deleteMeal(${m.id})" class="text-slate-600 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function editMeal(id) {
            const m = state.meals.find(meal => meal.id === id);
            state.editingId = id; setType(m.type);
            document.getElementById('main-menu').value = m.main;
            document.getElementById('side-menu').value = m.side;
            document.getElementById('protein-slider').value = m.protein;
            updateProteinLabel(m.protein);
            document.getElementById('reception-toggle').checked = m.isReception;
            document.getElementById('form-container').classList.add('edit-mode');
            document.getElementById('form-title').innerText = "修正中";
            document.getElementById('save-btn-text').innerText = "修正を確定";
            document.getElementById('cancel-edit').classList.remove('hidden');
            document.getElementById('main-scroll').scrollTop = 0;
        }

        function cancelEdit() { state.editingId = null; resetForm(); }

        function deleteMeal(id) {
            if (!confirm("削除しますか？")) return;
            state.meals = state.meals.filter(m => m.id !== id);
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            updateUI();
        }

        function resetForm() {
            document.getElementById('main-menu').value = '';
            document.getElementById('side-menu').value = '';
            document.getElementById('protein-slider').value = 25;
            updateProteinLabel(25);
            document.getElementById('reception-toggle').checked = false;
            document.getElementById('form-container').classList.remove('edit-mode');
            document.getElementById('form-title').innerText = "Meal Report";
            document.getElementById('save-btn-text').innerText = "レポを同期保存";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
