
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MEAL OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #05060a;
  --s1:        #0b0d14;
  --s2:        #111420;
  --border:    #1a1e2e;
  --brt:       #252a3e;
  --gold:      #10b981;
  --gold-dim:  rgba(16,185,129,0.08);
  --gold-mid:  rgba(16,185,129,0.18);
  --gold-glow: rgba(16,185,129,0.35);
  --text:      #dde0ea;
  --muted:     #454a60;
  --muted2:    #2a2f45;
  --danger:    #e05a6a;
  --mono: 'DM Mono', monospace;
  --serif: 'DM Serif Display', serif;
  --sans: 'Noto Sans JP', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--sans);color:var(--text);}

/* noise texture overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.5;
}

#app{
  max-width:430px;margin:0 auto;height:100dvh;
  display:flex;flex-direction:column;
  background:var(--bg);
  position:relative;overflow:hidden;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  z-index:1;
}

/* ── AMBIENT GLOW ── */
.glow-orb{
  position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
  pointer-events:none;z-index:0;
  top:-80px;left:50%;transform:translateX(-50%);
}

/* ── HEADER ── */
header{
  background:linear-gradient(180deg,var(--s1) 0%, var(--bg) 100%);
  border-bottom:1px solid var(--border);
  padding:18px 20px 22px;
  flex-shrink:0;position:relative;z-index:10;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.logo-block{}
.logo-main{
  font-family:var(--serif);
  font-size:20px;letter-spacing:0.04em;
  color:var(--gold);
  line-height:1;
}
.logo-sub{
  font-family:var(--mono);font-size:8px;
  color:var(--muted);letter-spacing:0.25em;
  text-transform:uppercase;margin-top:5px;
}
.hdr-right{display:flex;align-items:center;gap:8px;}
.date-chip{
  font-family:var(--mono);font-size:8px;
  color:var(--muted);letter-spacing:0.1em;
  background:var(--s2);border:1px solid var(--border);
  padding:5px 10px;border-radius:20px;
}
.sync-btn{
  width:32px;height:32px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;color:var(--muted);
}
.sync-btn:active{transform:scale(0.9);border-color:var(--gold);}
.sync-btn svg{width:13px;height:13px;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* gauge */
.gauge-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.gauge-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;}
.gauge-main{display:flex;align-items:baseline;gap:4px;}
.gauge-val{
  font-family:var(--serif);font-size:36px;
  color:var(--gold);line-height:1;
}
.gauge-unit{font-family:var(--mono);font-size:10px;color:var(--muted);}
.gauge-track{
  height:2px;background:var(--border);
  border-radius:1px;overflow:visible;
  position:relative;margin-bottom:10px;
}
.gauge-fill{
  height:100%;background:linear-gradient(90deg,#059669,var(--gold));
  border-radius:1px;
  transition:width 1s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
.gauge-fill::after{
  content:'';position:absolute;right:-1px;top:-4px;
  width:10px;height:10px;background:var(--gold);border-radius:50%;
  box-shadow:0 0 12px var(--gold-glow),0 0 4px var(--gold);
}
.gauge-meta{display:flex;justify-content:space-between;}
.g-pct,.g-gap{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.1em;}
.g-gap em{color:var(--gold);font-style:normal;}

/* ── MAIN SCROLL ── */
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
main::-webkit-scrollbar{display:none;}
.tab-pane{display:none;padding:18px 14px 130px;}
.tab-pane.active{display:block;}

/* section heading */
.sec-hd{
  font-family:var(--mono);font-size:8px;color:var(--muted);
  letter-spacing:0.25em;text-transform:uppercase;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border);}

/* quick btn */
.quick-btn{
  width:100%;background:var(--s1);
  border:1px solid var(--border);border-radius:16px;
  padding:14px 16px;display:flex;align-items:center;
  justify-content:space-between;cursor:pointer;
  transition:all 0.2s;margin-bottom:14px;
}
.quick-btn:active{border-color:var(--gold);background:var(--gold-dim);}
.q-left{display:flex;align-items:center;gap:12px;}
.q-icon{
  width:38px;height:38px;background:var(--gold-dim);
  border:1px solid rgba(16,185,129,0.15);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.q-title{font-size:13px;font-weight:700;color:var(--text);}
.q-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-top:3px;}
.q-arr{color:var(--muted);}
.q-arr svg{width:14px;height:14px;}

/* form card */
.form-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:18px;margin-bottom:16px;
}
.type-row{
  display:flex;background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:3px;gap:2px;margin-bottom:16px;
}
.type-btn{
  flex:1;padding:8px 0;
  font-family:var(--mono);font-size:9px;font-weight:500;
  letter-spacing:0.1em;border:none;background:transparent;
  color:var(--muted);border-radius:8px;cursor:pointer;transition:all 0.2s;
}
.type-btn.on{background:var(--gold);color:var(--bg);}
.fld-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;}
.txt-in{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;
  font-family:var(--sans);font-size:14px;font-weight:700;
  color:var(--text);outline:none;transition:border-color 0.2s;margin-bottom:14px;
}
.txt-in:focus{border-color:var(--gold);}
.txt-in::placeholder{color:var(--muted2);font-weight:300;}

/* slider */
.sl-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.sl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sl-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;}
.sl-val{font-family:var(--serif);font-size:26px;color:var(--gold);line-height:1;}
.sl-val span{font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:2px;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--brt);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  background:var(--gold);border-radius:50%;
  border:2px solid var(--bg);
  box-shadow:0 0 10px var(--gold-glow);cursor:pointer;
}
.save-btn{
  width:100%;background:var(--gold);color:var(--bg);
  border:none;border-radius:12px;padding:15px;
  font-family:var(--mono);font-size:10px;font-weight:500;
  letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;
  transition:all 0.15s;
}
.save-btn:active{transform:scale(0.98);opacity:0.9;}

/* log items */
.log-item{
  background:var(--s1);border:1px solid var(--border);
  border-radius:14px;padding:13px 16px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;animation:fadeUp 0.25s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.li-left{display:flex;align-items:center;gap:12px;}
.li-badge{
  font-family:var(--mono);font-size:8px;font-weight:500;
  width:30px;height:30px;background:var(--bg);
  border:1px solid var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);flex-shrink:0;letter-spacing:0.05em;
}
.li-name{font-size:13px;font-weight:700;color:var(--text);}
.li-time{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px;}
.li-p{font-family:var(--serif);font-size:18px;color:var(--gold);flex-shrink:0;}
.empty-st{text-align:center;padding:36px 20px;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:0.15em;}

/* ── SUGGEST TAB ── */
.suggest-hero{
  background:linear-gradient(135deg,var(--s2) 0%, #0e1020 100%);
  border:1px solid rgba(16,185,129,0.2);
  border-radius:20px;padding:20px;margin-bottom:18px;
  position:relative;overflow:hidden;
}
.suggest-hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;
  background:radial-gradient(circle,rgba(16,185,129,0.08) 0%,transparent 70%);
  border-radius:50%;
}
.sh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.sh-badge{
  font-family:var(--mono);font-size:8px;color:var(--gold);
  letter-spacing:0.2em;text-transform:uppercase;
  background:var(--gold-dim);border:1px solid rgba(16,185,129,0.2);
  padding:4px 10px;border-radius:20px;
}
.sh-tonight{font-size:22px;margin-top:2px;}
.sh-title{font-family:var(--serif);font-size:14px;color:var(--muted);margin-bottom:4px;}
.sh-gap{font-family:var(--serif);font-size:34px;color:var(--text);line-height:1;}
.sh-gap em{font-family:var(--mono);font-size:12px;color:var(--gold);font-style:normal;margin-left:4px;}
.sh-reason{
  font-family:var(--mono);font-size:8px;color:var(--muted);
  letter-spacing:0.1em;margin-top:4px;
}
.sh-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.sh-pill{
  font-family:var(--mono);font-size:7px;letter-spacing:0.1em;
  padding:4px 10px;border-radius:20px;text-transform:uppercase;
  background:var(--s1);border:1px solid var(--border);color:var(--muted);
}
.sh-pill.active{background:var(--gold-dim);border-color:rgba(16,185,129,0.3);color:var(--gold);}

.sug-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:10px;
  position:relative;overflow:hidden;
  transition:all 0.2s;
}
.sug-card:active{transform:scale(0.99);}
.sug-card.best{border-color:rgba(16,185,129,0.35);}
.sug-card.best::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.sug-accent{
  position:absolute;top:-20px;right:-20px;
  width:100px;height:100px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 70%);
}
.sug-rank{
  font-family:var(--mono);font-size:8px;color:var(--muted);
  letter-spacing:0.2em;text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:8px;
}
.sug-rank-num{
  font-family:var(--serif);font-size:13px;
  color:var(--gold);
}
.sug-best-badge{
  font-family:var(--mono);font-size:7px;
  background:var(--gold-dim);border:1px solid rgba(16,185,129,0.3);
  color:var(--gold);padding:2px 8px;border-radius:10px;
  letter-spacing:0.15em;
}
.sug-main-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.sug-name{font-family:var(--serif);font-size:20px;color:var(--text);line-height:1.2;flex:1;}
.sug-p{
  font-family:var(--serif);font-size:26px;color:var(--gold);
  line-height:1;flex-shrink:0;margin-left:12px;
}
.sug-p span{font-family:var(--mono);font-size:9px;color:var(--muted);}
.sug-side{font-size:11px;color:var(--muted);margin-bottom:10px;font-weight:300;}
.sug-reason{
  font-family:var(--mono);font-size:8px;color:var(--muted);
  letter-spacing:0.08em;margin-bottom:12px;line-height:1.6;
}
.sug-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.sug-tag{
  font-family:var(--mono);font-size:7px;letter-spacing:0.1em;
  padding:3px 8px;background:var(--bg);border:1px solid var(--border);
  border-radius:6px;color:var(--muted);
}
.sug-tag.hl{border-color:rgba(16,185,129,0.3);color:var(--gold);}
.sug-cta{
  width:100%;background:var(--gold-dim);border:1px solid rgba(16,185,129,0.25);
  border-radius:10px;padding:11px;
  font-family:var(--mono);font-size:8px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gold);cursor:pointer;transition:all 0.15s;text-align:center;
}
.sug-cta:active{background:var(--gold-mid);}
.sug-cta.full{background:var(--gold);color:var(--bg);}

.goal-wrap{text-align:center;padding:60px 20px;animation:fadeUp 0.4s ease-out;}
.goal-ring{
  width:80px;height:80px;border-radius:50%;
  border:1px solid rgba(16,185,129,0.4);
  background:var(--gold-dim);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:30px;
}
.goal-title{font-family:var(--serif);font-size:20px;color:var(--gold);margin-bottom:6px;}
.goal-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.15em;}

/* ── STATS TAB ── */
.stats-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:18px;padding:20px;margin-bottom:14px;
}
.bar-area{display:flex;gap:5px;align-items:flex-end;height:90px;}
.bar-col-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.bar-space{flex:1;width:100%;display:flex;align-items:flex-end;}
.bar-fill{
  width:100%;border-radius:4px 4px 0 0;min-height:3px;
  background:var(--brt);transition:height 0.7s ease-out;
}
.bar-fill.ok{background:linear-gradient(180deg,var(--gold) 0%,#047857 100%);}
.bar-fill.today{box-shadow:0 0 8px var(--gold-glow);}
.bar-day{font-family:var(--mono);font-size:8px;color:var(--muted);text-align:center;}
.bar-today{color:var(--gold);}
.stats-divider{height:1px;background:var(--border);margin:14px 0;}
.stats-kv-row{display:flex;justify-content:space-between;align-items:center;}
.stats-kv-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;}
.stats-kv-val{font-family:var(--serif);font-size:18px;color:var(--text);}
.streak-row{display:flex;gap:5px;margin-top:14px;}
.streak-dot{
  flex:1;height:6px;border-radius:3px;
  background:var(--border);
}
.streak-dot.ok{background:var(--gold);}

/* ── NAV ── */
nav{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(5,6,10,0.96);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;
  padding:10px 0 max(10px, env(safe-area-inset-bottom));
  z-index:100;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;padding:6px 20px;border-radius:12px;
  transition:all 0.2s;color:var(--muted);
}
.nav-btn.on{color:var(--gold);}
.nav-btn svg{width:20px;height:20px;}
.nav-lbl{font-family:var(--mono);font-size:7px;letter-spacing:0.2em;text-transform:uppercase;}
.nav-pip{width:3px;height:3px;background:var(--gold);border-radius:50%;margin-top:-2px;opacity:0;transition:opacity 0.2s;}
.nav-btn.on .nav-pip{opacity:1;}

/* toast */
.toast-host{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:999;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px;
}
.toast{
  background:var(--gold);color:var(--bg);
  padding:8px 18px;border-radius:20px;
  font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.15em;
  animation:tin 0.2s ease-out, tout 0.2s 2.6s ease-in forwards;
}
@keyframes tin{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
@keyframes tout{to{opacity:0;transform:translateY(-6px);}}

/* ── LOG SWIPE ACTIONS ── */
.li-wrap{position:relative;overflow:hidden;border-radius:14px;margin-bottom:8px;}
.li-actions{
  position:absolute;right:0;top:0;bottom:0;
  display:flex;align-items:stretch;
  transform:translateX(100%);
  transition:transform 0.25s ease;
  border-radius:0 14px 14px 0;overflow:hidden;
}
.li-actions.show{transform:translateX(0);}
.li-act-edit,.li-act-del{
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;padding:0 16px;min-width:62px;
  font-family:var(--mono);font-size:7px;letter-spacing:0.1em;
  border:none;cursor:pointer;
}
.li-act-edit{background:#0d2418;color:var(--gold);}
.li-act-del{background:#2a1418;color:#e05a6a;}
.li-act-edit svg,.li-act-del svg{width:15px;height:15px;}

/* ── EDIT MODAL ── */
.modal-back{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.72);
  backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.modal-back.open{opacity:1;pointer-events:all;}
.modal-sheet{
  background:var(--s1);
  border:1px solid var(--border);
  border-top:1px solid var(--brt);
  border-radius:24px 24px 0 0;
  padding:20px 20px max(24px,env(safe-area-inset-bottom));
  width:100%;max-width:430px;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
.modal-back.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:3px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:var(--serif);font-size:18px;color:var(--text);margin-bottom:18px;}
.modal-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;}
.modal-in{
  width:100%;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:13px 16px;
  font-family:var(--sans);font-size:14px;font-weight:700;
  color:var(--text);outline:none;margin-bottom:14px;transition:border-color 0.2s;
}
.modal-in:focus{border-color:var(--gold);}
.modal-type-row{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;margin-bottom:14px;}
.modal-type-btn{
  flex:1;padding:7px 0;font-family:var(--mono);font-size:9px;font-weight:500;
  letter-spacing:0.1em;border:none;background:transparent;
  color:var(--muted);border-radius:8px;cursor:pointer;transition:all 0.2s;
}
.modal-type-btn.on{background:var(--gold);color:var(--bg);}
.modal-sl-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:16px;}
.modal-sl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.modal-sl-lbl{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;}

.modal-sl-val span{font-family:var(--mono);font-size:9px;color:var(--muted);}
.modal-btns{display:flex;gap:10px;}
.modal-cancel{

}
.modal-save{

  color:var(--bg);font-weight:500;cursor:pointer;text-transform:uppercase;
  transition:opacity 0.15s;
}
.modal-save:active{opacity:0.85;}

/* ── CONFIRM DELETE ── */
.confirm-back{
  position:fixed;inset:0;z-index:210;
  background:rgba(0,0,0,0.78);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.2s;
}
.confirm-back.open{opacity:1;pointer-events:all;}
.confirm-box{
  background:var(--s1);border:1px solid var(--border);
  border-radius:20px;padding:28px 24px;
  width:calc(100% - 40px);max-width:360px;text-align:center;
  transform:scale(0.93);transition:transform 0.25s cubic-bezier(0.34,1.4,0.64,1);
}
.confirm-back.open .confirm-box{transform:scale(1);}
.confirm-icon{font-size:30px;margin-bottom:12px;}
.confirm-title{font-family:var(--serif);font-size:17px;color:var(--text);margin-bottom:6px;}
.confirm-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.1em;margin-bottom:16px;line-height:1.7;}
.confirm-name{
  background:var(--bg);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;
  font-size:13px;font-weight:700;color:var(--text);margin-bottom:20px;
}
.confirm-acts{display:flex;gap:10px;}
.conf-cancel{
  flex:1;background:var(--bg);border:1px solid var(--border);
  border-radius:12px;padding:13px;

<!-- HEADER -->
<header>

<main>

  { main:"ホタテのカルパッチョ",    p:20.0, side:"ベビーリーフ・オリーブ油",        tags:["タウリン","低GI","血管柔軟性"],             season:[2,3,4,5,6,7,8], dow:WE },
  { main:"スモークサーモンとアボカド",p:19.0,side:"くるみ・オニオンサラダ",         tags:["オメガ3","ビタミンE","ホルモン"],           season:ALL,  dow:WE },
  { main:"納豆オムレツ",            p:20.5, side:"しらす・大根おろし",              tags:["納豆キナーゼ","血栓予防","完全栄養"],       season:ALL,  dow:WD },
  { main:"いわし団子汁",            p:20.0, side:"根菜たっぷり煮物",               tags:["いわし","血管年齢","EPA"],                  season:WIN,  dow:W  },
  { main:"サバ味噌煮缶",            p:20.9, side:"雑穀米(少量)・生姜漬",           tags:["サバ","Tie2","時短"],                       season:ALL,  dow:WD },
  { main:"豆乳担々湯豆腐",          p:23.0, side:"挽肉(少)・ザーサイ",             tags:["サポニン","温活","血糖スパイク防止"],       season:WIN,  dow:W  },
];

// ── STATE ────────────────────────────────────────────────────────────────────
const S = { history:[], today:[], type:'昼' };

// ── BOOT ─────────────────────────────────────────────────────────────────────
(function init(){
  const now = new Date();
  const dayNames = ['日','月','火','水','木','金','土'];
  document.getElementById('date-chip').textContent =
    `${now.getMonth()+1}/${now.getDate()}(${dayNames[now.getDay()]})`;
  fetchData();
})();

async function fetchData(){
  const ico = document.getElementById('sync-ico');
  ico.classList.add('spin');
  try {
    const r = await fetch(GAS);
    const raw = await r.json();
    S.history = raw.map(d=>({
      main:(d.main||d.mainMenu||'').trim(),
      protein:parseFloat(d.protein||0),
      timestamp:d.timestamp,
      type:d.type||d.mealType||'他'
    })).filter(d=>d.main);
    const ts = new Date().toDateString();
    S.today = S.history.filter(m=>new Date(m.timestamp).toDateString()===ts);
    toast('SYNC COMPLETE');
  } catch(e){ toast('OFFLINE MODE'); }
  ico.classList.remove('spin');
  renderAll();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderAll(){
  renderHeader();
  renderLog();
  renderSuggest();
  renderStats();
}

function renderHeader(){
  const tot = S.today.reduce((s,m)=>s+m.protein,0);
  const gap = Math.max(0,TARGET-tot);
  const pct = Math.min(tot/TARGET*100,100);
  document.getElementById('hdr-p').textContent = tot.toFixed(1);
  document.getElementById('g-fill').style.width = pct+'%';
  document.getElementById('g-pct').textContent = pct.toFixed(0)+'% Done';
  document.getElementById('g-gap').textContent = gap.toFixed(1)+'g';
}

function renderLog(){
  const el = document.getElementById('log-list');
  if(!S.today.length){
    el.innerHTML='<div class="empty-st">本日の記録はまだありません</div>';return;
  }
  el.innerHTML=S.today.map((m,i)=>{
    const t=new Date(m.timestamp);
    const hm=t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
    return `
    <div class="li-wrap" id="liwrap-${i}">
      <div class="log-item" id="liitem-${i}"
        data-idx="${i}"
        ontouchstart="swipeStart(event,${i})"
        ontouchmove="swipeMove(event,${i})"
        ontouchend="swipeEnd(event,${i})">
        <div class="li-left">
          <div class="li-badge">${m.type}</div>
          <div>
            <div class="li-name">${m.main}</div>
            <div class="li-time">${hm}</div>
          </div>
        </div>
        <div class="li-p">${m.protein.toFixed(1)}g</div>
      </div>
      <div class="li-actions" id="liact-${i}">
        <button class="li-act-edit" onclick="openEdit(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          修正
        </button>
        <button class="li-act-del" onclick="openConfirm(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          削除
        </button>
      </div>
    </div>`;
  }).join('');
}

function renderSuggest(){
  const el = document.getElementById('sug-inner');
  const tot = S.today.reduce((s,m)=>s+m.protein,0);
  const gap = Math.max(0,TARGET-tot);

  if(gap<=0){
    el.innerHTML=`<div class="goal-wrap"><div class="goal-ring">✓</div><div class="goal-title">Goal Achieved</div><div class="goal-sub">Discipline leads to freedom.</div></div>`;
    return;
  }

  const now = new Date();
  const mon = now.getMonth();    // 0-11
  const dow = now.getDay();      // 0=日
  const isWeekend = (dow===0||dow===6);

  // 過去7日履歴で重複チェック
  const ago7 = Date.now() - 7*864e5;
  const recentNames = S.history
    .filter(m=>new Date(m.timestamp).getTime()>ago7)
    .map(m=>m.main.toLowerCase().trim());

  // フィルタリング（季節・曜日・重複）
  let pool = MENUS.filter(m=>{
    const nm = m.main.toLowerCase();
    const notRecent = !recentNames.some(r=>nm.includes(r)||r.includes(nm));
    const seasonOk = m.season.includes(mon);
    const dowOk = m.dow.includes(dow);
    return notRecent && seasonOk && dowOk;
  });
  if(pool.length<3) pool = MENUS.filter(m=>!recentNames.some(r=>m.main.toLowerCase().includes(r)));
  if(pool.length<3) pool = [...MENUS];

  // gap に近い順でソート
  const sorted = [...pool].sort((a,b)=>Math.abs(gap-a.p)-Math.abs(gap-b.p)).slice(0,3);

  // 今日の朝・昼から摂取状況を読む
  const morningP = S.today.filter(m=>m.type==='朝').reduce((s,m)=>s+m.protein,0);
  const lunchP   = S.today.filter(m=>m.type==='昼').reduce((s,m)=>s+m.protein,0);
  const reasonParts = [];
  if(morningP>0) reasonParts.push(`朝 ${morningP.toFixed(0)}g`);
  if(lunchP>0)   reasonParts.push(`昼 ${lunchP.toFixed(0)}g`);
  const ctxLine = reasonParts.length
    ? `${reasonParts.join(' + ')} 摂取済み → 夜に ${gap.toFixed(0)}g 必要`
    : `今日の摂取 ${tot.toFixed(0)}g → 夜に ${gap.toFixed(0)}g 必要`;

  // season label
  const seasonLabel = ['冬','冬','春','春','春','夏','夏','夏','秋','秋','秋','冬'][mon];
  const weekdayLabel = isWeekend ? '週末' : '平日';

  const heroHtml = `
  <div class="suggest-hero">
    <div class="sh-top">
      <div>
        <div class="sh-badge">Tonight's Target</div>
        <div class="sh-title">夕食で補うべきタンパク質</div>
        <div class="sh-gap">${gap.toFixed(1)}<em>g 不足</em></div>
        <div class="sh-reason">${ctxLine}</div>
      </div>
      <div class="sh-tonight">🌙</div>
    </div>
    <div class="sh-pills">
      <div class="sh-pill active">${seasonLabel}</div>
      <div class="sh-pill active">${weekdayLabel}</div>
      <div class="sh-pill active">過去7日重複回避</div>
      <div class="sh-pill">Gap: ${gap.toFixed(0)}g</div>
    </div>
  </div>`;

  const cardsHtml = sorted.map((opt,i)=>{
    const diff = Math.abs(gap-opt.p);
    const isBest = i===0;
    const matchGap = diff<=5;
    const tagsHtml = opt.tags.map(t=>`<span class="sug-tag ${matchGap?'hl':''}">${t}</span>`).join('');
    let reason = '';
    if(isBest && matchGap) reason = `ギャップ差 ${diff.toFixed(1)}g — 今夜の最適解です。`;
    else if(isBest) reason = `最もバランスの取れた選択肢です。`;
    else reason = `代替案。摂取量の調整で目標達成可能です。`;
    return `
    <div class="sug-card ${isBest?'best':''}">
      <div class="sug-accent"></div>
      <div class="sug-rank">
        <span class="sug-rank-num">${['I','II','III'][i]}</span>
        Option ${['A','B','C'][i]}
        ${isBest?'<span class="sug-best-badge">Best Match</span>':''}
      </div>
      <div class="sug-main-row">
        <div class="sug-name">${opt.main}</div>
        <div class="sug-p">${opt.p.toFixed(1)}<span>g</span></div>
      </div>
      <div class="sug-side">副菜：${opt.side}</div>
      <div class="sug-reason">${reason}</div>
      <div class="sug-tags">${tagsHtml}</div>
      <button class="sug-cta ${isBest?'full':''}" onclick="addFromSuggest('${opt.main.replace(/'/g,"\\'")}',${opt.p})">この夕食を記録 →</button>
    </div>`;
  }).join('');

  el.innerHTML = heroHtml + `<div class="sec-hd">Recommended Dinner</div>` + cardsHtml;
}

function renderStats(){
  const DAY_LBL = ['日','月','火','水','木','金','土'];
  const days = [];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const tot=S.history.filter(m=>new Date(m.timestamp).toDateString()===ds).reduce((s,m)=>s+m.protein,0);
    days.push({lbl:DAY_LBL[d.getDay()],tot,isToday:i===0,ok:tot>=TARGET});
  }
  const maxV = Math.max(...days.map(d=>d.tot),TARGET,1);
  document.getElementById('bar-area').innerHTML = days.map(d=>`
    <div class="bar-col-w">
      <div class="bar-space">
        <div class="bar-fill ${d.ok?'ok':''} ${d.isToday?'today':''}" style="height:${Math.max(d.tot/maxV*100,3)}%"></div>
      </div>
      <div class="bar-day ${d.isToday?'bar-today':''}">${d.lbl}</div>
    </div>`).join('');

  const withData=days.filter(d=>d.tot>0);
  const avg=withData.length?(withData.reduce((s,d)=>s+d.tot,0)/withData.length).toFixed(1):'—';
  document.getElementById('weekly-avg').textContent = avg+(avg!=='—'?'g':'');
  document.getElementById('streak-row').innerHTML = days.map(d=>`<div class="streak-dot ${d.ok?'ok':''}"></div>`).join('');

  const recent=[...S.history].reverse().slice(0,8);
  document.getElementById('recent-list').innerHTML = recent.length
    ? recent.map(m=>{
        const t=new Date(m.timestamp);
        return `<div class="log-item">
          <div class="li-left">
            <div class="li-badge">${m.type}</div>
            <div>
              <div class="li-name">${m.main}</div>
              <div class="li-time">${t.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})} ${t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>
          <div class="li-p">${m.protein.toFixed(1)}g</div>
        </div>`;
      }).join('')
    : '<div class="empty-st">データなし</div>';
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function switchTab(id){
  ['log','suggest','stats'].forEach(t=>{
    document.getElementById('pane-'+t).classList.toggle('active',t===id);
    document.getElementById('nav-'+t).classList.toggle('on',t===id);
  });
  if(id==='suggest') renderSuggest();
  if(id==='stats') renderStats();
}

function setType(t,btn){
  S.type=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function saveForm(){
  const main=document.getElementById('in-main').value.trim();
  const p=parseFloat(document.getElementById('in-p').value);
  if(!main){toast('主菜を入力してください');return;}
  await save({main,protein:p,type:S.type});
  document.getElementById('in-main').value='';
  document.getElementById('in-p').value=25;
  document.getElementById('sl-val').innerHTML='25.0<span>g</span>';
}

async function recordBreakfast(){
  await save({main:'朝セット',protein:45.0,type:'朝'});
}

async function addFromSuggest(main,p){
  await save({main,protein:p,type:'夜'});
  switchTab('log');
}

async function save(data){
  const meal={...data,timestamp:new Date().toISOString()};
  S.today=[meal,...S.today];
  S.history=[meal,...S.history];
  renderAll();
  try{
    await fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify(meal)});
    toast('SAVED');
  }catch(e){toast('OFFLINE SAVE');}
}

// ── SWIPE TO REVEAL ──────────────────────────────────────────────────────────
const _sw = {}; // {idx: {startX, startY, open}}
function swipeStart(e,i){
  const t=e.touches[0];
  _sw[i]={startX:t.clientX,startY:t.clientY,open:false};
}
function swipeMove(e,i){
  if(!_sw[i]) return;
  const t=e.touches[0];
  const dx=_sw[i].startX-t.clientX;
  const dy=Math.abs(_sw[i].startY-t.clientY);
  if(dy>dx) return; // vertical scroll wins
  const act=document.getElementById('liact-'+i);
  const THRESHOLD=80;
  if(dx>THRESHOLD){
    closeAllSwipes(i);
    act.classList.add('show');
    _sw[i].open=true;
  } else if(dx<-10){
    act.classList.remove('show');
    _sw[i].open=false;
  }
}
function swipeEnd(e,i){}
function closeAllSwipes(except){
  document.querySelectorAll('.li-actions').forEach((el,j)=>{
    if(j!==except) el.classList.remove('show');
  });
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.li-wrap')) closeAllSwipes(-1);
});

// ── EDIT MODAL ───────────────────────────────────────────────────────────────
let _editIdx = null;
let _editType = '昼';

function openEdit(i){
  closeAllSwipes(-1);
  _editIdx=i;
  const m=S.today[i];
  _editType=m.type;
  document.getElementById('edit-main').value=m.main;
  document.getElementById('edit-p').value=m.protein;
  document.getElementById('edit-sl-val').innerHTML=m.protein.toFixed(1)+'<span>g</span>';
  // set type buttons
  document.querySelectorAll('.modal-type-btn').forEach(b=>{
    b.classList.toggle('on', b.textContent===m.type);
  });
  document.getElementById('edit-modal').classList.add('open');
}
function setEditType(t,btn){
  _editType=t;
  document.querySelectorAll('.modal-type-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function closeEditModal(e){
  if(e && e.target!==document.getElementById('edit-modal')) return;
  document.getElementById('edit-modal').classList.remove('open');
}
function commitEdit(){
  if(_editIdx===null) return;
  const main=document.getElementById('edit-main').value.trim();
  const p=parseFloat(document.getElementById('edit-p').value);
  if(!main){toast('主菜を入力してください');return;}
  // update state
  S.today[_editIdx]={...S.today[_editIdx],main,protein:p,type:_editType};
  // sync S.history too (match by timestamp)
  const ts=S.today[_editIdx].timestamp;
  const hi=S.history.findIndex(m=>m.timestamp===ts);
  if(hi>=0) S.history[hi]={...S.history[hi],main,protein:p,type:_editType};
  document.getElementById('edit-modal').classList.remove('open');
  renderAll();
  toast('UPDATED');
  // GAS update (send with _action=update)
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'update',timestamp:ts,main,protein:p,type:_editType})}).catch(()=>{});
}

// ── DELETE ───────────────────────────────────────────────────────────────────
let _delIdx = null;
function openConfirm(i){
  closeAllSwipes(-1);
  _delIdx=i;
  const m=S.today[i];
  document.getElementById('confirm-name').textContent=`${m.type}｜${m.main}｜${m.protein.toFixed(1)}g`;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeConfirm(e){
  if(e && e.target!==document.getElementById('confirm-modal')) return;
  document.getElementById('confirm-modal').classList.remove('open');
}
function commitDelete(){
  if(_delIdx===null) return;
  const ts=S.today[_delIdx].timestamp;
  S.today.splice(_delIdx,1);
  S.history=S.history.filter(m=>m.timestamp!==ts);
  document.getElementById('confirm-modal').classList.remove('open');
  renderAll();
  toast('DELETED');
  // GAS delete hint
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'delete',timestamp:ts})}).catch(()=>{});
}

function toast(msg){
  const host=document.getElementById('toast-host');
  const el=document.createElement('div');
  el.className='toast';el.textContent=msg;
  host.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}
</script>
