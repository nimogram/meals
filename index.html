<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MEAL OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #05060a;
  --s1:        #0b0d14;
  --s2:        #111420;
  --border:    #1a1e2e;
  --brt:       #252a3e;
  --gold:      #10b981;
  --gold-dim:  rgba(16,185,129,0.08);
  --gold-mid:  rgba(16,185,129,0.18);
  --gold-glow: rgba(16,185,129,0.35);
  --text:      #dde0ea;
  --muted:     #454a60;
  --muted2:    #2a2f45;
  --danger:    #e05a6a;
  --mono: 'DM Mono', monospace;
  --serif: 'DM Serif Display', serif;
  --sans: 'Noto Sans JP', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--sans);color:var(--text);}

/* noise texture overlay */
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:0.5;
}

#app{
  max-width:430px;margin:0 auto;height:100dvh;
  display:flex;flex-direction:column;
  background:var(--bg);
  position:relative;overflow:hidden;
  border-left:1px solid var(--border);
  border-right:1px solid var(--border);
  z-index:1;
}

.glow-orb{
  position:absolute;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
  pointer-events:none;z-index:0;
  top:-80px;left:50%;transform:translateX(-50%);
}

header{
  background:linear-gradient(180deg,var(--s1) 0%, var(--bg) 100%);
  border-bottom:1px solid var(--border);
  padding:18px 20px 22px;
  flex-shrink:0;position:relative;z-index:10;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.logo-main{font-family:var(--serif);font-size:20px;letter-spacing:0.04em;color:var(--gold);line-height:1;}
.logo-sub{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.25em;text-transform:uppercase;margin-top:5px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.date-chip{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.1em;background:var(--s2);border:1px solid var(--border);padding:5px 10px;border-radius:20px;}
.sync-btn{width:32px;height:32px;background:var(--s2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;color:var(--muted);}
.sync-btn svg{width:13px;height:13px;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.gauge-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.gauge-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;}
.gauge-main{display:flex;align-items:baseline;gap:4px;}
.gauge-val{font-family:var(--serif);font-size:36px;color:var(--gold);line-height:1;}
.gauge-unit{font-family:var(--mono);font-size:10px;color:var(--muted);}
.gauge-track{height:2px;background:var(--border);border-radius:1px;position:relative;margin-bottom:10px;}
.gauge-fill{height:100%;background:linear-gradient(90deg,#059669,var(--gold));border-radius:1px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
.gauge-fill::after{content:'';position:absolute;right:-1px;top:-4px;width:10px;height:10px;background:var(--gold);border-radius:50%;box-shadow:0 0 12px var(--gold-glow);}
.gauge-meta{display:flex;justify-content:space-between;}
.g-pct,.g-gap{font-family:var(--mono);font-size:8px;color:var(--muted);}
.g-gap em{color:var(--gold);font-style:normal;}

main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
main::-webkit-scrollbar{display:none;}
.tab-pane{display:none;padding:18px 14px 130px;}
.tab-pane.active{display:block;}

.sec-hd{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border);}

.quick-btn{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:14px;}
.q-left{display:flex;align-items:center;gap:12px;}
.q-icon{width:38px;height:38px;background:var(--gold-dim);border:1px solid rgba(16,185,129,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.q-title{font-size:13px;font-weight:700;}
.q-sub{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:3px;}

.form-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:16px;}
.type-row{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:3px;gap:2px;margin-bottom:16px;}
.type-btn{flex:1;padding:8px 0;font-family:var(--mono);font-size:9px;border:none;background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;}
.type-btn.on{background:var(--gold);color:var(--bg);}
.txt-in{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:14px;font-weight:700;color:var(--text);outline:none;margin-bottom:14px;}
.sl-card{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;}
.sl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sl-val{font-family:var(--serif);font-size:26px;color:var(--gold);line-height:1;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--brt);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--gold);border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 10px var(--gold-glow);cursor:pointer;}
.save-btn{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:12px;padding:15px;font-family:var(--mono);font-size:10px;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;}

.log-item{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;position:relative;z-index:2;transition:transform 0.2s ease;}
.li-wrap{position:relative;overflow:hidden;border-radius:14px;margin-bottom:8px;}
.li-badge{width:30px;height:30px;background:var(--bg);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:8px;color:var(--muted);}
.li-p{font-family:var(--serif);font-size:18px;color:var(--gold);}
.li-actions{position:absolute;right:0;top:0;bottom:0;display:flex;transform:translateX(100%);transition:transform 0.25s ease;z-index:1;}
.li-actions.show{transform:translateX(0);}
.li-act-edit,.li-act-del{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;padding:0 16px;min-width:62px;font-family:var(--mono);font-size:7px;border:none;cursor:pointer;}
.li-act-edit{background:#0d2418;color:var(--gold);}
.li-act-del{background:#2a1418;color:#e05a6a;}

.suggest-hero{background:linear-gradient(135deg,var(--s2) 0%, #0e1020 100%);border:1px solid rgba(16,185,129,0.2);border-radius:20px;padding:20px;margin-bottom:18px;position:relative;overflow:hidden;}
.sh-gap{font-family:var(--serif);font-size:34px;color:var(--text);line-height:1;}
.sh-gap em{font-family:var(--mono);font-size:12px;color:var(--gold);font-style:normal;}
.sh-pill{font-family:var(--mono);font-size:7px;padding:4px 10px;border-radius:20px;background:var(--s1);border:1px solid var(--border);color:var(--muted);margin-right:6px;}
.sh-pill.active{background:var(--gold-dim);border-color:rgba(16,185,129,0.3);color:var(--gold);}

.sug-card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden;}
.sug-card.best{border-color:rgba(16,185,129,0.35);}
.sug-name{font-family:var(--serif);font-size:20px;color:var(--text);}
.sug-p{font-family:var(--serif);font-size:26px;color:var(--gold);}
.sug-tag{font-family:var(--mono);font-size:7px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted);margin-right:5px;}
.sug-cta{width:100%;background:var(--gold-dim);border:1px solid rgba(16,185,129,0.25);border-radius:10px;padding:11px;font-family:var(--mono);font-size:8px;color:var(--gold);cursor:pointer;text-align:center;text-transform:uppercase;}
.sug-cta.full{background:var(--gold);color:var(--bg);}

.stats-card{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;}
.bar-area{display:flex;gap:5px;align-items:flex-end;height:90px;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;background:var(--brt);transition:height 0.7s ease-out;}
.bar-fill.ok{background:linear-gradient(180deg,var(--gold) 0%,#047857 100%);}
.bar-fill.today{box-shadow:0 0 8px var(--gold-glow);}

nav{position:absolute;bottom:0;left:0;right:0;background:rgba(5,6,10,0.96);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:10px 0 max(10px, env(safe-area-inset-bottom));z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 20px;color:var(--muted);}
.nav-btn.on{color:var(--gold);}
.nav-lbl{font-family:var(--mono);font-size:7px;text-transform:uppercase;}

.modal-back{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.modal-back.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--s1);border-radius:24px 24px 0 0;padding:20px;width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.2,0.64,1);}
.modal-back.open .modal-sheet{transform:translateY(0);}
.toast-host{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:6px;}
.toast{background:var(--gold);color:var(--bg);padding:8px 18px;border-radius:20px;font-family:var(--mono);font-size:9px;}
</style>
</head>
<body>
<div id="app">
  <div class="glow-orb"></div>
  <header>
    <div class="hdr-top">
      <div class="logo-block"><div class="logo-main">Meal OS</div><div class="logo-sub">Strategic Protein Monitor</div></div>
      <div class="hdr-right"><div class="date-chip" id="date-chip"></div><div class="sync-btn" onclick="fetchData()">🔄</div></div>
    </div>
    <div class="gauge-row">
      <div class="gauge-label">Today / Target 120g</div>
      <div class="gauge-main"><div class="gauge-val" id="hdr-p">0.0</div><div class="gauge-unit">g</div></div>
    </div>
    <div class="gauge-track"><div class="gauge-fill" id="g-fill" style="width:0%"></div></div>
    <div class="gauge-meta"><div class="g-pct" id="g-pct">0%</div><div class="g-gap">残り <em id="g-gap">120.0g</em></div></div>
  </header>

  <main>
    <div id="pane-log" class="tab-pane active">
      <button class="quick-btn" onclick="recordBreakfast()"><div class="q-left"><div class="q-icon">🥚</div><div><div class="q-title">朝セットを記録</div><div class="q-sub">45.0g P</div></div></div></button>
      <div class="form-card">
        <div class="type-row"><button class="type-btn" onclick="setType('朝',this)">朝</button><button class="type-btn on" onclick="setType('昼',this)">昼</button><button class="type-btn" onclick="setType('夜',this)">夜</button></div>
        <input class="txt-in" id="in-main" type="text" placeholder="主菜"/>
        <div class="sl-card">
          <div class="sl-hd"><div class="sl-val" id="sl-val">25.0<span>g</span></div></div>
          <input type="range" id="in-p" min="0" max="60" step="0.5" value="25" oninput="document.getElementById('sl-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>g</span>'"/>
        </div>
        <button class="save-btn" onclick="saveForm()">記録を保存 →</button>
      </div>
      <div class="sec-hd">Today's Records</div>
      <div id="log-list"></div>
    </div>
    <div id="pane-suggest" class="tab-pane"><div id="sug-inner"></div></div>
    <div id="pane-stats" class="tab-pane">
      <div class="stats-card"><div id="bar-area" class="bar-area"></div></div>
      <div id="recent-list"></div>
    </div>
  </main>

  <nav>
    <div class="nav-btn on" onclick="switchTab('log')"><div class="nav-lbl">Log</div></div>
    <div class="nav-btn" onclick="switchTab('suggest')"><div class="nav-lbl">Dinner</div></div>
    <div class="nav-btn" onclick="switchTab('stats')"><div class="nav-lbl">Stats</div></div>
  </nav>
</div>

<div class="modal-back" id="edit-modal" onclick="closeEditModal(event)">
  <div class="modal-sheet">
    <input class="txt-in" id="edit-main" type="text"/>
    <input type="range" id="edit-p" min="0" max="60" step="0.5" value="25" oninput="document.getElementById('edit-sl-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>g</span>'"/>
    <div id="edit-sl-val" style="color:var(--gold); font-size:24px; text-align:center; margin-bottom:15px;">25.0g</div>
    <button class="save-btn" onclick="commitEdit()">保存する</button>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

<script>
const GAS = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec";
const TARGET = 120;
const MENUS = [
  { main:"牛肉ステーキ", p:40.0, side:"サラダ", tags:["鉄分","牛"] },
  { main:"チキンステーキ", p:35.0, side:"野菜", tags:["低脂質","鶏"] },
  { main:"生ラム肉グリル", p:32.0, side:"焼き野菜", tags:["燃焼","羊"] },
  { main:"刺身盛り合わせ", p:30.0, side:"お浸し", tags:["DHA","魚"] },
  { main:"カツオたたき", p:28.0, side:"玉ねぎ", tags:["鉄分","旬"] },
  { main:"サバ味噌煮", p:21.0, side:"雑穀米", tags:["EPA","時短"] },
  { main:"納豆オムレツ", p:20.0, side:"しらす", tags:["発酵","卵"] }
];
let S = { history:[], today:[], type:'昼' };

(function init(){
  const now = new Date();
  document.getElementById('date-chip').textContent = `${now.getMonth()+1}/${now.getDate()}`;
  fetchData();
})();

async function fetchData(){
  try {
    const r = await fetch(GAS);
    const raw = await r.json();
    S.history = raw.map(d=>({ main:d.main, protein:parseFloat(d.protein||0), timestamp:d.timestamp, type:d.type }));
    const ts = new Date().toDateString();
    S.today = S.history.filter(m=>new Date(m.timestamp).toDateString()===ts);
  } catch(e){ console.log("offline"); }
  renderAll();
}

function renderAll(){
  const tot = S.today.reduce((s,m)=>s+m.protein,0);
  const gap = Math.max(0,TARGET-tot);
  const pct = Math.min(tot/TARGET*100,100);
  document.getElementById('hdr-p').textContent = tot.toFixed(1);
  document.getElementById('g-fill').style.width = pct+'%';
  document.getElementById('g-pct').textContent = pct.toFixed(0)+'%';
  document.getElementById('g-gap').textContent = gap.toFixed(1)+'g';
  renderLog();
  renderSuggest();
  renderStats();
}

function renderLog(){
  const el = document.getElementById('log-list');
  el.innerHTML = S.today.map((m,i)=>`
    <div class="li-wrap">
      <div class="log-item" id="liitem-${i}" ontouchstart="swipeStart(event,${i})" ontouchmove="swipeMove(event,${i})">
        <div class="li-badge">${m.type}</div>
        <div style="flex:1; margin-left:12px;">${m.main}</div>
        <div class="li-p">${m.protein.toFixed(1)}g</div>
      </div>
      <div class="li-actions" id="liact-${i}">
        <button class="li-act-edit" onclick="openEdit(${i})">修正</button>
        <button class="li-act-del" onclick="openConfirm(${i})">削除</button>
      </div>
    </div>`).join('');
}

function renderSuggest(refresh = false){
  const el = document.getElementById('sug-inner');
  const tot = S.today.reduce((s,m)=>s+m.protein,0);
  const gap = Math.max(0,TARGET-tot);
  if(gap<=0){ el.innerHTML = "Goal Achieved!"; return; }
  
  let pool = [...MENUS];
  if(refresh) pool.sort(()=>Math.random()-0.5);
  const sorted = pool.sort((a,b)=>Math.abs(gap-a.p)-Math.abs(gap-b.p)).slice(0,3);

  el.innerHTML = `
    <div class="suggest-hero">
      <div class="sh-gap">${gap.toFixed(1)}<em>g 不足</em></div>
      <div style="margin-top:10px;"><span class="sh-pill active">推奨</span><span class="sh-pill">重複回避済</span></div>
    </div>
    <div class="sec-hd">Dinner Options <button onclick="renderSuggest(true)" style="margin-left:auto; background:none; border:none; color:var(--gold); font-size:8px;">CHANGE</button></div>
    ${sorted.map((opt,i)=>`
      <div class="sug-card">
        <div class="sug-name">${opt.main}</div>
        <div class="sug-p">${opt.p.toFixed(1)}g</div>
        <button class="sug-cta ${i===0?'full':''}" onclick="addFromSuggest('${opt.main}',${opt.p})">記録する</button>
      </div>`).join('')}`;
}

function renderStats(){
  const days = [50, 70, 130, 90, 110, 80, 120]; // Mock
  document.getElementById('bar-area').innerHTML = days.map(v=>`<div class="bar-fill ${v>=TARGET?'ok':''}" style="height:${v/1.5}px; flex:1;"></div>`).join('');
}

function switchTab(id){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  if(id==='suggest') renderSuggest();
}

function setType(t,btn){
  S.type=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

async function saveForm(){
  const main=document.getElementById('in-main').value;
  const p=parseFloat(document.getElementById('in-p').value);
  if(!main) return;
  await save({main,protein:p,type:S.type});
}

async function addFromSuggest(main,p){ await save({main,protein:p,type:'夜'}); switchTab('log'); }

async function save(data){
  const meal={...data,timestamp:new Date().toISOString()};
  S.today.unshift(meal); renderAll();
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify(meal)});
  toast("SAVED");
}

let _sw={};
function swipeStart(e,i){ _sw[i]={x:e.touches[0].clientX}; }
function swipeMove(e,i){
  const dx=_sw[i].x - e.touches[0].clientX;
  if(dx>40){
    document.getElementById('liact-'+i).classList.add('show');
    document.getElementById('liitem-'+i).style.transform='translateX(-124px)';
  } else if(dx<-40){
    document.getElementById('liact-'+i).classList.remove('show');
    document.getElementById('liitem-'+i).style.transform='translateX(0)';
  }
}

function openEdit(i){
  const m=S.today[i];
  document.getElementById('edit-main').value=m.main;
  document.getElementById('edit-p').value=m.protein;
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal(){ document.getElementById('edit-modal').classList.remove('open'); }

function toast(m){
  const h=document.getElementById('toast-host');
  const d=document.createElement('div'); d.className='toast'; d.textContent=m;
  h.appendChild(d); setTimeout(()=>d.remove(),2000);
}
</script>
</body>
</html>
