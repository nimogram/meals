<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meal OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #04050a;
  --s1:     #090b12;
  --s2:     #0e1019;
  --bd:     #161a28;
  --brt:    #1f2436;
  --em:     #10b981;
  --em-dim: rgba(16,185,129,0.07);
  --em-mid: rgba(16,185,129,0.16);
  --em-glow:rgba(16,185,129,0.32);
  --tx:     #dce0ec;
  --mu:     #404660;
  --mu2:    #272c40;
  --red:    #e05a6a;
  --mono:'DM Mono',monospace;
  --serif:'DM Serif Display',serif;
  --sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--sans);color:var(--tx);}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}

#app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden;border-left:1px solid var(--bd);border-right:1px solid var(--bd);z-index:1;}
.glow{position:absolute;width:360px;height:260px;border-radius:50%;background:radial-gradient(ellipse,rgba(16,185,129,0.04) 0%,transparent 70%);pointer-events:none;z-index:0;top:-60px;left:50%;transform:translateX(-50%);}

/* ── HEADER ── */
header{background:linear-gradient(180deg,var(--s1) 0%,var(--bg) 100%);border-bottom:1px solid var(--bd);padding:16px 18px 18px;flex-shrink:0;position:relative;z-index:10;}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.logo{font-family:var(--serif);font-size:19px;color:var(--em);letter-spacing:0.03em;line-height:1;}
.logo-sub{font-family:var(--mono);font-size:7px;color:var(--mu);letter-spacing:0.28em;text-transform:uppercase;margin-top:4px;}
.hdr-right{display:flex;align-items:center;gap:7px;}
.date-pill{font-family:var(--mono);font-size:8px;color:var(--mu);background:var(--s2);border:1px solid var(--bd);padding:5px 11px;border-radius:20px;letter-spacing:0.08em;}
.sync-btn{width:30px;height:30px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu);transition:all 0.2s;}
.sync-btn:active{transform:scale(0.88);border-color:var(--em);}
.sync-btn svg{width:12px;height:12px;}
.spin{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* gauge */
.g-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.g-lbl{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.2em;text-transform:uppercase;}
.g-val{font-family:var(--serif);font-size:34px;color:var(--em);line-height:1;}
.g-unit{font-family:var(--mono);font-size:9px;color:var(--mu);margin-left:3px;}
.g-track{height:2px;background:var(--bd);border-radius:1px;margin-bottom:9px;position:relative;}
.g-fill{height:100%;background:linear-gradient(90deg,#065f46,var(--em));border-radius:1px;transition:width 1s cubic-bezier(0.34,1.56,0.64,1);position:relative;}
.g-fill::after{content:'';position:absolute;right:-1px;top:-4px;width:9px;height:9px;background:var(--em);border-radius:50%;box-shadow:0 0 10px var(--em-glow);}
.g-meta{display:flex;justify-content:space-between;}
.g-pct,.g-gap{font-family:var(--mono);font-size:7.5px;color:var(--mu);}
.g-gap em{color:var(--em);font-style:normal;}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
main::-webkit-scrollbar{display:none;}
.pane{display:none;padding:14px 14px 120px;}
.pane.active{display:block;}
.sec{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.25em;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px;}
.sec::after{content:'';flex:1;height:1px;background:var(--bd);}

/* ── DATE NAV ── */
.date-nav{display:flex;align-items:center;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:4px;gap:2px;margin-bottom:12px;}
.dn-arrow{width:36px;height:36px;background:transparent;border:none;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--mu);transition:all 0.2s;flex-shrink:0;}
.dn-arrow:active{background:var(--bd);color:var(--tx);}
.dn-arrow svg{width:14px;height:14px;}
.dn-center{flex:1;text-align:center;}
.dn-date{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--em);letter-spacing:0.05em;}
.dn-sub{font-family:var(--mono);font-size:7px;color:var(--mu);margin-top:2px;letter-spacing:0.1em;}
.dn-today{background:var(--em);color:var(--bg);border:none;border-radius:8px;font-family:var(--mono);font-size:7px;font-weight:500;padding:3px 8px;letter-spacing:0.1em;cursor:pointer;margin-top:4px;display:inline-block;}

/* quick breakfast */
.quick{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-bottom:10px;transition:all 0.15s;}
.quick:active{border-color:var(--em);background:var(--em-dim);}
.q-l{display:flex;align-items:center;gap:10px;}
.q-ico{width:36px;height:36px;background:var(--em-dim);border:1px solid rgba(16,185,129,0.15);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.q-title{font-size:13px;font-weight:700;color:var(--tx);}
.q-sub{font-family:var(--mono);font-size:7.5px;color:var(--mu);margin-top:2px;}
.q-arr svg{width:13px;height:13px;color:var(--mu);}

/* form */
.form-card{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:16px;margin-bottom:12px;}
.seg{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:2px;margin-bottom:12px;}
.seg-btn{flex:1;padding:10px 0;font-family:var(--mono);font-size:9px;font-weight:500;border:none;background:transparent;color:var(--mu);border-radius:7px;cursor:pointer;transition:all 0.18s;letter-spacing:0.05em;}
.seg-btn.on{background:var(--em);color:var(--bg);}
.txt{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:13px 14px;font-size:14px;font-weight:700;color:var(--tx);outline:none;margin-bottom:12px;transition:border-color 0.2s;font-family:var(--sans);}
.txt:focus{border-color:var(--em);}
.txt::placeholder{color:var(--mu2);font-weight:300;}
.sl-box{background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:12px 14px;margin-bottom:12px;}
.sl-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sl-lbl{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.18em;text-transform:uppercase;}
.sl-val{font-family:var(--serif);font-size:24px;color:var(--em);line-height:1;}
.sl-val span{font-family:var(--mono);font-size:8px;color:var(--mu);}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--brt);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--em);border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 8px var(--em-glow);cursor:pointer;}
.save-btn{width:100%;background:var(--em);color:var(--bg);border:none;border-radius:11px;padding:16px;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;transition:opacity 0.15s;}
.save-btn:active{opacity:0.85;}
.save-btn:disabled{opacity:0.4;}

/* log items */
.li-wrap{position:relative;overflow:hidden;border-radius:13px;margin-bottom:7px;}
.log-item{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;transition:transform 0.22s ease;}
.li-l{display:flex;align-items:center;gap:10px;}
.li-badge{width:28px;height:28px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:7.5px;color:var(--mu);flex-shrink:0;}
.li-name{font-size:13px;font-weight:700;color:var(--tx);}
.li-time{font-family:var(--mono);font-size:7px;color:var(--mu);margin-top:2px;}
.li-p{font-family:var(--serif);font-size:17px;color:var(--em);flex-shrink:0;}
.li-actions{position:absolute;right:0;top:0;bottom:0;display:flex;z-index:1;transform:translateX(100%);transition:transform 0.22s ease;border-radius:0 13px 13px 0;overflow:hidden;}
.li-actions.show{transform:translateX(0);}
.li-edit,.li-del{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;padding:0 14px;min-width:56px;border:none;cursor:pointer;font-family:var(--mono);font-size:7px;letter-spacing:0.05em;}
.li-edit{background:#0a2216;color:var(--em);}
.li-del{background:#251018;color:var(--red);}
.li-edit svg,.li-del svg{width:13px;height:13px;}
.empty{text-align:center;padding:32px;font-family:var(--mono);font-size:9px;color:var(--mu);letter-spacing:0.15em;}

/* ── SUGGEST TAB ── */
.sug-hero{background:linear-gradient(135deg,var(--s2),#080a14);border:1px solid rgba(16,185,129,0.18);border-radius:16px;padding:14px 16px;margin-bottom:10px;position:relative;overflow:hidden;}
.sug-hero::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:radial-gradient(circle,rgba(16,185,129,0.07) 0%,transparent 70%);border-radius:50%;}
.sh-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;}
.sh-badge{font-family:var(--mono);font-size:7px;color:var(--em);letter-spacing:0.18em;text-transform:uppercase;background:var(--em-dim);border:1px solid rgba(16,185,129,0.2);padding:3px 9px;border-radius:20px;margin-bottom:6px;display:inline-block;}
.sh-title{font-family:var(--mono);font-size:8px;color:var(--mu);letter-spacing:0.08em;margin-bottom:2px;}
.sh-gap{font-family:var(--serif);font-size:30px;color:var(--tx);line-height:1;}
.sh-gap em{font-family:var(--mono);font-size:10px;color:var(--em);font-style:normal;margin-left:3px;}
.sh-reason{font-family:var(--mono);font-size:7px;color:var(--mu);margin-top:4px;letter-spacing:0.06em;}
.sh-pills{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;}
.sh-pill{font-family:var(--mono);font-size:6.5px;letter-spacing:0.08em;padding:3px 8px;border-radius:20px;text-transform:uppercase;background:var(--s1);border:1px solid var(--bd);color:var(--mu);}
.sh-pill.on{background:var(--em-dim);border-color:rgba(16,185,129,0.3);color:var(--em);}

/* effect filter */
.effect-row{display:flex;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:3px;gap:2px;margin-bottom:10px;}
.eff-btn{flex:1;padding:9px 4px;font-family:var(--mono);font-size:8px;border:none;background:transparent;color:var(--mu);border-radius:7px;cursor:pointer;transition:all 0.18s;letter-spacing:0.04em;}
.eff-btn.on{background:var(--em);color:var(--bg);font-weight:500;}

/* suggest cards */
.sug-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:13px 14px;margin-bottom:7px;position:relative;overflow:hidden;transition:all 0.18s;}
.sug-card.best{border-color:rgba(16,185,129,0.38);}
.sug-card.best::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--em),transparent);}
.sug-glow{position:absolute;top:-15px;right:-15px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,0.05) 0%,transparent 70%);}
.sc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.sc-left{flex:1;}
.sc-rank{font-family:var(--mono);font-size:7px;color:var(--mu);letter-spacing:0.18em;text-transform:uppercase;display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.sc-num{font-family:var(--serif);font-size:11px;color:var(--em);}
.sc-best{font-family:var(--mono);font-size:6px;background:var(--em-dim);border:1px solid rgba(16,185,129,0.3);color:var(--em);padding:2px 6px;border-radius:8px;letter-spacing:0.1em;}
.sc-name{font-family:var(--serif);font-size:17px;color:var(--tx);line-height:1.2;}
.sc-p{font-family:var(--serif);font-size:24px;color:var(--em);line-height:1;flex-shrink:0;margin-left:10px;}
.sc-p span{font-family:var(--mono);font-size:8px;color:var(--mu);}
.sc-side{font-size:10px;color:var(--mu);font-weight:300;margin-bottom:6px;}
.sc-effect{font-family:var(--mono);font-size:7.5px;color:var(--mu);background:var(--bg);border-radius:8px;padding:6px 10px;margin-bottom:8px;line-height:1.6;letter-spacing:0.03em;}
.sc-effect em{color:var(--em);font-style:normal;}
.sc-footer{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.sc-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
.sc-tag{font-family:var(--mono);font-size:6.5px;padding:2px 7px;background:var(--bg);border:1px solid var(--bd);border-radius:5px;color:var(--mu);}
.sc-tag.hl{border-color:rgba(16,185,129,0.28);color:var(--em);}
.sc-rec-btn{flex-shrink:0;display:flex;align-items:center;gap:4px;background:transparent;border:1px solid var(--bd);border-radius:8px;padding:5px 10px;font-family:var(--mono);font-size:7px;color:var(--mu);cursor:pointer;letter-spacing:0.08em;transition:all 0.15s;white-space:nowrap;}
.sc-rec-btn:active{background:var(--em-dim);border-color:var(--em);color:var(--em);}
.sc-rec-btn.pri{border-color:rgba(16,185,129,0.4);color:var(--em);}
.sc-rec-btn svg{width:10px;height:10px;}
.shuffle-row{display:flex;justify-content:center;padding:8px 0 4px;}
.shuffle-btn{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:12px 28px;font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--mu);cursor:pointer;transition:all 0.18s;}
.shuffle-btn:active{transform:scale(0.97);border-color:var(--em);color:var(--em);}
.shuffle-btn svg{width:13px;height:13px;}
.goal-done{text-align:center;padding:50px 20px;animation:fadeUp 0.3s ease-out;}
.goal-ring{width:72px;height:72px;border-radius:50%;border:1px solid rgba(16,185,129,0.4);background:var(--em-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;}
.goal-title{font-family:var(--serif);font-size:18px;color:var(--em);margin-bottom:5px;}
.goal-sub{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.15em;}

/* ── STATS ── */
.stats-card{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:16px;margin-bottom:12px;}
.chart-wrap{width:100%;height:130px;margin-bottom:2px;}
.chart-wrap svg{width:100%;height:100%;overflow:visible;}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border-radius:10px;overflow:hidden;margin-top:12px;}
.kpi{background:var(--s1);padding:9px;text-align:center;}
.kpi-lbl{font-family:var(--mono);font-size:6.5px;color:var(--mu);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:3px;}
.kpi-val{font-family:var(--serif);font-size:16px;color:var(--tx);}
.kpi-val.good{color:var(--em);}
.streak-dots{display:flex;gap:4px;margin-top:10px;}
.s-dot{flex:1;height:3px;border-radius:2px;background:var(--bd);}
.s-dot.ok{background:var(--em);}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.modal-bg.open{opacity:1;pointer-events:all;}
.modal-sheet{background:var(--s1);border:1px solid var(--bd);border-top:1px solid var(--brt);border-radius:22px 22px 0 0;padding:18px 18px max(22px,env(safe-area-inset-bottom));width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.34,1.2,0.64,1);}
.modal-bg.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:34px;height:3px;background:var(--bd);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:var(--serif);font-size:17px;color:var(--tx);margin-bottom:16px;}
.modal-lbl{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:7px;}
.modal-acts{display:flex;gap:9px;margin-top:4px;}
.modal-cancel{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:13px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.12em;color:var(--mu);cursor:pointer;text-transform:uppercase;}
.modal-save{flex:2;background:var(--em);border:none;border-radius:11px;padding:13px;font-family:var(--mono);font-size:8.5px;letter-spacing:0.18em;color:var(--bg);font-weight:500;cursor:pointer;text-transform:uppercase;}
.confirm-bg{position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.76);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.confirm-bg.open{opacity:1;pointer-events:all;}
.confirm-box{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:24px;width:calc(100% - 36px);max-width:340px;text-align:center;transform:scale(0.93);transition:transform 0.22s cubic-bezier(0.34,1.4,0.64,1);}
.confirm-bg.open .confirm-box{transform:scale(1);}
.confirm-ico{font-size:28px;margin-bottom:10px;}
.confirm-ttl{font-family:var(--serif);font-size:16px;color:var(--tx);margin-bottom:5px;}
.confirm-sub{font-family:var(--mono);font-size:7.5px;color:var(--mu);letter-spacing:0.08em;line-height:1.7;margin-bottom:14px;}
.confirm-name{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:9px 13px;font-size:12px;font-weight:700;color:var(--tx);margin-bottom:18px;}
.confirm-acts{display:flex;gap:9px;}
.conf-cancel{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:12px;font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:var(--mu);cursor:pointer;text-transform:uppercase;}
.conf-del{flex:1;background:#251018;border:1px solid #3a1a22;border-radius:11px;padding:12px;font-family:var(--mono);font-size:8px;letter-spacing:0.1em;color:var(--red);cursor:pointer;text-transform:uppercase;}

/* ── NAV ── */
nav{position:absolute;bottom:0;left:0;right:0;background:rgba(4,5,10,0.95);backdrop-filter:blur(24px);border-top:1px solid var(--bd);display:flex;justify-content:space-around;padding:8px 0 max(10px,env(safe-area-inset-bottom));z-index:100;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:7px 20px;border-radius:12px;transition:all 0.22s;color:var(--mu);}
.nav-btn.on{color:var(--em);background:var(--em-dim);}
.nav-btn svg{width:19px;height:19px;}
.nav-lbl{font-family:var(--mono);font-size:7px;letter-spacing:0.18em;text-transform:uppercase;}

/* toast */
.toast-host{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;}
.toast{background:var(--em);color:var(--bg);padding:7px 16px;border-radius:20px;font-family:var(--mono);font-size:8.5px;font-weight:500;letter-spacing:0.14em;animation:tin 0.2s ease-out,tout 0.2s 2.4s ease-in forwards;}
@keyframes tin{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
@keyframes tout{to{opacity:0;transform:translateY(-6px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="app">
<div class="glow"></div>

<!-- HEADER -->
<header>
  <div class="hdr-row">
    <div>
      <div class="logo">Meal OS</div>
      <div class="logo-sub">Strategic Protein Monitor</div>
    </div>
    <div class="hdr-right">
      <div class="date-pill" id="date-pill"></div>
      <div class="sync-btn" onclick="fetchData()">
        <svg id="sync-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      </div>
    </div>
  </div>
  <div class="g-row">
    <div class="g-lbl"><span id="g-date-lbl">Today</span> / 目標 120g</div>
    <div style="display:flex;align-items:baseline;">
      <div class="g-val" id="hdr-p">0.0</div><div class="g-unit">g</div>
    </div>
  </div>
  <div class="g-track"><div class="g-fill" id="g-fill" style="width:0%"></div></div>
  <div class="g-meta"><div class="g-pct" id="g-pct">0% Done</div><div class="g-gap">残り <em id="g-gap">120.0g</em></div></div>
</header>

<main>
  <!-- LOG -->
  <div id="pane-log" class="pane active">
    <!-- Date Nav -->
    <div class="date-nav">
      <button class="dn-arrow" onclick="moveDate(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="dn-center">
        <div class="dn-date" id="dn-date">—</div>
        <div id="dn-today-wrap"></div>
      </div>
      <button class="dn-arrow" onclick="moveDate(1)" id="dn-next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <!-- Quick Breakfast -->
    <button class="quick" onclick="recordBreakfast()">
      <div class="q-l">
        <div class="q-ico">🥚</div>
        <div>
          <div class="q-title">朝セットを記録</div>
          <div class="q-sub">卵・納豆・ヨーグルト — 45.0g P</div>
        </div>
      </div>
      <div class="q-arr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </button>

    <!-- Form -->
    <div class="form-card">
      <div class="seg" id="type-seg">
        <button class="seg-btn" onclick="setType('朝',this)">朝</button>
        <button class="seg-btn on" onclick="setType('昼',this)">昼</button>
        <button class="seg-btn" onclick="setType('夜',this)">夜</button>
        <button class="seg-btn" onclick="setType('他',this)">他</button>
      </div>
      <input class="txt" id="in-main" type="text" placeholder="主菜（タンパク源）"/>
      <div class="sl-box">
        <div class="sl-hd">
          <div class="sl-lbl">Protein</div>
          <div class="sl-val" id="sl-val">25.0<span>g</span></div>
        </div>
        <input type="range" id="in-p" min="0" max="80" step="0.5" value="25"
          oninput="document.getElementById('sl-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>g</span>'"/>
      </div>
      <button class="save-btn" id="save-btn" onclick="saveForm()">記録を保存 →</button>
    </div>

    <div class="sec" id="log-sec-hd">Records</div>
    <div id="log-list"></div>
  </div>

  <!-- SUGGEST -->
  <div id="pane-suggest" class="pane">
    <div class="sug-hero">
      <div class="sh-top">
        <div>
          <div class="sh-badge">Tonight's Strategy</div>
          <div class="sh-title">夕食で補うタンパク質</div>
          <div class="sh-gap" id="sh-gap-val">—<em>g 不足</em></div>
          <div class="sh-reason" id="sh-ctx"></div>
        </div>
        <div style="font-size:22px;margin-top:2px;">🌙</div>
      </div>
      <div class="sh-pills" id="sh-pills"></div>
    </div>

    <div class="sec">Focus Effect</div>
    <div class="effect-row">
      <button class="eff-btn on" onclick="setEffect('all',this)">ALL</button>
      <button class="eff-btn" onclick="setEffect('burn',this)">燃焼</button>
      <button class="eff-btn" onclick="setEffect('recovery',this)">回復</button>
      <button class="eff-btn" onclick="setEffect('brain',this)">脳機能</button>
    </div>

    <div id="sug-inner"></div>

    <div class="shuffle-row">
      <button class="shuffle-btn" onclick="renderSuggest(true)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        Shuffle
      </button>
    </div>
  </div>

  <!-- STATS -->
  <div id="pane-stats" class="pane">
    <div class="sec">7-Day Protein Trend</div>
    <div class="stats-card">
      <div class="chart-wrap" id="stats-chart"></div>
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-lbl">7日平均</div><div class="kpi-val" id="kpi-avg">—</div></div>
        <div class="kpi"><div class="kpi-lbl">連続達成</div><div class="kpi-val" id="kpi-str">0日</div></div>
        <div class="kpi"><div class="kpi-lbl">最高記録</div><div class="kpi-val" id="kpi-best">—</div></div>
      </div>
      <div class="streak-dots" id="streak-dots"></div>
    </div>
    <div class="sec">History</div>
    <div id="recent-list"></div>
  </div>
</main>

<!-- NAV -->
<nav>
  <div class="nav-btn on" id="nav-log" onclick="switchTab('log')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <div class="nav-lbl">Log</div>
  </div>
  <div class="nav-btn" id="nav-suggest" onclick="switchTab('suggest')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6l-.7 4H9l-.7-4A7 7 0 0 1 5 9a7 7 0 0 1 7-7z"/><line x1="9" y1="21" x2="15" y2="21"/></svg>
    <div class="nav-lbl">Dinner</div>
  </div>
  <div class="nav-btn" id="nav-stats" onclick="switchTab('stats')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <div class="nav-lbl">Stats</div>
  </div>
</nav>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal" onclick="onModalBgClick(event,'edit-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">記録を修正</div>
    <div class="modal-lbl">主菜</div>
    <input class="txt" id="edit-main" type="text" style="margin-bottom:14px;"/>
    <div class="modal-lbl">食事区分</div>
    <div class="seg" id="edit-seg" style="margin-bottom:14px;">
      <button class="seg-btn" onclick="setEditType('朝',this)">朝</button>
      <button class="seg-btn" onclick="setEditType('昼',this)">昼</button>
      <button class="seg-btn" onclick="setEditType('夜',this)">夜</button>
      <button class="seg-btn" onclick="setEditType('他',this)">他</button>
    </div>
    <div class="sl-box" style="margin-bottom:14px;">
      <div class="sl-hd">
        <div class="sl-lbl">Protein</div>
        <div class="sl-val" id="edit-sl-val">25.0<span>g</span></div>
      </div>
      <input type="range" id="edit-p" min="0" max="80" step="0.5" value="25"
        oninput="document.getElementById('edit-sl-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>g</span>'"/>
    </div>
    <div class="modal-acts">
      <button class="modal-cancel" onclick="closeModal('edit-modal')">キャンセル</button>
      <button class="modal-save" onclick="commitEdit()">保存する →</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-bg" id="del-modal" onclick="onModalBgClick(event,'del-modal')">
  <div class="confirm-box">
    <div class="confirm-ico">🗑️</div>
    <div class="confirm-ttl">削除しますか？</div>
    <div class="confirm-sub">削除後は元に戻せません。<br>スプレッドシートからも同時に削除されます。</div>
    <div class="confirm-name" id="del-name"></div>
    <div class="confirm-acts">
      <button class="conf-cancel" onclick="closeModal('del-modal')">キャンセル</button>
      <button class="conf-del" onclick="commitDelete()">削除する</button>
    </div>
  </div>
</div>

<div class="toast-host" id="toast-host"></div>

// ── STATE ─────────────────────────────────────────────────────────────────
const S={history:[],viewLogs:[],type:'昼',viewDate:new Date(),effect:'all'};
let _editIdx=null, _delIdx=null, _editType='昼';

// ── INIT ──────────────────────────────────────────────────────────────────
(function(){
  updateDateNav();
  updateDatePill();
  fetchData();
})();

async function fetchData(){
  const ico=document.getElementById('sync-ico');
  ico.classList.add('spin');
  try{
    const r=await fetch(GAS);
    const raw=await r.json();
    S.history=raw.map(d=>({
      main:(d.main||'').trim(),protein:parseFloat(d.protein||0),
      timestamp:d.timestamp,type:d.type||'他'
    })).filter(d=>d.main);
    filterLogs();
    toast('SYNC COMPLETE');
  }catch(e){toast('OFFLINE MODE');}
  ico.classList.remove('spin');
  renderAll();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll(){
  const tot=S.viewLogs.reduce((s,m)=>s+m.protein,0);
  const gap=Math.max(0,TARGET-tot);
  const pct=Math.min(tot/TARGET*100,100);
  const isToday=S.viewDate.toDateString()===new Date().toDateString();

  document.getElementById('hdr-p').textContent=tot.toFixed(1);
  document.getElementById('g-fill').style.width=pct+'%';
  document.getElementById('g-pct').textContent=pct.toFixed(0)+'% Done';
  document.getElementById('g-gap').textContent=gap.toFixed(1)+'g';
  document.getElementById('g-date-lbl').textContent=isToday?'Today':
    S.viewDate.toLocaleDateString('ja-JP',{month:'short',day:'numeric'});

  renderLog();
  renderSuggest();
  renderStats();
}

  const el=document.getElementById('log-list');

  const d=S.viewDate;
  document.getElementById('log-sec-hd').textContent=

    el.innerHTML='<div class="empty">記録はありません</div>';return;
  }
  el.innerHTML=S.viewLogs.map((m,i)=>{
    const t=new Date(m.timestamp);
    const hm=t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});

    <div class="li-wrap" id="liw-${i}">

        ontouchstart="swipeStart(event,${i})"
        ontouchmove="swipeMove(event,${i})"
        ontouchend="swipeEnd(${i})">

          <div class="li-badge">${m.type}</div>
          <div>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          修正
        </button>
        <button class="li-del" onclick="openDel(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          削除
        </button>
      </div>
    </div>`;
  }).join('');

function renderSuggest(shuffle=false){
  const el=document.getElementById('sug-inner');
  const tot=S.viewLogs.reduce((s,m)=>s+m.protein,0);
  const gap=Math.max(0,TARGET-tot);

  // hero update
  document.getElementById('sh-gap-val').innerHTML=gap>0
    ?`${gap.toFixed(1)}<em>g 不足</em>`
    :`<span style="font-size:20px;color:var(--em)">Goal Achieved!</span>`;

  const morP=S.viewLogs.filter(m=>m.type==='朝').reduce((s,m)=>s+m.protein,0);
  const luP=S.viewLogs.filter(m=>m.type==='昼').reduce((s,m)=>s+m.protein,0);
  const parts=[];
  if(morP>0)parts.push(`朝 ${morP.toFixed(0)}g`);
  if(luP>0)parts.push(`昼 ${luP.toFixed(0)}g`);
  document.getElementById('sh-ctx').textContent=parts.length
    ?`${parts.join(' + ')} 摂取済み → 夜に ${gap.toFixed(0)}g 必要`
    :`本日の摂取 ${tot.toFixed(0)}g`;

  const mon=new Date().getMonth(),dow=new Date().getDay();
  const sl=['冬','冬','春','春','春','夏','夏','夏','秋','秋','秋','冬'][mon];
  const wl=dow===0||dow===6?'週末':'平日';
  document.getElementById('sh-pills').innerHTML=
    `<span class="sh-pill on">${sl}</span><span class="sh-pill on">${wl}</span><span class="sh-pill on">重複回避</span>`;

  if(gap<=0){
    el.innerHTML='<div class="goal-done"><div class="goal-ring">✓</div><div class="goal-title">Goal Achieved</div><div class="goal-sub">Discipline leads to freedom.</div></div>';
    return;
  }

  // filter
  const ago7=Date.now()-7*864e5;
  const recent7=S.history.filter(m=>new Date(m.timestamp).getTime()>ago7).map(m=>m.main.toLowerCase());
  let pool=MENUS.filter(m=>{
    const nm=m.main.toLowerCase();
    const notRecent=!recent7.some(r=>nm.includes(r)||r.includes(nm));
    const seasOk=m.season.includes(mon);
    const dowOk=m.dow.includes(dow);
    const effOk=S.effect==='all'||m.cat===S.effect;
    return notRecent&&seasOk&&dowOk&&effOk;
  });
  if(pool.length<3)pool=MENUS.filter(m=>S.effect==='all'||m.cat===S.effect);
  if(pool.length<3)pool=[...MENUS];

  if(shuffle) pool.sort(()=>Math.random()-0.5);
  else pool.sort((a,b)=>Math.abs(gap-a.p)-Math.abs(gap-b.p));
  const cards=pool.slice(0,3);

  el.innerHTML=cards.map((opt,i)=>{
    const isBest=i===0;
    const diff=Math.abs(gap-opt.p);
    const matchGap=diff<=5;
    const tagsHtml=opt.tags.slice(0,3).map(t=>`<span class="sc-tag ${matchGap?'hl':''}">${t}</span>`).join('');
    return `
    <div class="sug-card ${isBest?'best':''}">
      <div class="sug-glow"></div>
      <div class="sc-top">
        <div class="sc-left">
          <div class="sc-rank">
            <span class="sc-num">${['I','II','III'][i]}</span>
            Option ${['A','B','C'][i]}
            ${isBest?'<span class="sc-best">Best Match</span>':''}
          </div>
          <div class="sc-name">${opt.main}</div>
          <div class="sc-side">副菜：${opt.side}</div>
        </div>
        <div class="sc-p">${opt.p.toFixed(1)}<span>g</span></div>
      </div>
      <div class="sc-effect">${opt.effect}</div>
      <div class="sc-footer">
        <div class="sc-tags">${tagsHtml}</div>
        <button class="sc-rec-btn ${isBest?'pri':''}" onclick="addFromSuggest('${opt.main.replace(/'/g,"\\'")}',${opt.p})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          記録
        </button>
      </div>
    </div>`;
  }).join('');
}

function renderStats(){
  const DAY_LBL=['日','月','火','水','木','金','土'];
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const meals=S.history.filter(m=>new Date(m.timestamp).toDateString()===ds);
    const tot=meals.reduce((s,m)=>s+m.protein,0);
    days.push({lbl:DAY_LBL[d.getDay()],tot,isToday:i===0,ok:tot>=TARGET,has:meals.length>0});
  }

  // SVG line chart
  const W=320,H=120,PL=30,PR=8,PT=18,PB=26;
  const cW=W-PL-PR,cH=H-PT-PB;
  const maxV=Math.max(...days.map(d=>d.tot),TARGET*1.1,10);
  const xStep=cW/(days.length-1);

  const gridVals=[0,Math.round(TARGET/2),TARGET];
  const grids=gridVals.map(v=>{
    const y=PT+cH-(v/maxV)*cH;
    const isT=v===TARGET;
    return `<line stroke="${isT?'rgba(16,185,129,0.22)':'#161a28'}" stroke-width="1" ${isT?'stroke-dasharray="4,3"':''} x1="${PL}" y1="${y.toFixed(1)}" x2="${W-PR}" y2="${y.toFixed(1)}"/>
    <text font-family="DM Mono,monospace" font-size="7" fill="${isT?'rgba(16,185,129,0.5)':'#404660'}" text-anchor="end" x="${PL-3}" y="${(y+2.5).toFixed(1)}">${v}</text>`;
  }).join('');

  const pts=days.map((d,i)=>({x:PL+i*xStep,y:PT+cH-(d.tot/maxV)*cH,d}));
  const areaD=pts.map((p,i)=>i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ')
    +` L${pts[pts.length-1].x.toFixed(1)},${(PT+cH).toFixed(1)} L${PL},${(PT+cH).toFixed(1)} Z`;
  const lineD=pts.map((p,i)=>i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const dots=pts.map(p=>{
    const r=p.d.isToday?4.5:3;
    const fc=p.d.ok?'var(--em)':p.d.has?'#1f2436':'#0d0f18';
    const sc='var(--em)';
    return `
    ${p.d.has?`<text font-family="DM Mono,monospace" font-size="7" fill="${p.d.ok?'var(--em)':'#404660'}" text-anchor="middle" x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}">${p.d.tot.toFixed(0)}</text>`:''}
    <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${fc}" stroke="${sc}" stroke-width="1.5" ${p.d.isToday?`filter="drop-shadow(0 0 4px var(--em))"`:''} />
    <text font-family="DM Mono,monospace" font-size="8" fill="${p.d.isToday?'var(--em)':'#404660'}" text-anchor="middle" x="${p.x.toFixed(1)}" y="${(PT+cH+14).toFixed(1)}">${p.d.lbl}</text>`;
  }).join('');

  document.getElementById('stats-chart').innerHTML=`
  <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--em)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--em)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${grids}
    <path fill="url(#ag)" d="${areaD}"/>
    <path fill="none" stroke="var(--em)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" d="${lineD}"/>
    ${dots}
  </svg>`;

  // KPI
  const wd=days.filter(d=>d.has);
  const avg=wd.length?(wd.reduce((s,d)=>s+d.tot,0)/wd.length):0;
  const str=days.slice().reverse().reduce((s,d)=>{if(s.done)return s;if(d.ok)return{...s,c:s.c+1};return{...s,done:true}},{c:0,done:false}).c;
  const best=Math.max(...days.map(d=>d.tot),0);
  const kpis=[
    {id:'kpi-avg',v:avg>0?avg.toFixed(0)+'g':'—',good:avg>=TARGET},
    {id:'kpi-str',v:str+'日',good:str>=3},
    {id:'kpi-best',v:best>0?best.toFixed(0)+'g':'—',good:best>=TARGET},
  ];
  kpis.forEach(k=>{
    const el=document.getElementById(k.id);
    el.textContent=k.v;
    el.className='kpi-val'+(k.good?' good':'');
  });
  document.getElementById('streak-dots').innerHTML=days.map(d=>`<div class="s-dot ${d.ok?'ok':''}"></div>`).join('');

  // Recent
  const recent=[...S.history].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,10);
  document.getElementById('recent-list').innerHTML=recent.length?recent.map(m=>{
    const t=new Date(m.timestamp);
    return `<div class="log-item" style="margin-bottom:7px;">
      <div class="li-l">
        <div class="li-badge">${m.type}</div>
        <div>
          <div class="li-name">${m.main}</div>
          <div class="li-time">${t.toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'})} ${t.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div>
        </div>
      </div>
      <div class="li-p">${m.protein.toFixed(1)}g</div>
    </div>`;
  }).join(''):'<div class="empty">データなし</div>';
}

// ── DATE NAV ──────────────────────────────────────────────────────────────
function updateDateNav(){
  const d=S.viewDate;
  const isToday=d.toDateString()===new Date().toDateString();
  document.getElementById('dn-date').textContent=
    `${d.getMonth()+1}/${d.getDate()}(${DAY_JP[d.getDay()]})`;
  const wrap=document.getElementById('dn-today-wrap');
  wrap.innerHTML=isToday?'':`<button class="dn-today" onclick="goToday()">TODAY</button>`;
  document.getElementById('dn-next').style.opacity=isToday?'0.3':'1';
  document.getElementById('dn-next').style.pointerEvents=isToday?'none':'all';
}
function updateDatePill(){
  const d=S.viewDate;
  document.getElementById('date-pill').textContent=
    `${d.getMonth()+1}/${d.getDate()}(${DAY_JP[d.getDay()]})`;
}
function moveDate(n){
  const next=new Date(S.viewDate);
  next.setDate(next.getDate()+n);
  if(next>new Date())return;
  S.viewDate=next;
  filterLogs();
  updateDateNav();
  updateDatePill();
  renderAll();
}
function goToday(){
  S.viewDate=new Date();
  filterLogs();
  updateDateNav();
  updateDatePill();
  renderAll();
}
function filterLogs(){
  const ds=S.viewDate.toDateString();
  S.viewLogs=S.history.filter(m=>new Date(m.timestamp).toDateString()===ds);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function switchTab(id){
  ['log','suggest','stats'].forEach(t=>{
    document.getElementById('pane-'+t).classList.toggle('active',t===id);
    document.getElementById('nav-'+t).classList.toggle('on',t===id);
  });
  if(id==='suggest')renderSuggest();
  if(id==='stats')renderStats();
}
function setType(t,btn){
  S.type=t;
  document.querySelectorAll('#type-seg .seg-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function setEffect(e,btn){
  S.effect=e;
  document.querySelectorAll('.eff-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderSuggest();
}
async function saveForm(){
  const main=document.getElementById('in-main').value.trim();
  const p=parseFloat(document.getElementById('in-p').value);
  if(!main){toast('主菜を入力してください');return;}
  await doSave({main,protein:p,type:S.type});
  document.getElementById('in-main').value='';
  document.getElementById('in-p').value=25;
  document.getElementById('sl-val').innerHTML='25.0<span>g</span>';
}
async function recordBreakfast(){
  await doSave({main:'朝セット',protein:45,type:'朝'});
}
async function addFromSuggest(main,p){
  await doSave({main,protein:p,type:'夜'});
  switchTab('log');
}
async function doSave(data){
  const rec=new Date(S.viewDate);
  const now=new Date();
  rec.setHours(now.getHours(),now.getMinutes(),now.getSeconds());
  const meal={...data,timestamp:rec.toISOString()};
  S.history.unshift(meal);
  filterLogs();
  renderAll();
  const btn=document.getElementById('save-btn');
  if(btn)btn.disabled=true;
  try{await fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify(meal)});toast('SAVED');}
  catch(e){toast('OFFLINE SAVE');}
  finally{if(btn)btn.disabled=false;}
}

// ── SWIPE ─────────────────────────────────────────────────────────────────
const _sw={};
function swipeStart(e,i){_sw[i]={x:e.touches[0].clientX,y:e.touches[0].clientY,open:false};}
function swipeMove(e,i){
  if(!_sw[i])return;
  const dx=_sw[i].x-e.touches[0].clientX;
  const dy=Math.abs(_sw[i].y-e.touches[0].clientY);
  if(dy>dx*0.8)return;
  if(dx>50){closeAllSwipes(i);document.getElementById('lia-'+i).classList.add('show');document.getElementById('lii-'+i).style.transform='translateX(-124px)';_sw[i].open=true;}
  else if(dx<-20){document.getElementById('lia-'+i).classList.remove('show');document.getElementById('lii-'+i).style.transform='';}
}
function swipeEnd(i){if(_sw[i]&&!_sw[i].open){document.getElementById('lia-'+i)?.classList.remove('show');document.getElementById('lii-'+i).style.transform='';}}
function closeAllSwipes(except=-1){
  document.querySelectorAll('.li-actions').forEach((el,j)=>{if(j!==except){el.classList.remove('show');}});
  document.querySelectorAll('.log-item').forEach((el,j)=>{if(j!==except)el.style.transform='';});
}
document.addEventListener('touchstart',e=>{if(!e.target.closest('.li-wrap'))closeAllSwipes();});

// ── EDIT ──────────────────────────────────────────────────────────────────
function openEdit(i){
  closeAllSwipes();
  _editIdx=i;_editType=S.viewLogs[i].type;
  const m=S.viewLogs[i];
  document.getElementById('edit-main').value=m.main;
  document.getElementById('edit-p').value=m.protein;
  document.getElementById('edit-sl-val').innerHTML=m.protein.toFixed(1)+'<span>g</span>';
  document.querySelectorAll('#edit-seg .seg-btn').forEach(b=>b.classList.toggle('on',b.textContent===m.type));
  openModal('edit-modal');
}
function setEditType(t,btn){_editType=t;document.querySelectorAll('#edit-seg .seg-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function commitEdit(){
  if(_editIdx===null)return;
  const main=document.getElementById('edit-main').value.trim();
  const p=parseFloat(document.getElementById('edit-p').value);
  if(!main)return;
  const ts=S.viewLogs[_editIdx].timestamp;
  S.viewLogs[_editIdx]={...S.viewLogs[_editIdx],main,protein:p,type:_editType};
  const hi=S.history.findIndex(h=>h.timestamp===ts);
  if(hi>=0)S.history[hi]={...S.history[hi],main,protein:p,type:_editType};
  closeModal('edit-modal');renderAll();toast('UPDATED');
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'update',timestamp:ts,main,protein:p,type:_editType})}).catch(()=>{});
}

// ── DELETE ────────────────────────────────────────────────────────────────
function openDel(i){
  closeAllSwipes();
  _delIdx=i;
  const m=S.viewLogs[i];
  document.getElementById('del-name').textContent=`${m.type}｜${m.main}｜${m.protein.toFixed(1)}g`;
  openModal('del-modal');
}
function commitDelete(){
  if(_delIdx===null)return;
  const ts=S.viewLogs[_delIdx].timestamp;
  S.viewLogs.splice(_delIdx,1);
  S.history=S.history.filter(m=>m.timestamp!==ts);
  closeModal('del-modal');renderAll();toast('DELETED');
  fetch(GAS,{method:'POST',mode:'no-cors',body:JSON.stringify({_action:'delete',timestamp:ts})}).catch(()=>{});
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function onModalBgClick(e,id){if(e.target===document.getElementById(id))closeModal(id);}

// ── TOAST ─────────────────────────────────────────────────────────────────
function toast(msg){
  const h=document.getElementById('toast-host');
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  h.appendChild(el);setTimeout(()=>el.remove(),3000);
}
</script>
