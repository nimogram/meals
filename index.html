<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meal OS v7.3</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #04050a; color: #dce0ec; overflow-x: hidden; }
        .serif { font-family: 'DM Serif Display', serif; }
        .mono { font-family: 'DM Mono', monospace; }
        
        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #1f2436; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: #10b981; cursor: pointer; margin-top: -10px; 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); border: 2px solid #04050a; 
        }
        .custom-scroll::-webkit-scrollbar { display: none; }
        
        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }
        .progress-glow { animation: glow 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // --- STRATEGIC CONFIG ---
        // ここにGASの最新デプロイURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzw9uIE_zh0N8KOb9kUjrEH3V4hORgvy9sjLEBcg13GZ1rsI75fNQ03m6rXPbPNsXdTZA/exec";
        const TARGET_PROTEIN = 120;

        const Icons = {
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>,
            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [meals, setMeals] = useState([]);
            const [menus, setMenus] = useState([]);
            const [activeTab, setActiveTab] = useState('record');
            const [isSyncing, setIsSyncing] = useState(false);
            const [showToast, setShowToast] = useState("");
            const [selectedEffect, setSelectedEffect] = useState('all');
            const [confirmModal, setConfirmModal] = useState({ show: false, meal: null });

            const [editingId, setEditingId] = useState(null);
            const [mealType, setMealType] = useState('昼');
            const [mainMenu, setMainMenu] = useState('');
            const [protein, setProtein] = useState(25.0);

            useEffect(() => { fetchData(); }, []);

            const fetchData = async () => {
                setIsSyncing(true);
                try {
                    const r = await fetch(GAS_URL);
                    const data = await r.json();
                    if (data.history) setMeals(data.history.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)));
                    if (data.menus) setMenus(data.menus);
                } catch (e) { 
                    setShowToast("SYNC ERROR"); 
                } finally { 
                    setLoading(false); 
                    setIsSyncing(false); 
                }
            };

            const todayProtein = useMemo(() => 
                meals.filter(m => m.isToday).reduce((sum, m) => sum + (Number(m.protein) || 0), 0)
            , [meals]);

            const gap = Math.max(0, TARGET_PROTEIN - todayProtein);
            const progress = Math.min((todayProtein / TARGET_PROTEIN) * 100, 100);

            const handleSave = async (e) => {
                if (e) e.preventDefault();
                if (!mainMenu) return;
                setIsSyncing(true);

                // 時差を防ぐため Z を付けないローカル時間をIDとして使用 (v7.3ロジック)
                const now = new Date();
                const offset = now.getTimezoneOffset() * 60000;
                const localISOTime = (new Date(now - offset)).toISOString().slice(0, -1);
                
                const targetId = editingId || localISOTime;
                const payload = {
                    _action: editingId ? 'update' : 'save',
                    timestamp: targetId,
                    type: mealType,
                    main: mainMenu,
                    protein: parseFloat(protein)
                };

                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setShowToast(editingId ? "UPDATED" : "SAVED");
                    setEditingId(null); setMainMenu(''); setProtein(25.0);
                    // サーバー側の反映を待つため0.8秒待機
                    setTimeout(fetchData, 800);
                } catch (err) { 
                    setShowToast("SAVE ERROR"); 
                } finally { 
                    setIsSyncing(false); 
                    setTimeout(() => setShowToast(""), 3000); 
                }
            };

            const executeDelete = async () => {
                const m = confirmModal.meal;
                setIsSyncing(true);
                setConfirmModal({ show: false, meal: null });
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ _action: 'delete', timestamp: m.timestamp }) });
                    setShowToast("DELETED");
                    setTimeout(fetchData, 800);
                } catch (err) { 
                    setShowToast("DELETE ERROR"); 
                } finally { 
                    setIsSyncing(false); 
                    setTimeout(() => setShowToast(""), 3000); 
                }
            };

            const suggestions = useMemo(() => {
                if (gap <= 0 || menus.length === 0) return [];
                let pool = [...menus];
                if (selectedEffect !== 'all') pool = pool.filter(m => m.cat === selectedEffect);
                return pool.sort(() => Math.random() - 0.5).slice(0, 3);
            }, [menus, gap, selectedEffect]);

            if (loading) return (
                <div className="h-screen bg-[#04050a] flex flex-col items-center justify-center text-[#10b981] font-black animate-pulse">
                    <div className="animate-spin mb-6 text-3xl"><Icons.Refresh /></div>
                    <span className="uppercase tracking-[0.3em] text-[10px] mono">Meal OS v7.3 Syncing...</span>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#04050a] text-[#dce0ec] pb-24 font-sans max-w-[430px] mx-auto relative flex flex-col border-x border-[#161a28] shadow-2xl">
                    
                    {/* Header */}
                    <header className="bg-gradient-to-b from-[#090b12] to-[#04050a] p-6 pb-8 border-b border-[#161a28] sticky top-0 z-[100] backdrop-blur-md">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h1 className="text-xl font-black text-[#10b981] tracking-tighter serif leading-none">Meal OS v7.3</h1>
                                <p className="text-[7px] text-[#404660] uppercase tracking-[0.25em] font-medium mt-1 mono">Discipline in Sapporo</p>
                            </div>
                            <button onClick={fetchData} className="p-2.5 bg-[#0e1019] border border-[#161a28] rounded-xl text-[#404660] active:scale-90 transition-all hover:text-[#10b981]">
                                <div className={isSyncing ? 'animate-spin text-[#10b981]' : ''}><Icons.Refresh /></div>
                            </button>
                        </div>
                        
                        <div className="space-y-3">
                            <div className="flex justify-between items-baseline mb-1">
                                <span className="text-[8px] mono text-[#404660] uppercase tracking-[0.2em]">Today / Target 120g</span>
                                <div className="flex items-baseline gap-1">
                                    <span className="text-4xl font-black text-[#10b981] leading-none serif">{todayProtein.toFixed(1)}</span>
                                    <span className="text-[10px] mono text-[#404660]">g</span>
                                </div>
                            </div>
                            <div className="h-[2px] w-full bg-[#161a28] relative overflow-hidden rounded-full">
                                <div className="h-full bg-gradient-to-r from-[#065f46] to-[#10b981] transition-all duration-1000 ease-out relative" style={{ width: `${progress}%` }}>
                                    <div className="absolute inset-0 bg-white/20 progress-glow"></div>
                                </div>
                            </div>
                            <div className="flex justify-between items-center text-[8px] mono text-[#404660] tracking-widest uppercase">
                                <span>{progress.toFixed(0)}% Done</span>
                                <span>残り <em className="text-[#10b981] not-italic font-bold">{gap.toFixed(1)}g</em></span>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-5 space-y-6 overflow-y-auto custom-scroll">
                        {showToast && (
                            <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-[#10b981] text-[#04050a] px-5 py-2 rounded-full text-[9px] font-black tracking-widest z-[200] shadow-2xl animate-bounce">
                                {showToast}
                            </div>
                        )}

                        {activeTab === 'record' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <button onClick={() => { setMainMenu('朝セット'); setProtein(45.0); setMealType('朝'); setTimeout(() => handleSave(), 100); }} className="w-full bg-[#090b12] border border-[#161a28] p-4 rounded-2xl flex items-center justify-between shadow-xl active:scale-95 transition-all group">
                                    <div className="flex items-center space-x-4">
                                        <div className="bg-[#10b98114] border border-[#10b98126] p-3 rounded-xl text-[#10b981] text-xl group-hover:bg-[#10b98126] transition-colors">🥚</div>
                                        <div className="text-left">
                                            <p className="text-[13px] font-bold text-[#ffffff] tracking-tight">朝セットを記録</p>
                                            <p className="text-[8px] mono text-[#404660] uppercase tracking-widest mt-0.5">45.0g P｜固定ルーチン</p>
                                        </div>
                                    </div>
                                    <span className="text-[#404660]">→</span>
                                </button>

                                <section className={`bg-[#090b12] border ${editingId ? 'border-[#10b981] shadow-[0_0_20px_rgba(16,185,129,0.1)]' : 'border-[#161a28]'} rounded-[2.5rem] p-6 shadow-2xl transition-all`}>
                                    <form onSubmit={handleSave} className="space-y-6">
                                        <div className="flex bg-[#04050a] p-1 rounded-xl border border-[#161a28]">
                                            {['朝', '昼', '夜', '他'].map(t => (
                                                <button key={t} type="button" onClick={() => setMealType(t)} className={`flex-1 py-2.5 text-[9px] mono font-bold rounded-lg transition-all ${mealType === t ? 'bg-[#10b981] text-[#04050a] shadow-lg' : 'text-[#404660] hover:text-[#dce0ec]'}`}>{t}</button>
                                            ))}
                                        </div>
                                        <input type="text" placeholder="主菜（タンパク源）" value={mainMenu} onChange={e => setMainMenu(e.target.value)} className="w-full bg-[#04050a] border border-[#161a28] rounded-xl px-4 py-4 text-sm font-bold focus:border-[#10b981] outline-none transition-all placeholder-[#272c40]" />
                                        
                                        <div className="bg-[#04050a] p-5 rounded-2xl border border-[#161a28] space-y-4">
                                            <div className="flex justify-between items-center px-1">
                                                <span className="text-[8px] mono text-[#404660] uppercase tracking-[0.2em]">Estimate Protein</span>
                                                <span className="text-2xl font-black text-[#10b981] serif leading-none">{Number(protein).toFixed(1)}<span className="text-[9px] mono text-[#404660] ml-1">g</span></span>
                                            </div>
                                            <input type="range" min="0" max="80" step="0.5" value={protein} onChange={e => setProtein(e.target.value)} />
                                        </div>
                                        
                                        <button type="submit" disabled={isSyncing} className="w-full bg-[#10b981] text-[#04050a] py-5 rounded-[1.2rem] mono text-[10px] font-bold tracking-[0.2em] shadow-xl active:scale-[0.98] transition-all flex justify-center items-center uppercase">
                                            {editingId ? "記録を修正する →" : "記録を保存する →"}
                                        </button>
                                    </form>
                                </section>

                                <section className="space-y-4">
                                    <div className="flex items-center gap-2 mb-2 px-1">
                                        <span className="text-[8px] mono text-[#404660] uppercase tracking-[0.25em]">Records List</span>
                                        <div className="h-[1px] bg-[#161a28] flex-1" />
                                    </div>
                                    {meals.filter(m => m.isToday).length === 0 ? <p className="text-center text-[10px] text-[#404660] py-10 italic uppercase tracking-widest">No records found today.</p> : meals.filter(m => m.isToday).map((m, i) => (
                                        <div key={m.timestamp} className="bg-[#090b12] border border-[#161a28] p-4 rounded-2xl flex items-center justify-between shadow-lg group hover:border-[#404660] transition-all">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-10 h-10 bg-[#04050a] rounded-xl flex flex-col items-center justify-center border border-[#161a28]">
                                                    <span className="text-[7px] font-bold text-[#10b981]">TODAY</span>
                                                    <span className="text-[9px] font-bold text-[#dce0ec]">{m.type}</span>
                                                </div>
                                                <div>
                                                    <p className="text-[13px] font-bold text-[#ffffff] leading-none mb-2">{m.main}</p>
                                                    <p className="text-[8px] mono text-[#404660] uppercase flex items-center gap-1 leading-none">
                                                        <Icons.Clock /> {new Date(m.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex items-center space-x-4">
                                                <span className="text-xl font-black text-[#10b981] serif leading-none">{Number(m.protein).toFixed(1)}g</span>
                                                <div className="flex flex-col space-y-2 pl-4 border-l border-[#161a28] opacity-20 group-hover:opacity-100 transition-opacity">
                                                    <button onClick={() => { setEditingId(m.timestamp); setMealType(m.type); setMainMenu(m.main); setProtein(m.protein); window.scrollTo(0,0); }} className="text-[#404660] hover:text-[#10b981]"><Icons.Edit /></button>
                                                    <button onClick={() => setConfirmModal({ show: true, meal: m })} className="text-[#404660] hover:text-[#e05a6a]"><Icons.Trash /></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </section>
                            </div>
                        )}

                        {activeTab === 'suggest' && (
                            <div className="space-y-4 animate-in slide-in-from-right-4 duration-500">
                                <div className="bg-gradient-to-br from-[#0e1019] to-[#04050a] border border-[#10b98120] rounded-2xl p-6 relative overflow-hidden shadow-2xl">
                                    <div className="text-[7px] text-[#10b981] mono tracking-[0.2em] uppercase bg-[#10b9810d] border border-[#10b9811a] px-3 py-1 rounded-full mb-4 inline-block">Tonight's Strategy</div>
                                    <div className="text-4xl font-black text-[#ffffff] leading-none mb-2 serif">
                                        {gap.toFixed(1)}<span className="text-[#10b981] text-xs mono ml-2 uppercase">g 不足</span>
                                    </div>
                                    <p className="text-[10px] text-[#404660]">目標120gまであと一歩。アンチエイジングを意識したメニューを選択します。</p>
                                </div>

                                <div className="flex bg-[#04050a] p-1 rounded-xl border border-[#161a28]">
                                    {[['all','ALL'], ['muscle','筋肉増強'], ['recovery','回復'], ['antiaging','老化防止']].map(([val, label]) => (
                                        <button key={val} onClick={() => setSelectedEffect(val)} className={`flex-1 py-2 text-[8px] mono font-bold rounded-lg transition-all ${selectedEffect === val ? 'bg-[#10b981] text-[#04050a] shadow-lg' : 'text-[#404660]'}`}>{label}</button>
                                    ))}
                                </div>

                                <div className="space-y-3">
                                    {suggestions.map((opt, i) => (
                                        <div key={i} className="bg-[#090b12] border border-[#161a28] p-5 rounded-[1.5rem] relative group shadow-xl">
                                            <div className="flex justify-between items-start mb-3">
                                                <h3 className="text-lg font-bold text-[#ffffff] pr-8 serif leading-tight">{opt.main}</h3>
                                                <div className="text-xl font-black text-[#10b981] serif leading-none">{opt.p.toFixed(1)}g</div>
                                            </div>
                                            <p className="text-[10px] text-[#404660] mb-4 font-light italic">副菜：{opt.side}</p>
                                            <div className="flex flex-wrap gap-2 mb-6">
                                                {(opt.tags || []).map((t, idx) => (
                                                    <span key={idx} className="text-[7px] mono border border-[#161a28] text-[#10b981] px-2 py-0.5 rounded-md uppercase tracking-widest leading-none">{t}</span>
                                                ))}
                                            </div>
                                            <button onClick={() => { setMainMenu(opt.main); setProtein(opt.p); setMealType('夜'); setActiveTab('record'); window.scrollTo(0,0); }} className="w-full bg-[#10b9811a] border border-[#10b98133] text-[#10b981] py-3 rounded-xl mono text-[8px] font-bold tracking-[0.2em] uppercase hover:bg-[#10b981] hover:text-[#04050a] transition-all">
                                                戦略を選択して記録 →
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'stats' && (
                            <div className="space-y-6 text-center py-20 animate-in zoom-in-95 duration-500">
                                <div className="text-[#10b9811a] text-6xl mb-6 flex justify-center opacity-30">📈</div>
                                <h3 className="text-sm font-bold text-[#404660] uppercase tracking-widest">Weekly Analytics</h3>
                                <p className="text-[10px] text-[#404660] italic max-w-[200px] mx-auto leading-relaxed">規律の継続が成果への最短経路です。</p>
                            </div>
                        )}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto bg-[#04050af2] backdrop-blur-xl border-t border-[#161a28] flex justify-around p-4 z-[100] safe-area-bottom shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
                        {[
                            { id: 'record', label: 'Log', emoji: '🍴' },
                            { id: 'suggest', label: 'Dinner', emoji: '🍳' },
                            { id: 'stats', label: 'Stats', emoji: '📈' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center gap-1.5 transition-all duration-300 px-6 ${activeTab === t.id ? 'text-[#10b981]' : 'text-[#404660]'}`}>
                                <span className="text-xl leading-none">{t.emoji}</span>
                                <span className="text-[7px] mono font-bold uppercase tracking-widest">{t.label}</span>
                                {activeTab === t.id && <div className="w-1 h-1 bg-[#10b981] rounded-full mt-1 animate-pulse"></div>}
                            </button>
                        ))}
                    </nav>

                    {/* Confirm Modal */}
                    {confirmModal.show && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[300] flex items-center justify-center p-6">
                            <div className="bg-[#0b0d14] border border-[#161a28] w-full max-w-[320px] rounded-[2rem] p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] animate-in zoom-in-95 duration-200">
                                <h3 className="text-lg font-bold text-white mb-2 serif">削除の確認</h3>
                                <p className="text-[11px] text-[#454a60] leading-relaxed mb-8">
                                    「<span className="text-[#dce0ec] font-bold">{confirmModal.meal?.main}</span>」の記録を削除します。よろしいですか？
                                </p>
                                <div className="flex gap-3">
                                    <button onClick={() => setConfirmModal({ show: false, meal: null })} className="flex-1 py-4 rounded-xl bg-[#161a28] text-[9px] font-bold uppercase tracking-widest">戻る</button>
                                    <button onClick={executeDelete} className="flex-1 py-4 rounded-xl bg-[#e05a6a] text-[#04050a] text-[9px] font-bold uppercase tracking-widest shadow-lg shadow-[#e05a6a]/20">削除</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
