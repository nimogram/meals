<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meal Log v7.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; -webkit-tap-highlight-color: transparent; }
        .protein-gauge { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
        input[type="range"] { -webkit-appearance: none; background: #1e293b; height: 6px; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 26px; width: 26px; border-radius: 50%; background: #10b981; border: 4px solid #020617; box-shadow: 0 0 15px rgba(16,185,129,0.5); cursor: pointer; }
    </style>
</head>
<body class="text-slate-100 antialiased overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-950 relative border-x border-slate-900 shadow-2xl">
        
        <!-- Header: Protein Stats -->
        <header class="bg-slate-900/95 backdrop-blur-xl p-6 rounded-b-[2.5rem] sticky top-0 z-50 border-b border-slate-800 shadow-2xl">
            <div id="toast-container" class="absolute top-2 left-0 right-0 flex justify-center pointer-events-none z-[110]"></div>
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-black text-emerald-400 tracking-tighter leading-none">MEAL LOG v7.2</h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-black mt-1">Strategic Strategic Pro</p>
                </div>
                <div onclick="fetchData()" class="p-2 bg-slate-800 rounded-xl text-slate-500 cursor-pointer active:scale-90 transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="sync-icon"></i>
                </div>
            </div>
            <div class="space-y-3">
                <div class="flex justify-between items-end leading-none">
                    <span class="text-[10px] text-slate-500 font-black uppercase tracking-widest leading-none">Target 120g P</span>
                    <span id="header-p-display" class="text-3xl font-black leading-none">0.0<span class="text-xs text-slate-600 ml-1">g</span></span>
                </div>
                <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="p-gauge" class="h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)] protein-gauge" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[10px] font-black uppercase tracking-tighter">
                    <span id="p-percent" class="text-slate-600 font-bold">0% Done</span>
                    <span class="text-slate-500">Gap: <span id="gap-display" class="text-emerald-400 font-black">120.0g</span></span>
                </div>
            </div>
        </header>

        <!-- View Screens -->
        <main class="flex-1 p-5 pb-32 overflow-y-auto">
            
            <!-- Record Tab -->
            <div id="view-record" class="space-y-6">
                <div onclick="recordQuickBreakfast()" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center justify-between shadow-xl cursor-pointer active:scale-95 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="bg-emerald-400/10 p-2 rounded-xl text-emerald-400"><i data-lucide="zap"></i></div>
                        <div class="text-left">
                            <p class="font-bold text-white leading-none mb-1">朝セットを記録</p>
                            <p class="text-[10px] text-slate-500 font-black uppercase tracking-wider">45.0g P (納豆込)</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="text-slate-600"></i>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 p-6 rounded-[2.5rem] space-y-5 shadow-2xl">
                    <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800" id="type-selector">
                        <button onclick="setMealType('朝')" class="type-btn flex-1 py-2.5 text-[10px] font-black rounded-lg text-slate-600">朝</button>
                        <button onclick="setMealType('昼')" class="type-btn flex-1 py-2.5 text-[10px] font-black rounded-lg bg-emerald-600 text-white shadow-lg">昼</button>
                        <button onclick="setMealType('夜')" class="type-btn flex-1 py-2.5 text-[10px] font-black rounded-lg text-slate-600">夜</button>
                        <button onclick="setMealType('他')" class="type-btn flex-1 py-2.5 text-[10px] font-black rounded-lg text-slate-600">他</button>
                    </div>
                    <input id="in-main" type="text" placeholder="主菜 (タンパク源)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 font-bold text-white outline-none focus:ring-1 focus:ring-emerald-500" />
                    <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800 text-center">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="text-[10px] text-slate-500 font-black">ESTIMATED PROTEIN</span>
                            <span id="form-p-label" class="text-3xl font-black text-emerald-400">25.0g</span>
                        </div>
                        <input type="range" id="in-protein" min="0" max="110" step="0.5" value="25" oninput="document.getElementById('form-p-label').innerText = parseFloat(this.value).toFixed(1)+'g'" class="w-full mt-3" />
                    </div>
                    <button onclick="saveFromForm()" class="w-full bg-emerald-600 text-white py-5 rounded-[1.8rem] font-black text-lg tracking-widest shadow-xl active:scale-95 transition-all">レポを同期</button>
                </div>

                <div class="space-y-4">
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Today's Records</h2>
                    <div id="log-list" class="space-y-3"></div>
                </div>
            </div>

            <!-- Suggest Tab -->
            <div id="view-suggest" class="hidden space-y-4">
                <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-3xl text-center mb-4">
                    <p class="text-[10px] text-emerald-400 font-black uppercase tracking-[0.2em]">Strategic Suggestions</p>
                </div>
                <div id="suggest-list" class="space-y-4">
                    <!-- Suggested menus injected here -->
                </div>
                <div id="debug-info" class="mt-8 p-4 bg-slate-900/30 border border-slate-800 rounded-2xl text-[9px] font-mono text-slate-600 leading-tight"></div>
            </div>

            <!-- Stats Tab -->
            <div id="view-stats" class="hidden py-20 text-center px-10">
                <i data-lucide="trending-up" class="text-slate-700 mx-auto mb-8 w-12 h-12"></i>
                <h3 class="text-xl font-black text-slate-500 mb-3 uppercase tracking-widest leading-none">Strategic Monitor</h3>
                <p class="text-xs text-slate-700 italic leading-relaxed font-bold">週次中間レポート、および月末の推移まとめは、スプレッドシートに基づき自動生成されます。</p>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-950/95 border-t border-slate-800 flex justify-around p-4 safe-area-bottom shadow-2xl z-[100] backdrop-blur-xl">
            <div onclick="switchTab('record')" id="nav-record" class="flex flex-col items-center text-emerald-400 cursor-pointer">
                <i data-lucide="list-checks" stroke-width="3"></i>
                <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Log</span>
            </div>
            <div onclick="switchTab('suggest')" id="nav-suggest" class="flex flex-col items-center text-slate-600 cursor-pointer">
                <i data-lucide="chef-hat"></i>
                <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Idea</span>
            </div>
            <div onclick="switchTab('stats')" id="nav-stats" class="flex flex-col items-center text-slate-600 cursor-pointer">
                <i data-lucide="trending-up"></i>
                <span class="text-[9px] font-black uppercase mt-1 tracking-widest">Stats</span>
            </div>
        </nav>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec";
        const TARGET_PROTEIN = 120;

        // --- All 57 Menu Database (Strategic Assets) ---
        const MENU_POOL = [
            { main: "牛肉ステーキ", p: 40.0, side: "ブロッコリーサラダ" },
            { main: "チキンステーキ", p: 40.0, side: "野菜・アボカド" },
            { main: "鶏むね肉の低温調理", p: 35.0, side: "ブロッコリースプラウト" },
            { main: "手巻き寿司", p: 35.0, side: "海苔・酢飯・卵" },
            { main: "鹿肉ステーキ", p: 34.0, side: "舞茸のソテー" },
            { main: "ラムチョップ香草焼き", p: 32.0, side: "焼きトマト" },
            { main: "生ラム肉のグリル", p: 32.0, side: "焼き玉ねぎ" },
            { main: "牛赤身肉のタリアータ", p: 31.0, side: "ルッコラ" },
            { main: "刺身盛り合わせ", p: 30.0, side: "ほうれん草お浸し" },
            { main: "生カツオのたたき", p: 28.5, side: "玉ねぎ・ポン酢" },
            { main: "サーモンステーキ", p: 28.0, side: "アスパラ" },
            { main: "砂肝のコンフィ", p: 25.0, side: "ブロッコリー" },
            { main: "茹で豚の冷しゃぶ", p: 26.0, side: "叩ききゅうり" },
            { main: "ブリの照り焼き", p: 26.0, side: "長いも" },
            { main: "真鯛のアクアパッツァ", p: 26.0, side: "あさり" },
            { main: "うなぎの白焼き", p: 25.0, side: "肝吸い" },
            { main: "サバ味噌煮缶", p: 20.9, side: "雑穀米少量" }
        ];

        let state = {
            currentTab: 'record',
            history: [],
            todaysMeals: [],
            mealType: '昼',
            isSyncing: false
        };

        window.onload = () => {
            fetchData();
            updateUI(); // First render
            if(window.lucide) lucide.createIcons();
        };

        async function fetchData() {
            const icon = document.getElementById('sync-icon');
            if(icon) icon.classList.add('animate-spin');
            try {
                const res = await fetch(GAS_URL);
                const data = await res.json();
                state.history = data.map(d => ({
                    main: (d.main || d.mainMenu || "").trim(),
                    protein: parseFloat(d.protein || 0),
                    timestamp: d.timestamp,
                    type: d.type || d.mealType || "他"
                }));
                const today = new Date().toDateString();
                state.todaysMeals = state.history.filter(m => new Date(m.timestamp).toDateString() === today);
                showToast("SYNC COMPLETE");
            } catch (e) {
                showToast("OFFLINE MODE");
            } finally {
                if(icon) icon.classList.remove('animate-spin');
                updateUI();
            }
        }

        function updateUI() {
            renderHeader();
            renderLogList();
            renderSuggestions();
        }

        function renderHeader() {
            const currentP = state.todaysMeals.reduce((sum, m) => sum + m.protein, 0);
            const gap = Math.max(0, TARGET_PROTEIN - currentP);
            const progress = Math.min((currentP / TARGET_PROTEIN) * 100, 100);

            document.getElementById('header-p-display').innerHTML = `${currentP.toFixed(1)}<span class="text-xs text-slate-600 ml-1">g</span>`;
            document.getElementById('p-gauge').style.width = `${progress}%`;
            document.getElementById('p-percent').innerText = `${progress.toFixed(0)}% Done`;
            document.getElementById('gap-display').innerText = `${gap.toFixed(1)}g`;
        }

        function renderLogList() {
            const list = document.getElementById('log-list');
            if (state.todaysMeals.length === 0) {
                list.innerHTML = '<p class="text-center py-10 text-slate-700 italic text-sm animate-in">No records found today.</p>';
                return;
            }
            list.innerHTML = state.todaysMeals.map(m => `
                <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex items-center justify-between shadow-lg animate-in">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-500 border border-slate-700 uppercase">${m.type}</div>
                        <div class="text-left">
                            <p class="font-bold text-white tracking-tight leading-none mb-1">${m.main}</p>
                            <p class="text-[10px] text-slate-500 leading-none">${new Date(m.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                    <span class="text-lg font-black text-emerald-400">+${m.protein.toFixed(1)}g</span>
                </div>
            `).join('');
        }

        function renderSuggestions() {
            const list = document.getElementById('suggest-list');
            const currentP = state.todaysMeals.reduce((sum, m) => sum + m.protein, 0);
            const gap = Math.max(0, TARGET_PROTEIN - currentP);

            if (gap <= 0) {
                list.innerHTML = `
                    <div class="py-20 text-center animate-in">
                        <i data-lucide="check-circle-2" class="text-emerald-500 mx-auto mb-4 w-12 h-12"></i>
                        <h3 class="text-2xl font-black text-white uppercase tracking-tighter mb-2">Goal Accomplished</h3>
                        <p class="text-sm text-slate-500 italic">Discipline leads to freedom.</p>
                    </div>`;
                if(window.lucide) lucide.createIcons();
                return;
            }

            // ロジック：直近の履歴と被らないものを抽出
            const recent = state.history.slice(-10).map(h => (h.main || "").toLowerCase().trim()).filter(n => n.length > 0);
            let candidates = MENU_POOL.filter(m => {
                const name = m.main.toLowerCase().trim();
                return !recent.some(r => name.includes(r) || r.includes(name));
            });

            // セーフティ：候補が枯渇したら全プールから
            if (candidates.length < 3) candidates = MENU_POOL;

            // 不足分(gap)に近い順にソート
            const sorted = candidates.sort((a, b) => Math.abs(gap - a.p) - Math.abs(gap - b.p)).slice(0, 3);

            list.innerHTML = sorted.map((opt, i) => `
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl space-y-4 relative overflow-hidden group active:scale-95 transition-all">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full -mr-16 -mt-16"></div>
                    <div class="flex justify-between items-center relative z-10">
                        <span class="text-[10px] font-black text-emerald-400 uppercase tracking-widest leading-none">Option ${String.fromCharCode(65+i)}</span>
                        <span class="bg-emerald-500/20 text-emerald-400 px-4 py-1.5 rounded-xl text-2xl font-black leading-none shadow-inner">+${opt.p.toFixed(1)}g</span>
                    </div>
                    <div class="relative z-10 text-left">
                        <h3 class="text-white font-black text-xl tracking-tight leading-tight mb-2">${opt.main}</h3>
                        <p class="text-slate-400 text-sm italic font-medium leading-none">${opt.side}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('debug-info').innerHTML = `ENGINE: History=${state.history.length}, Candidates=${candidates.length}, Gap=${gap.toFixed(1)}g`;
            if(window.lucide) lucide.createIcons();
        }

        // --- Controller Actions ---
        function switchTab(tabId) {
            state.currentTab = tabId;
            ['record', 'suggest', 'stats'].forEach(id => {
                const view = document.getElementById(`view-${id}`);
                const btn = document.getElementById(`nav-${id}`);
                const icon = btn.querySelector('i');
                if (id === tabId) {
                    view.classList.remove('hidden');
                    view.classList.add('animate-in');
                    btn.classList.add('text-emerald-400');
                    btn.classList.remove('text-slate-600');
                    icon.setAttribute('stroke-width', '3');
                } else {
                    view.classList.add('hidden');
                    btn.classList.remove('text-emerald-400');
                    btn.classList.add('text-slate-600');
                    icon.setAttribute('stroke-width', '2');
                }
            });
            if (tabId === 'suggest') renderSuggestions();
            if(window.lucide) lucide.createIcons();
        }

        function setMealType(type) {
            state.mealType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                const active = btn.innerText === type;
                btn.className = `type-btn flex-1 py-2.5 text-[10px] font-black rounded-lg transition-all ${active ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600'}`;
            });
        }

        async function saveFromForm() {
            const main = document.getElementById('in-main').value;
            const protein = parseFloat(document.getElementById('in-protein').value);
            if (!main) return;
            const meal = { timestamp: new Date().toISOString(), type: state.mealType, main, protein };
            await executeSync(meal);
            document.getElementById('in-main').value = '';
            document.getElementById('in-protein').value = 25;
            document.getElementById('form-p-label').innerText = '25.0g';
        }

        async function recordQuickBreakfast() {
            const meal = { timestamp: new Date().toISOString(), type: '朝', main: '朝セット', protein: 45.0 };
            await executeSync(meal);
        }

        async function executeSync(meal) {
            if(state.isSyncing) return;
            state.isSyncing = true;
            state.todaysMeals = [meal, ...state.todaysMeals];
            updateUI();
            try {
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(meal) });
                showToast("SYNCED");
            } catch (e) {
                showToast("OFFLINE SAVE");
            }
            state.isSyncing = false;
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "bg-emerald-500 text-white px-5 py-2.5 rounded-full text-[10px] font-black shadow-2xl mb-2 animate-in";
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
