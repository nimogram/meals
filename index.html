<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meal OS v7.8.2</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #010206;
            --glass: rgba(255, 255, 255, 0.02);
            --em: #bef264;
            --em-grad: linear-gradient(135deg, #bef264 0%, #84cc16 100%);
            --em-glow: rgba(190, 242, 100, 0.3);
            --tx: #f1f3f9;
            --mu: #475569;
            --yel: #fbbf24;
            --err: #f87171;
            --mono: 'DM Mono', monospace;
            --serif: 'DM Serif Display', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: var(--bg); 
            color: var(--tx); 
            height: 100dvh; 
            overflow: hidden; 
            position: relative;
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 10%, #152515 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #0a0f1e 0%, transparent 40%);
            z-index: -1;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .animate-fade { animation: fadeIn 0.8s ease-out forwards; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .btn-lime {
            background: var(--em-grad);
            color: #05060f;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px var(--em-glow);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-lime:active { transform: scale(0.95); }

        .btn-sub {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--em);
            font-family: var(--mono);
            font-size: 10px;
            font-weight: 900;
            border-radius: 12px;
            padding: 8px 12px;
            cursor: pointer;
        }

        input[type=range] { -webkit-appearance: none; background: transparent; width: 100%; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 22px; width: 22px; border-radius: 50%; 
            background: var(--tx); margin-top: -9px; border: 3px solid var(--em);
            box-shadow: 0 0 15px var(--em-glow);
        }

        .sticky-analysis {
            position: sticky; top: 0; z-index: 50;
            background: rgba(1, 2, 6, 0.9);
            backdrop-filter: blur(20px);
            padding: 10px 0 20px;
            margin: 0 -18px;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        .delete-btn {
            opacity: 0.5;
            transition: opacity 0.3s;
            background: none;
            border: none;
            color: var(--err);
            cursor: pointer;
            padding: 8px;
        }
        .delete-btn:hover { opacity: 1; }

        .badge-tag {
            font-size: 8px;
            padding: 2px 8px;
            border-radius: 6px;
            font-family: var(--mono);
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTJRcZnupMLgvX28yX6wqpSZj2vIs8JydRv2AMJNj4ULsIpm_Hh-C16eVCgYOcE97kwQ/exec";
        const TARGET = 120;

        const STRATEGIC_REASONS = {
          "牛": "希少なクレアチンと鉄分が、INTJの鋭い意思決定に必要なホルモン環境を整え、商談での圧倒的優位を築きます。",
          "鶏": "高純度なアンセリンが深夜の思考疲れをリセット。明朝、最速でアクセルを踏み込むためのブレイン・メンテナンスです。",
          "ラム": "豊富なL-カルニチンが脂肪燃焼を最適化。無駄を極限まで削ぎ落とす、ニモさんの知的な身体管理の極致です。",
          "サバ": "DHA/EPAが血流を劇的に改善。脳への酸素供給を最大化し、淀みのないロジック展開をサポートします。",
          "真鯛": "タウリンが肝機能を保護し、長時間のマルチタスクによる体内ダメージを精密に修復。翌日のパフォーマンスを保証します。",
          "朝セット": "ニモさんの1日の基盤。45gの速攻性プロテインが代謝をキックオフし、スタートダッシュを確実にします。"
        };

        const App = () => {
            const todayStr = useMemo(() => new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' }), []);
            const [meals, setMeals] = useState([]);
            const [masterMenus, setMasterMenus] = useState([]);
            const [tab, setTab] = useState('log');
            const [syncing, setSyncing] = useState(false);
            const [toast, setToast] = useState('');
            const [selDate, setSelDate] = useState(todayStr);
            const [mealType, setMealType] = useState('昼');
            const [mainMenu, setMainMenu] = useState('');
            const [protein, setProtein] = useState(25.0);
            const [effect, setEffect] = useState('all');
            const [shuffleSeed, setShuffleSeed] = useState(0);
            const [showMorningPrompt, setShowMorningPrompt] = useState(false);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

            const getStrategicReason = useCallback((name, p, currentGap) => {
                if (!name) return "規律ある身体資産の構築へ。";
                for (const key in STRATEGIC_REASONS) { if (name.includes(key)) return STRATEGIC_REASONS[key]; }
                
                // 動的生成 (重複回避ロジック)
                const efficiency = ((p / currentGap) * 100).toFixed(0);
                const options = [
                    `現在の不足分に対し、このメニューは ${p.toFixed(1)}g（達成率 ${efficiency}%）を補完する高効率な選択です。`,
                    `120gの規律を死守するための戦略的パーツ。純粋なビルドアップ素材が明日の活力を形成します。`,
                    `栄養密度の最適解。過剰な脂質を避けつつタンパク質を加算し、体組成のキレを維持します。`
                ];
                const hash = name.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                return options[hash % options.length];
            }, []);

            const fetchData = useCallback(async () => {
                setSyncing(true);
                try {
                    const r = await fetch(GAS_URL + "?cache=" + Date.now());
                    const data = await r.json();
                    
                    // --- ログのクレンジングと正規化 ---
                    const historyRaw = Array.isArray(data) ? data : (data.history || []);
                    const cleanedLogs = historyRaw
                        .filter(m => {
                            const name = (m.Main_Menu || m.main || "").toString().trim();
                            const val = Number(m.Protein_g || m.protein || 0);
                            const rawTs = (m.Timestamp || m.timestamp || "").toString();
                            return name.length > 0 && name !== "-" && rawTs.startsWith('202') && (val > 0 || name.includes("朝セット"));
                        })
                        .map(m => {
                            const rawTs = (m.Timestamp || m.timestamp || "").toString();
                            const datePart = rawTs.split(/[ T]/)[0].replace(/\//g, '-');
                            return {
                                id: rawTs + "_" + (m.Main_Menu || m.main),
                                main: m.Main_Menu || m.main,
                                protein: Number(m.Protein_g || m.protein || 0),
                                type: m.Meal_Type || m.type || "他",
                                timestamp: rawTs,
                                dateOnly: datePart
                            };
                        })
                        .sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setMeals(cleanedLogs);
                    
                    // --- 推奨メニューの正規化 ---
                    if (data.menus && data.menus.length > 0) {
                        setMasterMenus(data.menus.map(m => ({
                            main: m.main || m.Main_Menu || "Unknown",
                            side: m.side || m.Side_Menu || "-",
                            p: Number(m.p || m.Protein_g || 20),
                            tags: m.tags ? (Array.isArray(m.tags) ? m.tags : String(m.tags).split(',')) : [],
                            cat: m.cat || "all"
                        })));
                    }
                    showToast('SYSTEM SYNCED');
                } catch (e) { showToast('OFFLINE MODE'); } finally { setSyncing(false); }
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);

            const currentMeals = useMemo(() => 
                meals.filter(m => m.dateOnly === selDate)
            , [meals, selDate]);

            const totalP = useMemo(() => currentMeals.reduce((s, m) => s + m.protein, 0), [currentMeals]);
            const progress = Math.min((totalP / TARGET) * 100, 100);
            const gap = Math.max(0, TARGET - totalP);

            const handleSave = async (mName, mP, mType) => {
                if (!mName || mName.trim().length < 2) return;
                const now = new Date();
                const ts = `${selDate} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                
                showToast('SAVING...');
                try { 
                    await fetch(GAS_URL, { 
                        method:'POST', 
                        mode:'no-cors', 
                        body: JSON.stringify({ _action:'save', main: mName.trim(), protein: mP, type: mType, timestamp: ts }) 
                    }); 
                    setMainMenu('');
                    setTimeout(fetchData, 800);
                } catch(e){ showToast('SYNC ERROR'); }
            };

            const handleDelete = async (m) => {
                if (!window.confirm(`「${m.main}」を削除しますか？`)) return;
                setSyncing(true);
                try {
                    await fetch(GAS_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ _action: 'delete', timestamp: m.timestamp }) 
                    });
                    showToast('DELETED');
                    setTimeout(fetchData, 800);
                } catch (err) { showToast('DELETE ERROR'); } finally { setSyncing(false); }
            };

            const suggestions = useMemo(() => {
                if (gap <= 0 || masterMenus.length === 0) return [];
                let pool = masterMenus.filter(m => effect === 'all' || m.cat === effect);
                if (pool.length === 0) pool = masterMenus;
                const seeded = [...pool].map((m, i) => ({ m, r: Math.sin(shuffleSeed * 997 + i * 31) }));
                return seeded.sort((a, b) => a.r - b.r).slice(0, 3).map(x => x.m);
            }, [masterMenus, gap, effect, shuffleSeed]);

            const chartSvg = useMemo(() => {
                const W=320, H=150, PL=30, PR=10, PT=20, PB=30, cW=W-PL-PR, cH=H-PT-PB;
                const days = Array.from({length:7}, (_,i) => {
                    const d = new Date(); d.setDate(d.getDate()-(6-i));
                    const ds = d.toLocaleDateString('sv-SE', {timeZone:'Asia/Tokyo'});
                    // 厳格な日付マッチ
                    const val = meals.filter(m => m.dateOnly === ds).reduce((s,m)=>s+m.protein,0);
                    return { lbl: ['日','月','火','水','木','金','土'][d.getDay()], val, isToday: ds === todayStr };
                });
                const maxV = Math.max(...days.map(d=>d.val), TARGET, 10) * 1.15;
                const xStep = cW/6;
                const grids = [0, TARGET/2, TARGET].map(v => {
                    const y = PT + cH - (v / maxV) * cH;
                    const isTarget = v === TARGET;
                    return `
                        <line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="${isTarget ? 'var(--yel)' : 'var(--mu)'}" stroke-width="${isTarget ? 2 : 1}" stroke-dasharray="${isTarget ? '4,4' : '2,2'}" opacity="${isTarget ? 1 : 0.2}" />
                        <text x="${PL-5}" y="${y+3}" font-family="var(--mono)" font-size="8" fill="${isTarget ? 'var(--yel)' : 'var(--mu)'}" text-anchor="end">${v}</text>
                    `;
                }).join('');
                const points = days.map((d, i) => ({ x: PL + i*xStep, y: PT + cH - (d.val/maxV)*cH, ...d }));
                const pathD = points.map((p, i) => (i===0 ? 'M' : 'L') + `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                const dots = points.map(p => `
                    <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${p.isToday?5:3}" fill="${p.val >= TARGET ? 'var(--em)' : p.val>0 ? 'white' : 'var(--mu)'}" />
                    <text x="${p.x.toFixed(1)}" y="${H-5}" font-size="9" fill="${p.isToday?'var(--em)':'var(--mu)'}" text-anchor="middle">${p.lbl}</text>
                    ${p.val > 0 ? `<text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" font-size="9" fill="white" font-family="var(--mono)" text-anchor="middle" font-weight="900">${Math.round(p.val)}</text>` : ''}
                `).join('');
                return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">${grids}<path d="${pathD}" fill="none" stroke="var(--em)" stroke-width="2.5" />${dots}</svg>`;
            }, [meals, todayStr]);

            return (
                <div style={{ maxWidth: 430, margin: '0 auto', height: '100%', display: 'flex', flexDirection: 'column' }}>
                    {toast && (
                        <div style={{ position:'fixed', top:20, left:'50%', transform:'translateX(-50%)', background:'var(--em)', color:'#000', padding:'8px 24px', borderRadius:40, fontFamily:'var(--mono)', fontSize:10, fontWeight:900, zIndex:999, animation:'slideUp 0.4s forwards' }}>{toast}</div>
                    )}

                    <header style={{ padding: '20px 20px 10px', zIndex: 10 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 15 }}>
                            <div style={{ flex: 1 }}>
                                <h1 style={{ fontFamily: 'var(--serif)', fontSize: 28, color: 'var(--em)', lineHeight: 1 }}>Meal OS</h1>
                                <p style={{ fontFamily: 'var(--mono)', fontSize: 8, color: 'var(--mu)', letterSpacing: '0.2em', marginTop: 4 }}>PRECISION DYNAMIC v7.8.2</p>
                            </div>
                            <button onClick={fetchData} disabled={syncing} style={{ width: 38, height: 38, background: 'rgba(255,255,255,0.05)', borderRadius: '50%', border: '1px solid rgba(255,255,255,0.1)', color: 'var(--em)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
                                <svg className={syncing ? 'animate-spin' : ''} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                            </button>
                        </div>

                        {tab !== 'stats' && (
                            <div className="glass-card animate-fade" style={{ padding: '15px 20px', borderRadius: 24, position: 'relative', overflow: 'hidden' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                                    <span style={{ fontFamily: 'var(--mono)', fontSize: 8, color: 'var(--mu)', letterSpacing: '0.1em', fontWeight: 700 }}>DAILY PROTEIN FLOW</span>
                                    <span style={{ fontFamily: 'var(--serif)', fontSize: 36, color: 'var(--tx)', lineHeight: 1 }}>{totalP.toFixed(1)}<span style={{ fontSize: 12, color: 'var(--mu)', marginLeft: 4 }}>g</span></span>
                                </div>
                                <div style={{ height: 4, background: 'rgba(255,255,255,0.05)', borderRadius: 2, position: 'relative' }}>
                                    <div style={{ height: '100%', background: 'var(--em-grad)', width: `${progress}%`, transition: 'width 1s ease-out', boxShadow: '0 0 12px var(--em-glow)' }} />
                                </div>
                            </div>
                        )}
                    </header>

                    <main className="no-scrollbar" style={{ flex: 1, overflowY: 'auto', padding: '0 18px 100px' }}>
                        {tab === 'log' && (
                            <div className="animate-slide">
                                <div style={{ display: 'flex', justifyContent: 'center', gap: 20, alignItems: 'center', marginBottom: 15 }}>
                                    <button onClick={() => { const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate()-1); setSelDate(d.toLocaleDateString('sv-SE')) }} style={{ color: 'var(--mu)', background: 'none', border: 'none', cursor: 'pointer' }}>◀</button>
                                    <div style={{ fontFamily: 'var(--serif)', fontSize: 20 }}>{selDate.split('-')[1]}/{selDate.split('-')[2]}</div>
                                    <button onClick={() => { const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate()+1); if(d.toLocaleDateString('sv-SE') <= todayStr) setSelDate(d.toLocaleDateString('sv-SE')) }} style={{ color: selDate === todayStr ? 'transparent' : 'var(--mu)', background: 'none', border: 'none', cursor: 'pointer' }}>▶</button>
                                </div>

                                <section className="glass-card" style={{ padding: 20, borderRadius: 28, marginBottom: 20 }}>
                                    <div style={{ display: 'flex', gap: 6, marginBottom: 15 }}>
                                        {['朝','昼','夜','他'].map(t => (
                                            <button key={t} onClick={() => {setMealType(t); if(t==='朝') setShowMorningPrompt(true); else setShowMorningPrompt(false);}} style={{ flex: 1, padding: '12px 0', borderRadius: 14, border: 'none', background: mealType === t ? 'var(--em)' : 'rgba(255,255,255,0.03)', color: mealType === t ? '#000' : 'var(--mu)', fontSize: 11, fontWeight: 900, cursor: 'pointer' }}>{t}</button>
                                        ))}
                                    </div>

                                    {showMorningPrompt && (
                                        <div style={{ background: 'rgba(190,242,100,0.05)', border: '1px dashed var(--em)', borderRadius: 16, padding: 15, marginBottom: 15, textAlign: 'center' }}>
                                            <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--em)', marginBottom: 10 }}>朝セット（45g）をレポしますか？</p>
                                            <div style={{ display: 'flex', gap: 8 }}>
                                                <button onClick={() => {handleSave('朝セット', 45, '朝'); setShowMorningPrompt(false);}} className="btn-lime" style={{ flex: 1, padding: 10, borderRadius: 10, fontSize: 10 }}>YES</button>
                                                <button onClick={() => setShowMorningPrompt(false)} style={{ flex: 1, background: 'rgba(255,255,255,0.05)', border: 'none', color: 'var(--mu)', borderRadius: 10, fontSize: 10, fontWeight: 900, cursor: 'pointer' }}>NO</button>
                                            </div>
                                        </div>
                                    )}

                                    <input value={mainMenu} onChange={e => setMainMenu(e.target.value)} placeholder="Main Menu" style={{ width: '100%', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 16, padding: 16, fontSize: 14, color: 'var(--tx)', outline: 'none', marginBottom: 15 }} />
                                    
                                    <div style={{ marginBottom: 20 }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 8 }}>
                                            <span style={{ fontSize: 8, color: 'var(--mu)', fontWeight: 700 }}>STRATEGIC WEIGHT</span>
                                            <span style={{ fontFamily: 'var(--serif)', fontSize: 30, color: 'var(--em)' }}>{protein.toFixed(1)}<span style={{ fontSize: 12, marginLeft: 2 }}>g</span></span>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                                            <button className="btn-sub" onClick={() => setProtein(p => Math.max(0, parseFloat((p - 0.5).toFixed(1))))}>-0.5</button>
                                            <div style={{ flex: 1 }}><input type="range" min="0" max="60" step="0.5" value={protein} onChange={e => setProtein(parseFloat(e.target.value))} /></div>
                                            <button className="btn-sub" onClick={() => setProtein(p => Math.min(60, parseFloat((p + 0.5).toFixed(1))))}>+0.5</button>
                                        </div>
                                    </div>

                                    <button onClick={() => handleSave(mainMenu, protein, mealType)} className="btn-lime" style={{ width: '100%', padding: 18, borderRadius: 18, fontSize: 14 }}>STAY HEALTHY →</button>
                                </section>

                                {currentMeals.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: 40, opacity: 0.3, fontSize: 10, letterSpacing: '0.2em' }}>CLEAN DISCIPLINE (NO LOGS)</div>
                                ) : currentMeals.map(m => (
                                    <div key={m.id} className="glass-card animate-slide" style={{ padding: '14px 18px', borderRadius: 20, marginBottom: 8, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <div style={{ flex: 1 }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
                                                <span style={{ fontSize: 8, background: 'var(--em)', color: '#000', padding: '2px 6px', borderRadius: 4, fontWeight: 900 }}>{m.type}</span>
                                                <span style={{ fontFamily: 'var(--serif)', fontSize: 16 }}>{m.main}</span>
                                            </div>
                                            <div style={{ fontSize: 7, color: 'var(--mu)', fontFamily: 'var(--mono)' }}>{m.timestamp?.split(/[ T]/)[1]?.slice(0, 5) || "RECORDED"} • Performance Data</div>
                                        </div>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 15 }}>
                                            <div style={{ fontFamily: 'var(--serif)', fontSize: 20, color: 'var(--em)' }}>{m.protein.toFixed(1)}<span style={{ fontSize: 9, marginLeft: 1 }}>g</span></div>
                                            <button onClick={() => handleDelete(m)} className="delete-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'suggest' && (
                            <div className="animate-slide">
                                <div style={{ display: 'flex', gap: 4, marginBottom: 10, background: 'rgba(255,255,255,0.03)', padding: 4, borderRadius: 16 }}>
                                    {[['all','ALL'],['muscle','筋肉'],['recovery','回復'],['antiaging','老化']].map(([v, l]) => (
                                        <button key={v} onClick={() => setEffect(v)} style={{ flex: 1, padding: '10px 0', borderRadius: 12, border: 'none', background: effect === v ? 'var(--em)' : 'transparent', color: effect === v ? '#000' : 'var(--mu)', fontSize: 10, fontWeight: 900, cursor: 'pointer' }}>{l}</button>
                                    ))}
                                </div>

                                <button onClick={() => setShuffleSeed(s => s + 1)} style={{ width: '100%', padding: 12, background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 14, color: 'var(--em)', fontSize: 11, fontWeight: 900, letterSpacing: '0.1em', marginBottom: 15, cursor: 'pointer' }}>SHUFFLE STRATEGY</button>

                                {gap <= 0 ? <div style={{ textAlign: 'center', padding: 60, fontFamily: 'var(--serif)', color: 'var(--em)', fontSize: 24 }}>Goal Reached ✓</div> : 
                                masterMenus.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: 40, color: 'var(--mu)', fontSize: 11 }}>
                                        マスターメニューを同期中...<br/>
                                        (もし表示されない場合はシートの「menus」を確認してください)
                                    </div>
                                ) : suggestions.map((opt, i) => (
                                    <div key={i} className="glass-card animate-slide" style={{ padding: 15, borderRadius: 22, marginBottom: 10, border: i === 0 ? '1px solid var(--em)' : '1px solid rgba(255,255,255,0.08)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 4 }}>
                                            <div style={{ fontFamily: 'var(--serif)', fontSize: 18 }}>{opt.main}</div>
                                            <div style={{ fontFamily: 'var(--serif)', fontSize: 24, color: 'var(--em)' }}>{Number(opt.p).toFixed(1)}<span style={{ fontSize: 10, marginLeft: 2 }}>g</span></div>
                                        </div>
                                        <div style={{ background: 'rgba(255,255,255,0.03)', borderLeft: '2px solid var(--em)', padding: '8px 12px', borderRadius: '0 10px 10px 0', fontSize: 10, color: 'var(--tx)', fontStyle: 'italic', marginBottom: 10 }}>
                                            "{getStrategicReason(opt.main, opt.p, gap)}"
                                        </div>
                                        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
                                            {(opt.tags || []).slice(0, 3).map(t => <span key={t} className="badge-tag" style={{ color: 'var(--em)', background: 'rgba(190,242,100,0.08)', border: '1px solid rgba(190,242,100,0.1)' }}>{t}</span>)}
                                        </div>
                                        <button onClick={() => { setMainMenu(opt.main); setProtein(opt.p); setMealType('夜'); setTab('log'); }} className="btn-lime" style={{ width: '100%', padding: '10px 0', borderRadius: 12, fontSize: 10, fontWeight: 900 }}>このメニューを選択 →</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'stats' && (
                            <div className="animate-slide">
                                <div className="sticky-analysis">
                                    <div className="glass-card" style={{ padding: 15, borderRadius: 24, background: 'rgba(255,255,255,0.01)' }}>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: 'var(--mu)', fontWeight: 700, letterSpacing: '0.1em', marginBottom: 10 }}>
                                            <span>7-DAY TREND ANALYSIS</span>
                                            <span style={{ color: 'var(--yel)' }}>TARGET: 120g</span>
                                        </div>
                                        <div style={{ height: 160 }} dangerouslySetInnerHTML={{ __html: chartSvg }} />
                                    </div>
                                </div>

                                <div className="glass-card" style={{ padding: 25, borderRadius: 28, borderLeft: '5px solid var(--em)', marginTop: 15, marginBottom: 20 }}>
                                    <h3 style={{ fontFamily: 'var(--serif)', fontSize: 22, marginBottom: 5 }}>Weekly Analysis</h3>
                                    <p style={{ fontSize: 12, lineHeight: 1.6, opacity: 0.8 }}>{totalP >= TARGET ? "完璧な規律です。身体のキレが思考の深さを加速させます。" : "あと少しのタンパク質が、明日の市場価値を形成します。効率的な補完を。"}</p>
                                </div>

                                <p style={{ fontSize: 8, color: 'var(--mu)', letterSpacing: '0.2em', marginBottom: 12 }}>LAST RECORDS (DATE VERIFICATION)</p>
                                {meals.slice(0, 12).map((m, i) => (
                                    <div key={i} className="glass-card" style={{ padding: '12px 16px', borderRadius: 18, marginBottom: 6, display: 'flex', justifyContent: 'space-between', alignItems: 'center', opacity: m.dateOnly === todayStr ? 1 : 0.6 }}>
                                        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                                            <div style={{ fontSize: 7, background: m.dateOnly === todayStr ? 'var(--em)' : 'var(--mu)', color: '#000', padding: '3px 6px', borderRadius: 5, fontWeight: 900 }}>
                                                {m.dateOnly.split('-').slice(1).join('/')}
                                            </div>
                                            <div>
                                                <div style={{ fontSize: 13, fontWeight: 700 }}>{m.main}</div>
                                                <div style={{ fontSize: 7, color: 'var(--mu)', fontFamily: 'var(--mono)' }}>{m.type} • {m.timestamp.split(/[ T]/)[1]?.slice(0,5)}</div>
                                            </div>
                                        </div>
                                        <div style={{ fontFamily: 'var(--serif)', fontSize: 18, color: 'var(--em)' }}>{m.protein.toFixed(1)}g</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav style={{ position: 'fixed', bottom: 0, left: 0, right: 0, maxWidth: 430, margin: '0 auto', height: 85, background: 'rgba(1,2,6,0.9)', backdropFilter: 'blur(45px)', display: 'flex', justifyContent: 'space-around', alignItems: 'center', borderTop: '1px solid rgba(255,255,255,0.05)', zIndex: 100 }}>
                        {[{ id: 'log', lbl: 'LOG', icon: 'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11' }, { id: 'suggest', lbl: 'STRATEGY', icon: 'M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6l-.7 4H9l-.7-4A7 7 0 0 1 5 9a7 7 0 0 1 7-7z' }, { id: 'stats', lbl: 'ANALYSIS', icon: 'M22 12h-4l-3 9L9 3l-3 9H2' }].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} style={{ background: 'none', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6, color: tab === t.id ? 'var(--em)' : 'var(--mu)', flex: 1, cursor: 'pointer' }}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={t.icon} /></svg>
                                <span style={{ fontFamily: 'var(--mono)', fontSize: 8, fontWeight: 900 }}>{t.lbl}</span>
                                {tab === t.id && <div style={{ width: 4, height: 4, background: 'var(--em)', borderRadius: '50%', boxShadow: '0 0 10px var(--em)' }} />}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
