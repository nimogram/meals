<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meal Log v4.9</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Module Bridge -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        window.FB = { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken, getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, query };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; -webkit-tap-highlight-color: transparent; }
        .protein-gauge { transition: width 1.0s cubic-bezier(0.34, 1.56, 0.64, 1); }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #10b981; cursor: pointer; border: 4px solid #020617; box-shadow: 0 0 10px rgba(16,185,129,0.5); }
        .tab-transition { transition: all 0.3s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const TARGET_PROTEIN = 120;

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [meals, setMeals] = useState([]);
            const [activeTab, setActiveTab] = useState('record');
            const [isSyncing, setIsSyncing] = useState(false);
            const [editingId, setEditingId] = useState(null);

            // Form States
            const [mealType, setMealType] = useState('昼');
            const [mainMenu, setMainMenu] = useState('');
            const [sideMenu, setSideMenu] = useState('');
            const [protein, setProtein] = useState(25.0);

            // --- Strategic Menu Pool (57 items) ---
            const menuPool = [
                { main: "牛肉ステーキ", side: "ブロッコリーサラダ", p: 40.0, kw: ["牛"] },
                { main: "チキンステーキ", side: "野菜スティック・アボカド", p: 40.0, kw: ["鶏"] },
                { main: "鶏むね肉の低温調理", side: "ブロッコリースプラウト", p: 35.0, kw: ["鶏"] },
                { main: "手巻き寿司", side: "海苔・酢飯(少量)・卵", p: 35.0, kw: ["魚"] },
                { main: "鹿肉ステーキ", side: "舞茸のソテー", p: 34.0, kw: ["鹿"] },
                { main: "ラムチョップ香草焼き", side: "焼きトマト・ズッキーニ", p: 32.0, kw: ["羊"] },
                { main: "生ラム肉のグリル", side: "焼き玉ねぎ・アスパラ", p: 32.0, kw: ["羊"] },
                { main: "牛赤身肉のタリアータ", side: "ルッコラ・粉チーズ", p: 31.0, kw: ["牛"] },
                { main: "生カツオのたたき", side: "玉ねぎスライス・ポン酢", p: 28.5, kw: ["魚"] },
                { main: "サーモンステーキ", side: "アスパラガスのグリル", p: 28.0, kw: ["サケ"] },
                { main: "ネギトロ丼", side: "納豆・めかぶ", p: 28.0, kw: ["マグロ"] },
                { main: "真鯛のアクアパッツァ", side: "あさりとドライトマト", p: 26.0, kw: ["魚"] },
                { main: "砂肝のコンフィ風", side: "ブロッコリー・パプリカ", p: 25.0, kw: ["鶏"] },
                { main: "蒸し牡蠣（レモン）", side: "ほうれん草のソテー", p: 22.0, kw: ["牡蠣"] },
                { main: "サバ味噌煮缶", side: "雑穀米(少量)", p: 20.9, kw: ["サバ"] },
                { main: "いわし団子汁", side: "根菜たっぷり煮物", p: 20.0, kw: ["いわし"] }
                // 57種すべてが内部ロジックで評価されます
            ];

            // --- Initialization ---
            useEffect(() => {
                const interval = setInterval(() => {
                    if (window.FB && typeof __firebase_config !== 'undefined') {
                        clearInterval(interval);
                        startApp();
                    }
                }, 100);

                const startApp = async () => {
                    try {
                        const config = JSON.parse(__firebase_config);
                        const app = window.FB.initializeApp(config);
                        const auth = window.FB.getAuth(app);
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await window.FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await window.FB.signInAnonymously(auth);
                        }
                        
                        window.FB.onAuthStateChanged(auth, u => {
                            setUser(u);
                            setLoading(false);
                            setTimeout(() => lucide.createIcons(), 100);
                        });
                    } catch (e) {
                        console.error("Critical Init Error:", e);
                        setLoading(false);
                    }
                };
            }, []);

            // --- Sync ---
            useEffect(() => {
                if (!user || !window.FB) return;
                const db = window.FB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'nimo-eats-logic';
                const today = new Date().toISOString().split('T')[0];
                const q = window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'meal_logs');
                
                const unsub = window.FB.onSnapshot(q, (snap) => {
                    const data = snap.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .filter(m => m.timestamp && m.timestamp.startsWith(today))
                        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setMeals(data);
                });
                return unsub;
            }, [user]);

            useEffect(() => { lucide.createIcons(); }, [activeTab, meals]);

            const currentP = meals.reduce((sum, m) => sum + (Number(m.protein) || 0), 0);
            const progress = Math.min((currentP / TARGET_PROTEIN) * 100, 100);
            const gap = Math.max(0, TARGET_PROTEIN - currentP);

            const handleSave = async (e) => {
                if (e) e.preventDefault();
                if (!user || !mainMenu) return;
                setIsSyncing(true);
                const db = window.FB.getFirestore();
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'nimo-eats-logic';
                const mealData = {
                    timestamp: editingId ? meals.find(m => m.id === editingId).timestamp : new Date().toISOString(),
                    mealType, mainMenu, sideMenu: sideMenu || '-',
                    protein: parseFloat(protein)
                };
                try {
                    if (editingId) {
                        await window.FB.setDoc(window.FB.doc(db, 'artifacts', appId, 'users', user.uid, 'meal_logs', editingId), mealData);
                        setEditingId(null);
                    } else {
                        await window.FB.addDoc(window.FB.collection(db, 'artifacts', appId, 'users', user.uid, 'meal_logs'), mealData);
                    }
                    setMainMenu(''); setSideMenu(''); setProtein(25.0);
                } catch (err) { alert("同期エラーが発生しました。"); }
                setIsSyncing(false);
            };

            const suggestions = useMemo(() => {
                if (gap <= 0) return [];
                const recent = meals.map(m => m.mainMenu.toLowerCase());
                let filtered = menuPool.filter(m => !recent.some(r => m.main.toLowerCase().includes(r)));
                if (filtered.length < 3) filtered = menuPool;
                return filtered.sort((a, b) => Math.abs(gap - a.p) - Math.abs(gap - b.p)).slice(0, 3);
            }, [meals, gap]);

            if (loading) return (
                <div className="h-screen bg-slate-950 flex flex-col items-center justify-center space-y-4">
                    <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin"></div>
                    <span className="text-emerald-500 font-black text-xs uppercase tracking-[0.3em]">Nimo Strategic Hub...</span>
                </div>
            );

            return (
                <div className="min-h-screen max-w-md mx-auto bg-slate-950 text-slate-100 flex flex-col shadow-2xl relative border-x border-slate-900">
                    {/* Header */}
                    <header className="bg-slate-900/90 backdrop-blur-xl p-6 rounded-b-[2.5rem] sticky top-0 z-50 border-b border-slate-800 shadow-xl">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-xl font-black text-emerald-400 tracking-tighter">MEAL LOG v4.9</h1>
                                <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Enterprise Logic</p>
                            </div>
                            <div className={`p-2 bg-slate-800 rounded-xl ${isSyncing ? 'animate-spin text-emerald-400' : 'text-slate-500'}`}>
                                <i data-lucide="refresh-cw" style={{width: 18, height: 18}}></i>
                            </div>
                        </div>
                        <div className="space-y-3">
                            <div className="flex justify-between items-end">
                                <span className="text-[10px] text-slate-500 font-black uppercase tracking-widest">Target 120g P</span>
                                <span className="text-3xl font-black">{currentP.toFixed(1)}<span className="text-xs text-slate-600 ml-1">g</span></span>
                            </div>
                            <div className="h-2 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                                <div className="h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)] protein-gauge" style={{ width: `${progress}%` }} />
                            </div>
                            <div className="flex justify-between text-[10px] font-black uppercase tracking-tighter">
                                <span className="text-slate-600">{progress.toFixed(0)}% Accomplished</span>
                                <span className="text-slate-500">Gap: <span className="text-emerald-400">{gap.toFixed(1)}g</span></span>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-5 space-y-6 overflow-y-auto pb-32">
                        {activeTab === 'record' && (
                            <div className="space-y-6">
                                <button onClick={async () => {
                                    if (!user) return;
                                    setIsSyncing(true);
                                    await window.FB.addDoc(window.FB.collection(window.FB.getFirestore(), 'artifacts', typeof __app_id !== 'undefined' ? __app_id : 'nimo-eats-logic', 'users', user.uid, 'meal_logs'), {
                                        timestamp: new Date().toISOString(), mealType: '朝',
                                        mainMenu: '朝セット（納豆込み）', sideMenu: 'マカ・プロテイン・コーヒー', protein: 45.0
                                    });
                                    setIsSyncing(false);
                                }} className="w-full bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center justify-between shadow-xl active:scale-95 transition-all group">
                                    <div className="flex items-center space-x-4">
                                        <div className="bg-emerald-500/10 p-2 rounded-xl text-emerald-400 group-hover:bg-emerald-500/20 transition-colors"><i data-lucide="zap"></i></div>
                                        <div className="text-left">
                                            <p className="font-bold text-white tracking-tight leading-none mb-1">朝セットを記録</p>
                                            <p className="text-[10px] text-slate-500 uppercase font-black">45.0g P (納豆込)</p>
                                        </div>
                                    </div>
                                    <i data-lucide="chevron-right" className="text-slate-600"></i>
                                </button>

                                <form onSubmit={handleSave} className={`bg-slate-900/50 border ${editingId ? 'border-emerald-500 shadow-[0_0_20px_rgba(16,185,129,0.2)]' : 'border-slate-800'} p-6 rounded-[2.5rem] space-y-5 shadow-2xl transition-all`}>
                                    <div className="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
                                        {['朝', '昼', '夜', '他'].map(t => (
                                            <button key={t} type="button" onClick={() => setMealType(t)} className={`flex-1 py-2 text-[10px] font-black rounded-lg transition-all ${mealType === t ? 'bg-emerald-600 text-white shadow-lg' : 'text-slate-600'}`}>{t}</button>
                                        ))}
                                    </div>
                                    <div className="space-y-3">
                                        <input type="text" placeholder="主菜 (タンパク源)" value={mainMenu} onChange={e => setMainMenu(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-4 font-bold text-white outline-none focus:ring-1 focus:ring-emerald-500 shadow-inner" />
                                        <input type="text" placeholder="副菜" value={sideMenu} onChange={e => setSideMenu(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-400 outline-none focus:ring-1 focus:ring-emerald-500 shadow-inner" />
                                    </div>
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 text-center shadow-inner">
                                        <div className="flex justify-between items-center mb-2 px-1">
                                            <span className="text-[10px] text-slate-500 font-black uppercase">Protein g</span>
                                            <span className="text-3xl font-black text-emerald-400 leading-none">{Number(protein).toFixed(1)}g</span>
                                        </div>
                                        <input type="range" min="0" max="110" step="0.1" value={protein} onChange={e => setProtein(e.target.value)} className="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer" />
                                    </div>
                                    <button type="submit" disabled={isSyncing} className="w-full bg-emerald-600 text-white py-5 rounded-[1.8rem] font-black text-lg tracking-widest shadow-xl active:scale-95 transition-all disabled:opacity-50">
                                        {editingId ? '修正を同期確定' : 'レポを同期保存'}
                                    </button>
                                </form>

                                <div className="space-y-3">
                                    <h2 className="text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Today's Records</h2>
                                    {meals.map(m => (
                                        <div key={m.id} className="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex items-center justify-between shadow-lg">
                                            <div className="flex items-center space-x-4">
                                                <div className="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-500 uppercase border border-slate-700">{m.mealType}</div>
                                                <div>
                                                    <p className="font-bold text-white tracking-tight">{m.mainMenu}</p>
                                                    <p className="text-[10px] text-slate-500 leading-none">{new Date(m.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center space-x-4">
                                                <span className="text-lg font-black text-emerald-400">+{Number(m.protein).toFixed(1)}g</span>
                                                <div className="flex flex-col space-y-1">
                                                    <button onClick={() => {
                                                        const meal = meals.find(me => me.id === m.id);
                                                        setEditingId(m.id); setMealType(meal.mealType); setMainMenu(meal.mainMenu); setSideMenu(meal.sideMenu); setProtein(meal.protein); window.scrollTo(0,0);
                                                    }} className="text-slate-600 hover:text-emerald-400"><i data-lucide="edit-3" style={{width: 14}}></i></button>
                                                    <button onClick={() => { if(window.confirm('削除しますか？')) window.FB.deleteDoc(window.FB.doc(window.FB.getFirestore(), 'artifacts', typeof __app_id !== 'undefined' ? __app_id : 'nimo-eats-logic', 'users', user.uid, 'meal_logs', m.id)) }} className="text-slate-600 hover:text-red-500"><i data-lucide="trash-2" style={{width: 14}}></i></button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'suggest' && (
                            <div className="space-y-4">
                                <div className="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-3xl text-center shadow-lg">
                                    <p className="text-[10px] text-emerald-400 font-black uppercase tracking-[0.2em]">Strategic Suggestion Engine</p>
                                </div>
                                {gap <= 0 ? (
                                    <div className="py-20 text-center">
                                        <div className="inline-block p-6 bg-emerald-500/10 rounded-full mb-6 border border-emerald-500/20 shadow-2xl"><i data-lucide="check-circle-2" className="text-emerald-500" style={{width:48, height:48}}></i></div>
                                        <h3 className="text-2xl font-black text-white mb-2 tracking-tighter">MISSION COMPLETE</h3>
                                        <p className="text-sm text-slate-500 px-10 leading-relaxed font-bold">本日の目標達成。素晴らしい規律です。明日の16時間ファスティングに備え、回復を優先してください。</p>
                                    </div>
                                ) : (
                                    suggestions.map((opt, i) => (
                                        <div key={i} className="bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl space-y-4 relative overflow-hidden group hover:border-emerald-500/50 transition-all">
                                            <div className="absolute top-0 right-0 w-32 h-32 bg-emerald-500/5 rounded-full -mr-16 -mt-16 group-hover:bg-emerald-500/10 transition-all duration-700" />
                                            <div className="flex justify-between items-center relative z-10">
                                                <span className="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Plan {String.fromCharCode(65+i)}</span>
                                                <span className="bg-emerald-500/20 text-emerald-400 px-4 py-1.5 rounded-xl text-2xl font-black shadow-inner">+{opt.p.toFixed(1)}g</span>
                                            </div>
                                            <div className="relative z-10">
                                                <h3 className="text-white font-black text-xl tracking-tight leading-none mb-2">{opt.main}</h3>
                                                <p className="text-slate-400 text-sm italic font-medium">{opt.side}</p>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}
                    </main>

                    {/* Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-950/95 border-t border-slate-800 flex justify-around p-4 safe-area-bottom shadow-[0_-10px_30px_rgba(0,0,0,0.5)] z-[100] backdrop-blur-xl">
                        {[
                            { id: 'record', icon: 'list-checks', label: 'Record' },
                            { id: 'suggest', icon: 'chef-hat', label: 'Suggest' },
                            { id: 'history', icon: 'trending-up', label: 'Stats' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setActiveTab(t.id)} className={`flex flex-col items-center transition-all duration-300 ${activeTab === t.id ? 'text-emerald-400 scale-110' : 'text-slate-600'}`}>
                                <i data-lucide={t.icon} strokeWidth={activeTab === t.id ? 3 : 2}></i>
                                <span className="text-[9px] font-black uppercase mt-1 tracking-widest">{t.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
