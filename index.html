<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MEAL LOG v8.5.0</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #010206;
            --em: #bef264;
            --tx: #f1f3f9;
            --mu: #475569;
        }

        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background: var(--bg); 
            color: var(--tx); 
            height: 100dvh; 
            overflow: hidden;
            position: relative;
        }

        .serif { font-family: 'DM Serif Display', serif; }
        .mono { font-family: 'DM Mono', monospace; }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 10% 10%, #152515 0%, transparent 40%),
                        radial-gradient(circle at 90% 90%, #0a0f1e 0%, transparent 40%);
            z-index: -1;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide { animation: slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { background: rgba(255,255,255,0.05); height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; 
            background: var(--em); margin-top: -10px; border: 2px solid var(--bg);
            box-shadow: 0 0 15px rgba(190, 242, 100, 0.3);
        }

        .glow-head {
            position: absolute; top: -3px; right: -2px;
            width: 8px; height: 8px;
            background: var(--em);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--em), 0 0 4px #fff;
        }
        
        .floating-shuffle {
            position: fixed; bottom: 110px; right: 20px; width: 56px; height: 56px;
            background: linear-gradient(135deg, #bef264 0%, #84cc16 100%); border-radius: 28px; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(190, 242, 100, 0.4); z-index: 110;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTJRcZnupMLgvX28yX6wqpSZj2vIs8JydRv2AMJNj4ULsIpm_Hh-C16eVCgYOcE97kwQ/exec";
        const TARGET = 120;

        const STRATEGIC_REASONS = {
            "牛": "希少なクレアチンと鉄分が、INTJの鋭い意思決定に必要なホルモン環境を整え、商談での圧倒的優位を築きます。",
            "鶏": "高純度なアンセリンが深夜の思考疲れをリセット。明朝、最速でアクセルを踏み込むためのブレイン・メンテナンスです。",
            "ラム": "豊富なL-カルニチンが脂肪燃焼を最適化。無駄を極限まで削ぎ落とす、ニモさんの知的な身体管理の極致です。",
            "サバ": "DHA/EPAが血流を劇的に改善。脳への酸素供給を最大化し、淀みのないロジック展開をサポートします。",
            "真鯛": "タウリンが肝機能を保護し、翌日のパフォーマンスを保証します。",
            "朝セット": "ニモさんの1日の基盤。23gのプロテインと豆乳コーヒーが代謝をキックオフし、スタートダッシュを確実にします。"
        };

        const getJstDateString = (date = new Date()) => {
            return new Intl.DateTimeFormat('sv-SE', {
                timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit'
            }).format(date);
        };

        const getJstTimestamp = (date = new Date()) => {
            const parts = new Intl.DateTimeFormat('ja-JP', {
                timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).formatToParts(date);
            const p = {};
            parts.forEach(({type, value}) => p[type] = value);
            return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}`;
        };

        const parseDateOnlyFromStr = (s) => {
            if (!s) return "";
            if (s instanceof Date) return getJstDateString(s);
            const str = s.toString().trim();
            if (str.endsWith('Z') || /[+-]\d{2}:\d{2}$/.test(str)) {
                return getJstDateString(new Date(str));
            }
            const nums = str.match(/\d+/g);
            if (!nums || nums.length < 3) return str.split(/[ T]/)[0].replace(/\//g, '-');
            let y, m, d;
            if (nums[0].length === 4) { y = nums[0]; m = nums[1]; d = nums[2]; }
            else if (nums[2].length === 4) { y = nums[2]; m = nums[1]; d = nums[0]; }
            else { return str.split(/[ T]/)[0].replace(/\//g, '-'); }
            return `${y}-${m.padStart(2, '0')}-${d.padStart(2, '0')}`;
        };

        const getVal = (o, k) => {
            if (!o) return null;
            const target = k.toLowerCase().replace(/_/g, '');
            const key = Object.keys(o).find(x => {
                const low = x.toLowerCase().replace(/_/g, '');
                return low === target || low.includes(target);
            });
            return key ? o[key] : null;
        };

        const App = () => {
            const [todayStr, setTodayStr] = useState(getJstDateString());
            const [meals, setMeals] = useState([]);
            const [masterMenus, setMasterMenus] = useState([]);
            const [tab, setTab] = useState('log');
            const [syncing, setSyncing] = useState(false);
            const [toast, setToast] = useState('');
            const [selDate, setSelDate] = useState(getJstDateString());
            const [mealType, setMealType] = useState('昼');
            const [mainMenu, setMainMenu] = useState('');
            const [protein, setProtein] = useState(25.0);
            const [effect, setEffect] = useState('all');
            const [shuffleSeed, setShuffleSeed] = useState(0);
            const [showMorningPrompt, setShowMorningPrompt] = useState(false);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

            const fetchData = useCallback(async () => {
                setSyncing(true);
                const freshToday = getJstDateString();
                setTodayStr(freshToday);
                try {
                    const r = await fetch(`${GAS_URL}?cache=${Date.now()}`);
                    const data = await r.json();
                    if (!data) return;

                    const historyRaw = data.history || (Array.isArray(data) ? data : []);
                    const cleanedLogs = historyRaw
                        .map(m => {
                            if (!m) return null;
                            const name = (getVal(m, 'main') || "").toString().trim();
                            const val = Number(getVal(m, 'protein') || 0);
                            const rawTs = getVal(m, 'timestamp') || "";
                            if (!name || name === "-" || name.length < 2) return null;
                            return {
                                id: rawTs.toString() + "_" + name,
                                main: name,
                                protein: val,
                                type: getVal(m, 'type') || "他",
                                timestamp: rawTs.toString(),
                                dateOnly: parseDateOnlyFromStr(rawTs)
                            };
                        })
                        .filter(Boolean);
                    setMeals(cleanedLogs);

                    if (data.menus && Array.isArray(data.menus)) {
                        setMasterMenus(data.menus.map(m => ({
                            main: getVal(m, 'main') || "Unknown",
                            p: Number(getVal(m, 'p') || getVal(m, 'protein') || 20),
                            tags: m.tags ? (Array.isArray(m.tags) ? m.tags : String(m.tags).split(',').map(t=>t.trim())) : [],
                            cat: (getVal(m, 'cat') || "all").toString().toLowerCase()
                        })));
                    }
                    showToast('SYSTEM SYNCED');
                } catch (e) { showToast('OFFLINE MODE'); } finally { setSyncing(false); }
            }, []);

            useEffect(() => { 
                fetchData(); 
                const hour = parseInt(new Intl.DateTimeFormat('ja-JP', { hour: 'numeric', hour12: false, timeZone: 'Asia/Tokyo' }).format(new Date()));
                if (hour >= 4 && hour < 11) { setMealType('朝'); setShowMorningPrompt(true); }
            }, [fetchData]);

            const filteredMeals = useMemo(() => meals.filter(m => m.dateOnly === selDate), [meals, selDate]);
            const totalP = useMemo(() => filteredMeals.reduce((sum, m) => sum + m.protein, 0), [filteredMeals]);
            const gap = Math.max(0, TARGET - totalP);
            const progress = Math.min((totalP / TARGET) * 100, 100);

            const suggestions = useMemo(() => {
                if (!masterMenus.length) return [];
                const recentMains = meals.slice(0, 5).map(m => m.main.toLowerCase());
                let pool = masterMenus;
                if (effect !== 'all') {
                    const categoryMap = { '疲労回復': 'recovery', '筋トレ': 'muscle', '若返り': 'antiaging' };
                    pool = masterMenus.filter(m => m.cat && m.cat.includes(categoryMap[effect] || effect.toLowerCase()));
                }
                const filtered = pool.filter(m => !recentMains.some(r => m.main.toLowerCase().includes(r)));
                const finalPool = filtered.length > 0 ? filtered : pool;
                const seeded = [...finalPool].map((m, i) => ({ m, r: Math.sin(shuffleSeed * 997 + i * 31) }));
                return seeded.sort((a, b) => a.r - b.r).slice(0, 3).map(x => x.m);
            }, [masterMenus, effect, shuffleSeed, meals]);

            const handleSave = async (mName, mP, mType) => {
                if (!mName.trim()) return;
                const ts = getJstTimestamp();
                const newMeal = { id: ts + "_" + mName, main: mName, protein: mP, type: mType, timestamp: ts, dateOnly: getJstDateString() };
                setMeals(prev => [newMeal, ...prev]);
                showToast('SAVING...');
                try { 
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ _action:'save', main: mName, protein: mP, type: mType, timestamp: ts }) }); 
                    setMainMenu('');
                    setTimeout(fetchData, 1000);
                } catch (e) { showToast('SYNC ERROR'); }
            };

            const chartSvg = useMemo(() => {
                const W=320, H=150, PL=30, PR=10, PT=20, PB=30, cW=W-PL-PR, cH=H-PT-PB;
                const days = Array.from({length:7}, (_,i) => {
                    const d = new Date(); d.setDate(d.getDate() - (6-i));
                    const ds = getJstDateString(d);
                    const val = meals.filter(m => m.dateOnly === ds).reduce((s,m)=>s+(m.protein || 0),0);
                    return { lbl: ['日','月','火','水','木','金','土'][d.getDay()], val, isToday: ds === todayStr };
                });
                const maxV = Math.max(...days.map(d=>d.val), TARGET, 10) * 1.15;
                const xStep = cW/6;
                const pts = days.map((d, i) => ({ x: PL + i*xStep, y: PT + cH - (d.val/maxV)*cH, ...d }));
                const pathD = pts.map((p, i) => (i===0 ? 'M' : 'L') + `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
                return (
                    <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:'100%', overflow:'visible'}}>
                        {[0, TARGET/2, TARGET].map(v => {
                            const y = PT + cH - (v / maxV) * cH;
                            return (
                                <g key={v}>
                                    <line x1={PL} y1={y} x2={W-PR} y2={y} stroke={v === TARGET ? '#fbbf24' : '#475569'} strokeWidth={v === TARGET ? 2 : 1} strokeDasharray="4,4" opacity="0.3" />
                                    <text x={PL-5} y={y+3} className="mono" fontSize="8" fill="#475569" textAnchor="end">{v}</text>
                                </g>
                            );
                        })}
                        <path d={pathD} fill="none" stroke="#bef264" strokeWidth="2.5" strokeLinejoin="round" />
                        {pts.map((p, i) => (
                            <g key={i}>
                                <circle cx={p.x} cy={p.y} r={p.isToday ? 5 : 3} fill={p.val >= TARGET ? '#bef264' : p.val > 0 ? 'white' : '#475569'} />
                                <text x={p.x} y={H-5} fontSize="9" fill={p.isToday ? '#bef264' : '#475569'} textAnchor="middle">{p.lbl}</text>
                                {p.val > 0 && <text x={p.x} y={p.y - 10} fontSize="10" fill="white" className="mono" textAnchor="middle" fontWeight="900">{Math.round(p.val)}</text>}
                            </g>
                        ))}
                    </svg>
                );
            }, [meals, todayStr]);

            return (
                <div className="flex flex-col h-screen max-w-[430px] mx-auto overflow-hidden">
                    {toast && <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-[#bef264] text-black px-6 py-2 rounded-full font-black z-[999] shadow-lg animate-bounce text-[10px]">{toast}</div>}
                    
                    {tab === 'suggest' && (
                        <button className="floating-shuffle active:scale-90 transition-transform" onClick={() => setShuffleSeed(s => s + 1)}>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="3"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
                        </button>
                    )}

                    <header className="p-5 pb-2 shrink-0 text-left">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <h1 className="serif text-3xl text-[#bef264] leading-none">MEAL LOG</h1>
                                <p className="mono text-[8px] text-[#475569] tracking-widest mt-1 uppercase">v8.5.0 Strategy Restored</p>
                            </div>
                            <button onClick={fetchData} className={`w-9 h-9 bg-white/5 rounded-full border border-white/10 flex items-center justify-center text-[#bef264] ${syncing ? 'animate-spin' : ''}`}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                            </button>
                        </div>

                        <div className="bg-white/[0.02] backdrop-blur-3xl border border-white/10 p-5 rounded-2xl relative overflow-hidden text-left">
                            <div className="flex justify-between items-center mb-4 text-left">
                                <span className="mono text-[8px] text-[#475569] font-bold tracking-widest uppercase">DAILY PROTEIN FLOW</span>
                                <span className="mono text-3xl font-black text-[#f1f3f9] leading-none text-right">{totalP.toFixed(1)}<span className="text-[10px] text-[#475569] ml-1">g</span></span>
                            </div>
                            <div className="h-1 bg-white/5 rounded-full relative">
                                <div className="h-full bg-gradient-to-r from-[#bef264] to-[#84cc16] transition-all duration-1000" style={{ width: `${progress}%` }}>
                                    <div className="glow-head"></div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden px-4 flex flex-col pt-2">
                        {tab === 'log' && (
                            <div className="flex flex-col h-full animate-slide">
                                <div className="flex justify-center gap-5 items-center mb-4 shrink-0">
                                    <button onClick={() => { 
                                        const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate()-1);
                                        setSelDate(getJstDateString(d));
                                    }} className="text-[#475569] p-2 text-xl">◀</button>
                                    <div className="serif text-xl">{selDate.split('-')[1]}/{selDate.split('-')[2]}</div>
                                    <button onClick={() => { if(selDate < todayStr) { const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate()+1); setSelDate(getJstDateString(d)); } }} className={`text-[#475569] p-2 text-xl ${selDate === todayStr ? 'opacity-0' : ''}`}>▶</button>
                                </div>

                                <section className="bg-white/5 p-5 rounded-3xl mb-5 shrink-0 text-left border border-white/10">
                                    <div className="flex gap-2 mb-4 text-left">
                                        {['朝','昼','夜','他'].map(t => (
                                            <button key={t} onClick={() => setMealType(t)} className={`flex-1 py-3 rounded-xl font-black text-xs transition-all ${mealType === t ? 'bg-[#bef264] text-black shadow-lg' : 'bg-white/5 text-[#475569]'}`}>{t}</button>
                                        ))}
                                    </div>
                                    {showMorningPrompt && selDate === todayStr && mealType === '朝' && (
                                        <div className="bg-[#bef264]/10 border border-dashed border-[#bef264] rounded-2xl p-4 mb-4 text-center">
                                            <p className="text-[11px] font-bold text-[#bef264] mb-3">朝セット（23g）をレポしますか？</p>
                                            <button onClick={() => { handleSave('朝セット（プロテインと豆乳コーヒー）', 23, '朝'); setShowMorningPrompt(false); }} className="w-full bg-[#bef264] text-black py-2 rounded-xl text-[10px] font-black active:scale-95 transition-all uppercase tracking-widest">RECORD ASSETS</button>
                                        </div>
                                    )}
                                    <input value={mainMenu} onChange={e => setMainMenu(e.target.value)} placeholder="Main Menu" className="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm text-[#f1f3f9] outline-none mb-4 focus:border-[#bef264]" />
                                    <div className="mb-5">
                                        <div className="flex justify-between items-end mb-2 px-1 text-left">
                                            <span className="text-[8px] text-[#mu] font-bold tracking-widest uppercase">Strategic Weight</span>
                                            <span className="serif text-3xl text-[#bef264]">{protein.toFixed(1)}<span className="text-xs ml-1 mono">g</span></span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setProtein(p => Math.max(0, p - 0.5))} className="w-10 h-10 bg-white/5 border border-white/10 rounded-xl text-[#bef264] font-black">-</button>
                                            <input type="range" min="0" max="60" step="0.5" value={protein} onChange={e => setProtein(parseFloat(e.target.value))} className="flex-1" />
                                            <button onClick={() => setProtein(p => Math.min(60, p + 0.5))} className="w-10 h-10 bg-white/5 border border-white/10 rounded-xl text-[#bef264] font-black">+</button>
                                        </div>
                                    </div>
                                    <button onClick={() => handleSave(mainMenu, protein, mealType)} className="w-full py-4 bg-[#bef264] text-black font-black rounded-2xl shadow-xl active:scale-[0.98] transition-all uppercase tracking-widest">SYNC Discipline →</button>
                                </section>

                                <div className="flex-1 overflow-y-auto no-scrollbar pb-24 space-y-2">
                                    {filteredMeals.length === 0 ? (
                                        <div className="text-center py-10 opacity-30 text-[10px] tracking-widest uppercase">No Records Synchronized</div>
                                    ) : filteredMeals.map((m, i) => (
                                        <div key={i} className="bg-white/5 border border-white/5 p-4 rounded-2xl flex justify-between items-center text-left animate-slide">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-[8px] bg-[#bef264] text-black px-1.5 py-0.5 rounded font-black uppercase">{m.type}</span>
                                                    <span className="serif text-base">{m.main}</span>
                                                </div>
                                                <div className="text-[7px] text-[#475569] mono tracking-tighter uppercase">{m.timestamp.split(/[ T]/)[1]?.slice(0,5) || "--:--"} • JST SECURE</div>
                                            </div>
                                            <div className="serif text-xl text-[#bef264]">{m.protein.toFixed(1)}g</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'suggest' && (
                            <div className="flex flex-col h-full animate-slide">
                                <div className="flex gap-2 overflow-x-auto no-scrollbar mb-4 shrink-0">
                                    {['すべて','疲労回復','筋トレ','若返り'].map(cat => (
                                        <button key={cat} onClick={() => setEffect(cat === 'すべて' ? 'all' : cat)} className={`shrink-0 px-5 py-2.5 rounded-xl border border-white/10 font-black text-[10px] transition-all ${effect === (cat === 'すべて' ? 'all' : cat) ? 'bg-[#bef264] text-black shadow-lg' : 'bg-white/5 text-[#475569]'}`}>{cat}</button>
                                    ))}
                                </div>
                                <div className="flex-1 overflow-y-auto no-scrollbar pb-24 space-y-3">
                                    {suggestions.length === 0 ? (
                                        <div className="text-center py-10 opacity-30 text-[10px] tracking-widest uppercase">Target Achieved / No Suggests</div>
                                    ) : suggestions.map((opt, i) => (
                                        <div key={i} className="bg-white/5 p-5 rounded-3xl border border-white/5 text-left animate-slide">
                                            <div className="flex justify-between items-center mb-2">
                                                <div className="serif text-lg">{opt.main}</div>
                                                <div className="serif text-2xl text-[#bef264]">{opt.p.toFixed(1)}g</div>
                                            </div>
                                            <div className="bg-[#bef264]/5 border-l-2 border-[#bef264] p-3 rounded-r-lg text-[10px] italic mb-3 opacity-80 leading-relaxed text-[#f1f3f9]">
                                                "{STRATEGIC_REASONS[Object.keys(STRATEGIC_REASONS).find(k => opt.main.includes(k))] || '規律ある身体資産の構築へ。'}"
                                            </div>
                                            <div className="flex gap-2 flex-wrap mb-4">{(opt.tags || []).map(tag => <span key={tag} className="text-[8px] text-[#bef264] border border-[#bef264] px-2 py-0.5 rounded font-black uppercase tracking-tight">{tag}</span>)}</div>
                                            <button onClick={() => { setMainMenu(opt.main); setProtein(opt.p); setMealType('夜'); setTab('log'); }} className="w-full py-2 bg-[#bef264]/10 border border-[#bef264]/20 text-[#bef264] rounded-lg text-[10px] font-black uppercase tracking-[0.1em]">Select This Strategy</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'stats' && (
                            <div className="flex flex-col h-full animate-slide">
                                <div className="bg-white/5 p-5 rounded-3xl mb-4 shrink-0 border border-white/5">
                                    <div className="flex justify-between mono text-[9px] text-[#475569] tracking-widest mb-3 uppercase px-1"><span>7-Day Trend Analysis</span><span className="text-[#fbbf24]">Target: 120g</span></div>
                                    <div className="h-40">{chartSvg}</div>
                                </div>
                                <div className="flex-1 overflow-y-auto no-scrollbar pb-24">
                                    <p className="text-[8px] text-[#475569] font-bold tracking-widest mb-3 uppercase text-left px-1">Discipline History</p>
                                    {[0, 1, 2].map(offset => {
                                        const ds = getJstDateString(new Date(Date.now() - offset * 86400000));
                                        const dayMeals = meals.filter(m => m.dateOnly === ds);
                                        if (dayMeals.length === 0) return null;
                                        return dayMeals.map(m => (
                                            <div key={m.id} className={`bg-white/5 p-4 rounded-2xl mb-2 flex justify-between items-center text-left border border-white/5 ${m.dateOnly === todayStr ? 'opacity-100' : 'opacity-60'}`}>
                                                <div className="flex items-center gap-3">
                                                    <div className={`text-[7px] px-2 py-1 rounded font-black ${m.dateOnly === todayStr ? 'bg-[#bef264] text-black shadow-lg' : 'bg-[#475569] text-black'}`}>{m.dateOnly.split('-').slice(1).join('/')}</div>
                                                    <div className="text-sm font-bold">{m.main}</div>
                                                </div>
                                                <div className="serif text-lg text-[#bef264] text-right">{m.protein.toFixed(1)}g</div>
                                            </div>
                                        ));
                                    })}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-[430px] mx-auto h-[85px] bg-[#010206]/95 backdrop-blur-3xl border-t border-white/10 flex justify-around items-center p-4 z-[100]">
                        {[
                            { id: 'log', lbl: 'LOG', icon: 'M9 11l3 3L22 4 M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11' },
                            { id: 'suggest', lbl: 'STRATEGY', icon: 'M12 2a7 7 0 0 1 7 7c0 2.5-1.3 4.7-3.3 6l-.7 4H9l-.7-4A7 7 0 0 1 5 9a7 7 0 0 1 7-7z' },
                            { id: 'stats', lbl: 'ANALYSIS', icon: 'M22 12h-4l-3 9L9 3l-3 9H2' }
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 flex flex-col items-center gap-1.5 transition-all duration-300 px-6 ${tab === t.id ? 'text-[#bef264]' : 'text-[#475569] hover:text-[#f1f3f9]'}`}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={t.icon} /></svg>
                                <span className="mono text-[8px] font-black">{t.lbl}</span>
                                {tab === t.id && <div className="w-1.5 h-1.5 bg-[#bef264] rounded-full shadow-[0_0_12px_#bef264] mt-1" />}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
