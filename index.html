<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Meal Log v3.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; /* slate-950 */
            -webkit-tap-highlight-color: transparent;
        }
        .protein-gauge { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .safe-area-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 1rem); }
        ::-webkit-scrollbar { display: none; }
        .tab-active { color: #10b981; border-bottom: 2px solid #10b981; }
        .tab-inactive { color: #64748b; }
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-slate-200 antialiased">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-950 relative">
        
        <!-- Header -->
        <header class="bg-slate-900/80 backdrop-blur-md p-5 pb-4 sticky top-0 z-50 border-b border-slate-800">
            <div id="sync-status" class="absolute top-1 left-0 right-0 flex justify-center pointer-events-none"></div>
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-emerald-400">MEAL LOG</h1>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest">Standard Edition v3.8</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="testConnection()" class="p-2 bg-slate-800 rounded-lg text-slate-400 active:bg-slate-700">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <div class="p-2 bg-slate-800 rounded-lg text-emerald-500">
                        <i data-lucide="shield-check" class="w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-end">
                    <span class="text-xs font-semibold text-slate-500 uppercase">Protein Progress</span>
                    <span class="text-xl font-bold text-white" id="current-p">0<span class="text-xs text-slate-500 font-normal ml-1">/ 120g</span></span>
                </div>
                <div class="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div id="p-bar" class="protein-gauge h-full bg-emerald-500" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-scroll" class="flex-1 p-5 space-y-6 pb-24 overflow-y-auto">
            
            <!-- View: Record -->
            <div id="view-record" class="space-y-6 animate-in fade-in duration-300">
                <button onclick="recordQuickBreakfast()" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl flex items-center justify-between active:scale-95 transition-all">
                    <div class="flex items-center space-x-4">
                        <div class="bg-emerald-500/10 p-2 rounded-lg text-emerald-400"><i data-lucide="coffee" class="w-5 h-5"></i></div>
                        <div class="text-left">
                            <p class="font-bold text-slate-200">朝セットを記録</p>
                            <p class="text-xs text-slate-500">30g Protein</p>
                        </div>
                    </div>
                    <i data-lucide="plus" class="text-slate-600 w-5 h-5"></i>
                </button>

                <section id="form-container" class="bg-slate-900/50 border border-slate-800 rounded-2xl p-5 space-y-5 shadow-sm">
                    <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
                        <button onclick="setType('朝')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-600">朝</button>
                        <button onclick="setType('昼')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-emerald-600 text-white">昼</button>
                        <button onclick="setType('夜')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-600">夜</button>
                        <button onclick="setType('他')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-600">他</button>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="main-menu" placeholder="主菜（タンパク源）" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-base text-slate-100 focus:border-emerald-500 outline-none placeholder-slate-700">
                        <input type="text" id="side-menu" placeholder="副菜" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 focus:border-emerald-500 outline-none placeholder-slate-700">
                    </div>
                    <div class="bg-slate-950 p-4 rounded-xl border border-slate-800">
                        <div class="flex justify-between items-center mb-2 px-1">
                            <span class="text-[10px] font-bold text-slate-500 uppercase">Protein (g)</span>
                            <span class="text-xl font-bold text-emerald-400" id="protein-val">25g</span>
                        </div>
                        <input type="range" id="protein-slider" min="0" max="80" step="5" value="25" oninput="updateProteinLabel(this.value)" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                    </div>
                    <button onclick="saveMeal()" id="save-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3.5 rounded-xl font-bold text-sm tracking-wide active:scale-95 transition-all">レポを同期保存</button>
                </section>

                <div id="log-list" class="space-y-3"></div>
            </div>

            <!-- View: Suggest -->
            <div id="view-suggest" class="hidden space-y-4 animate-in slide-in-from-right-4 duration-300">
                <p id="suggest-status" class="text-xs text-slate-500 text-center py-2 italic"></p>
                <div id="suggest-loading" class="space-y-3 hidden">
                    <div class="h-32 bg-slate-900 rounded-2xl loading-shimmer opacity-20"></div>
                    <div class="h-32 bg-slate-900 rounded-2xl loading-shimmer opacity-20"></div>
                </div>
                <div id="suggest-list" class="space-y-3"></div>
            </div>
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/90 backdrop-blur-md border-t border-slate-800 flex justify-around p-3 safe-area-bottom">
            <button onclick="switchView('record')" id="tab-record" class="flex-1 py-2 flex flex-col items-center tab-active">
                <i data-lucide="clipboard-list" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold mt-1">LOG</span>
            </button>
            <button onclick="switchView('suggest')" id="tab-suggest" class="flex-1 py-2 flex flex-col items-center tab-inactive">
                <i data-lucide="sparkles" class="w-5 h-5"></i>
                <span class="text-[9px] font-bold mt-1">SUGGEST</span>
            </button>
        </nav>
    </div>

    <script>
        // --- 重要: GitHub Pagesで動かすには、ここにキーを入れてください ---
        const apiKey = "AIzaSyADcnf-eWqcsExrjE5knDJMvWEISV9E7WI"; 
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec";

        let state = { currentType: '昼', meals: [], targetProtein: 120, editingId: null, activeView: 'record' };

        function init() {
            lucide.createIcons();
            const saved = localStorage.getItem('nimo_today_meals');
            if (saved && localStorage.getItem('nimo_last_save_date') === new Date().toDateString()) state.meals = JSON.parse(saved);
            updateUI();
        }

        function switchView(view) {
            state.activeView = view;
            document.getElementById('view-record').classList.toggle('hidden', view !== 'record');
            document.getElementById('view-suggest').classList.toggle('hidden', view !== 'suggest');
            const tabs = { record: document.getElementById('tab-record'), suggest: document.getElementById('tab-suggest') };
            tabs.record.className = view === 'record' ? 'flex-1 py-2 flex flex-col items-center tab-active' : 'flex-1 py-2 flex flex-col items-center tab-inactive';
            tabs.suggest.className = view === 'suggest' ? 'flex-1 py-2 flex flex-col items-center tab-active' : 'flex-1 py-2 flex flex-col items-center tab-inactive';
            if (view === 'suggest') generateGeminiSuggestions();
            lucide.createIcons();
        }

        async function generateGeminiSuggestions() {
            const list = document.getElementById('suggest-list');
            const loading = document.getElementById('suggest-loading');
            const status = document.getElementById('suggest-status');
            list.innerHTML = ""; loading.classList.remove('hidden'); status.innerText = "履歴と摂取状況を分析中...";

            const currentP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            const gap = state.targetProtein - currentP;

            if (gap <= 0) { loading.classList.add('hidden'); status.innerText = "目標達成です！"; return; }
            if (!apiKey && typeof __app_id === 'undefined') {
                loading.classList.add('hidden');
                status.innerHTML = `<span class="text-red-400 font-bold">API KEY REQUIRED</span><br><span class="text-[10px]">ソース142行目のapiKeyに設定が必要です。</span>`;
                return;
            }

            try {
                const historyResp = await fetch(GAS_URL);
                const history = await historyResp.json();
                const systemPrompt = `管理栄養士として提案せよ。今日の不足分は ${gap}g。
                【制約】履歴[${history.slice(-10).map(h=>h.main).join(",")}]および今日[${state.meals.map(m=>m.main).join(",")}]との重複禁止。
                日曜夜のため持続性タンパク質推奨。JSON配列のみ。構造:[{"tag":"A案","main":"主菜","side":"副菜","p":数値,"desc":"解説"}]`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey || ""}`;
                const resp = await fetch(url, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ contents:[{parts:[{text:`残り${gap}gを埋める最適解3案`}]}], systemInstruction:{parts:[{text:systemPrompt}]} }) });
                if (!resp.ok) throw new Error(resp.status);
                const res = await resp.json();
                const options = JSON.parse(res.candidates[0].content.parts[0].text.match(/\[[\s\S]*\]/)[0]);
                loading.classList.add('hidden'); status.innerText = `残り ${gap}g を補完する最適解`;
                list.innerHTML = options.map(opt => `
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-sm">
                        <div class="flex justify-between items-center mb-2"><span class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider">${opt.tag}</span><span class="text-base font-bold text-emerald-400">+${opt.p}g P</span></div>
                        <h3 class="text-white font-bold text-lg mb-1">${opt.main}</h3>
                        <p class="text-slate-400 text-xs flex items-center mb-3"><i data-lucide="info" class="w-3.5 h-3.5 mr-1.5"></i> ${opt.side}</p>
                        <p class="text-slate-500 text-[10px] leading-relaxed italic border-t border-slate-800 pt-2">${opt.desc}</p>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { loading.classList.add('hidden'); status.innerText = "生成失敗。APIキーと接続を確認してください。"; }
        }

        function updateProteinLabel(val) { document.getElementById('protein-val').innerText = val + 'g'; }
        async function saveMeal() {
            const main = document.getElementById('main-menu').value;
            const side = document.getElementById('side-menu').value;
            const p = parseInt(document.getElementById('protein-slider').value);
            if (!main) return;
            const meal = { id: Date.now(), type: state.currentType, main, side: side || '-', protein: p, time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) };
            state.meals.unshift(meal); updateUI(); resetForm();
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            try { await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(meal) }); } catch(e) {}
        }

        function recordQuickBreakfast() {
            const b = { id: Date.now(), type: '朝', main: '朝セット', side: 'プロテイン・コーヒー他', protein: 30, time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) };
            state.meals.unshift(b); updateUI();
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(b) });
        }

        function updateUI() {
            const totalP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            document.getElementById('current-p').innerHTML = `${totalP}<span class="text-xs text-slate-500 font-normal ml-1">/ 120g</span>`;
            document.getElementById('p-bar').style.width = Math.min((totalP / 120) * 100, 100) + '%';
            document.getElementById('log-list').innerHTML = state.meals.map(m => `
                <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-xl flex items-center justify-between">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-slate-800 rounded-lg flex items-center justify-center text-[10px] font-bold text-slate-500 uppercase">${m.type}</div>
                        <div><p class="font-bold text-white text-base">${m.main}</p><p class="text-xs text-slate-500">${m.side}</p></div>
                    </div>
                    <div class="text-right"><span class="font-bold text-emerald-400">+${m.protein}g</span><p class="text-[9px] text-slate-600">${m.time}</p></div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function resetForm() { document.getElementById('main-menu').value = ''; document.getElementById('side-menu').value = ''; }
        window.onload = init;
    </script>
</body>
</html>
