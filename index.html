<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Meal Log">
    <title>Meal Log v4.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #020617; /* slate-950 */
        }
        .protein-gauge { transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .safe-area-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem); }
        input, button { outline: none !important; }
        .status-pill { animation: fadeIn 0.3s ease-out; z-index: 100; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .edit-mode { border: 2px solid #10b981 !important; background-color: #064e3b !important; }
        ::-webkit-scrollbar { display: none; }
        .tab-active { color: #10b981; }
        .tab-inactive { color: #64748b; }
        .loading-shimmer {
            background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-slate-100 antialiased overflow-x-hidden">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-950 relative shadow-2xl">
        
        <!-- Header -->
        <header class="bg-slate-900/90 backdrop-blur-xl text-white p-4 pb-2 rounded-b-[2rem] border-b border-slate-800 sticky top-0 z-50">
            <div id="sync-status" class="absolute top-1 left-0 right-0 flex justify-center pointer-events-none text-center"></div>
            
            <div class="flex justify-between items-center mb-1">
                <div>
                    <h1 class="text-xl font-black tracking-tighter text-emerald-400">MEAL LOG</h1>
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest leading-none text-emerald-600/50">Custom Menu v4.6</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="testConnection()" class="bg-slate-800 p-2 rounded-xl border border-slate-700 active:scale-95 transition-all text-slate-400">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    </button>
                    <div class="bg-slate-800 p-2 rounded-xl border border-slate-700">
                        <i data-lucide="database" class="text-emerald-400 w-4 h-4"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-1 pb-1">
                <div class="flex justify-between items-end">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Protein Goal</span>
                    <span class="text-xl font-black text-white" id="current-p">0<span class="text-xs text-slate-600 font-normal ml-1">/ 120g</span></span>
                </div>
                <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden border border-slate-800">
                    <div id="p-bar" class="protein-gauge h-full bg-emerald-500 shadow-[0_0_15px_rgba(16,185,129,0.5)]" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-scroll" class="flex-1 p-4 space-y-5 pb-32 overflow-y-auto">
            
            <!-- View: Record -->
            <div id="view-record" class="space-y-5 animate-in fade-in duration-300">
                <button onclick="recordQuickBreakfast()" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-3xl flex items-center justify-between active:scale-95 transition-all shadow-lg">
                    <div class="flex items-center space-x-3">
                        <div class="bg-emerald-500/10 p-2 rounded-xl text-emerald-400"><i data-lucide="zap" class="w-6 h-6"></i></div>
                        <div class="text-left">
                            <p class="text-base font-bold text-slate-100 tracking-tight">朝セットを記録</p>
                            <p class="text-xs text-slate-500 mt-0.5">マカ・プロテイン・コーヒー・納豆 (45g P)</p>
                        </div>
                    </div>
                    <i data-lucide="chevron-right" class="text-slate-600 w-5 h-5"></i>
                </button>

                <section id="form-container" class="bg-slate-900/40 border border-slate-800 rounded-[2rem] p-5 shadow-2xl transition-all duration-300">
                    <div class="flex justify-between items-center mb-4 px-1">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="plus-circle" class="text-emerald-500 w-4 h-4"></i>
                            <h2 id="form-title" class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Meal Entry</h2>
                        </div>
                        <button id="cancel-edit" onclick="cancelEdit()" class="text-[10px] font-bold text-red-400 bg-red-900/20 border border-red-900/30 px-3 py-1 rounded-full hidden">キャンセル</button>
                    </div>

                    <div class="space-y-4">
                        <div class="flex bg-slate-950 p-1 rounded-xl border border-slate-800">
                            <button onclick="setType('朝')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-600">朝</button>
                            <button onclick="setType('昼')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all bg-emerald-600 text-white shadow-lg">昼</button>
                            <button onclick="setType('夜')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-600">夜</button>
                            <button onclick="setType('他')" class="type-btn flex-1 py-2 text-xs font-bold rounded-lg transition-all text-slate-600">他</button>
                        </div>
                        <div class="space-y-3">
                            <input type="text" id="main-menu" placeholder="主菜 (タンパク源)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-lg font-bold text-slate-100 focus:ring-1 focus:ring-emerald-500/50 outline-none placeholder-slate-700">
                            <input type="text" id="side-menu" placeholder="副菜" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 focus:ring-1 focus:ring-emerald-500/50 outline-none placeholder-slate-700">
                        </div>
                        <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 space-y-2 text-center">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Protein</span>
                                <span class="text-3xl font-black text-emerald-400" id="protein-val">25g</span>
                            </div>
                            <input type="range" id="protein-slider" min="0" max="110" step="0.1" value="25" oninput="updateProteinLabel(this.value)" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500">
                        </div>
                        <button id="save-btn" onclick="saveMeal()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black text-base tracking-widest shadow-lg active:scale-95 transition-all">レポを保存</button>
                    </div>
                </section>
                <div id="log-list" class="space-y-3"></div>
            </div>

            <!-- View: Suggest -->
            <div id="view-suggest" class="hidden space-y-4 animate-in slide-in-from-right-8 duration-300">
                <div class="bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-2xl">
                    <p class="text-[10px] text-emerald-400 text-center font-bold tracking-tight" id="suggest-status">分析中...</p>
                </div>
                <div id="suggest-loading" class="space-y-4 hidden">
                    <div class="h-32 bg-slate-900 rounded-[2rem] loading-shimmer opacity-30"></div>
                    <div class="h-32 bg-slate-900 rounded-[2rem] loading-shimmer opacity-30"></div>
                </div>
                <div id="suggest-list" class="space-y-3"></div>
            </div>
        </main>

        <!-- Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-900/95 backdrop-blur-xl border-t border-slate-800 flex justify-around p-3 safe-area-bottom shadow-2xl">
            <button onclick="switchView('record')" id="tab-record" class="flex flex-col items-center tab-active transition-all">
                <i data-lucide="list-checks" class="w-6 h-6"></i>
                <span class="text-[8px] font-black mt-1 uppercase tracking-wider">Log</span>
            </button>
            <button onclick="switchView('suggest')" id="tab-suggest" class="flex flex-col items-center tab-inactive transition-all">
                <i data-lucide="sparkles" class="w-6 h-6"></i>
                <span class="text-[8px] font-black mt-1 uppercase tracking-wider">Suggest</span>
            </button>
        </nav>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzTNomNmTj1aMq1xZc1gS_hOtq6A6Em-eiLI2bQpcXN3uZ9Y1zWY88KDrg055QdnyyhtA/exec";

        let state = { currentType: '昼', meals: [], targetProtein: 120, editingId: null, activeView: 'record', sheetHistory: [] };

        function init() {
            lucide.createIcons();
            const saved = localStorage.getItem('nimo_today_meals');
            if (saved && localStorage.getItem('nimo_last_save_date') === new Date().toDateString()) state.meals = JSON.parse(saved);
            updateUI();
        }

        function switchView(view) {
            state.activeView = view;
            document.getElementById('view-record').classList.toggle('hidden', view !== 'record');
            document.getElementById('view-suggest').classList.toggle('hidden', view !== 'suggest');
            document.getElementById('tab-record').classList.replace(view === 'record' ? 'tab-inactive' : 'tab-active', view === 'record' ? 'tab-active' : 'tab-inactive');
            document.getElementById('tab-suggest').classList.replace(view === 'suggest' ? 'tab-inactive' : 'tab-active', view === 'suggest' ? 'tab-active' : 'tab-inactive');
            if (view === 'suggest') generateAnalysisSuggestions();
            lucide.createIcons();
        }

        async function fetchHistoryFromSheet() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) return [];
                const data = await response.json();
                state.sheetHistory = Array.isArray(data) ? data : [];
                return state.sheetHistory;
            } catch(e) { return []; }
        }

        async function generateAnalysisSuggestions() {
            const list = document.getElementById('suggest-list');
            const loading = document.getElementById('suggest-loading');
            const status = document.getElementById('suggest-status');
            
            list.innerHTML = ""; loading.classList.remove('hidden'); status.innerText = "シート履歴を分析中...";

            const currentP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            const gap = state.targetProtein - currentP;

            if (gap <= 0) {
                loading.classList.add('hidden');
                status.innerText = "目標タンパク質達成済みです！完璧な規律ですね。";
                list.innerHTML = '<div class="p-8 text-center text-emerald-400 font-bold italic text-lg">Perfect Goal Reached!</div>';
                return;
            }

            const history = await fetchHistoryFromSheet();
            loading.classList.add('hidden');
            status.innerText = `残り ${gap.toFixed(1)}g を補完。履歴に基づき最適案を抽出。`;

            const recentMains = history.slice(-25).map(h => h.main.toLowerCase());

            // --- ニモさん専用: 拡張・統合推奨プール (全45種) ---
            const menuPool = [
                { main: "ジンギスカン", side: "焼き野菜（もやし・玉ねぎ）", p: 100, keywords: ["羊", "ジンギスカン", "食べ放題", "ラム", "精力"] },
                { main: "ザクチキ・白身魚の南蛮漬け", side: "ナムル・アボカドサラダ・五穀米", p: 52, keywords: ["鶏", "揚げ物", "白身魚", "コンビニ"] },
                { main: "鮭の塩焼き・豚の生姜炒め", side: "ハムサラダ・五穀米・味噌汁", p: 48, keywords: ["鮭", "豚", "ハム", "魚肉W"] },
                { main: "豚生姜焼き・目玉焼き・春巻き", side: "サラダ・ご飯・味噌汁", p: 41, keywords: ["豚", "卵", "春巻き", "定食"] },
                { main: "牛肉ステーキ", side: "ブロッコリーサラダ", p: 40, keywords: ["牛", "ステーキ", "赤身", "筋トレ", "鉄分"] },
                { main: "チキンステーキ", side: "野菜スティック・アボカド・五穀米", p: 40, keywords: ["鶏", "ステーキ", "アボカド"] },
                { main: "ささみ・エビチリごはん", side: "きゅうりの漬物", p: 39, keywords: ["ささみ", "海老", "中華"] },
                { main: "鶏むね肉の低温調理", side: "ブロッコリースプラウト", p: 35, keywords: ["鶏", "むね肉", "筋トレ", "抗酸化"] },
                { main: "手巻き寿司", side: "海苔・酢飯・卵", p: 35, keywords: ["魚", "刺身", "家族", "海鮮"] },
                { main: "鹿肉（ジビエ）ステーキ", side: "舞茸のソテー", p: 34, keywords: ["鹿", "ジビエ", "鉄分", "超低脂質"] },
                { main: "ラムチョップ香草焼き", side: "焼きトマト・ズッキーニ", p: 32, keywords: ["羊", "ラム", "亜鉛", "燃焼"] },
                { main: "チキンカレー", side: "ごはん・ルイボスティー", p: 32, keywords: ["鶏", "カレー"] },
                { main: "厚揚げと鶏肉の煮物", side: "小松菜", p: 32, keywords: ["鶏", "豆腐"] },
                { main: "豚ヒレ肉のピカタ", side: "粉チーズ・パセリ添え", p: 31, keywords: ["豚", "ヒレ", "ビタミンB"] },
                { main: "赤身牛のローストビーフ", side: "クレソン・ホースラディッシュ", p: 30, keywords: ["牛", "赤身", "鉄分"] },
                { main: "刺身盛り合わせ", side: "ほうれん草お浸し", p: 30, keywords: ["魚", "刺身", "アンチエイジング"] },
                { main: "豆乳鍋（鶏肉・団子）", side: "春菊・しいたけ", p: 30, keywords: ["鶏", "鍋", "温活"] },
                { main: "生カツオのたたき", side: "玉ねぎスライス・ポン酢", p: 28.5, keywords: ["魚", "カツオ", "血流改善"] },
                { main: "サーモンステーキ", side: "アスパラガスのグリル", p: 28, keywords: ["サーモン", "アスタキサンチン", "Tie2"] },
                { main: "レバニラ炒め", side: "キクラゲと卵の炒め物", p: 28, keywords: ["レバー", "豚", "造血", "デトックス"] },
                { main: "茹で鶏のバンバンジー", side: "クラゲと胡瓜の酢の物", p: 28, keywords: ["鶏", "疲労回復"] },
                { main: "ネギトロ丼", side: "納豆・めかぶ", p: 28, keywords: ["マグロ", "血管ケア", "ネバネバ"] },
                { main: "カジキマグロのソテー", side: "ピーマンのジャコ炒め", p: 27, keywords: ["魚", "カジキ"] },
                { main: "鶏天（むね肉）", side: "卸しポン酢・大葉", p: 27, keywords: ["鶏", "むね肉", "抗疲労"] },
                { main: "茹で豚の冷しゃぶ", side: "叩ききゅうり（梅肉和え）", p: 26, keywords: ["豚", "疲労回復", "クエン酸"] },
                { main: "真鯛のアクアパッツァ", side: "あさりとドライトマト", p: 26, keywords: ["真鯛", "魚", "タウリン"] },
                { main: "ブリの照り焼き", side: "叩き長いも", p: 26, keywords: ["ブリ", "魚", "DHA", "滋養強壮"] },
                { main: "サケのホイル焼き", side: "きのこ類・レモン", p: 26, keywords: ["サケ", "ビタミンD", "免疫"] },
                { main: "スペアリブ（脂身除去）", side: "グリルポテト（少量）", p: 26, keywords: ["豚", "スペアリブ", "バルクアップ"] },
                { main: "うなぎの白焼き", side: "肝吸い・わさび", p: 25, keywords: ["うなぎ", "スタミナ", "精力"] },
                { main: "厚揚げの肉巻き", side: "オクラの胡麻和え", p: 25, keywords: ["厚揚げ", "豚", "食物繊維"] },
                { main: "マグロの山かけ", side: "刻み海苔・わさび", p: 25, keywords: ["マグロ", "血流改善"] },
                { main: "豚キムチ", side: "アボカドトマトサラダ", p: 25, keywords: ["豚", "キムチ", "発酵"] },
                { main: "寒サバの塩焼き", side: "大根おろし・なめこ汁", p: 24, keywords: ["サバ", "魚", "血管掃除"] },
                { main: "イカの刺身", side: "納豆・めかぶ和え", p: 24, keywords: ["イカ", "タウリン", "血流"] },
                { main: "エビのチリソース", side: "卵とレタスのスープ", p: 24, keywords: ["海老", "タウリン", "代謝"] },
                { main: "サワラの西京焼き", side: "小松菜のお浸し", p: 24, keywords: ["サワラ", "魚", "カルシウム"] },
                { main: "金目鯛の煮付け", side: "ゴボウのきんぴら", p: 23, keywords: ["金目鯛", "魚", "美肌"] },
                { main: "ゴーヤチャンプルー", side: "島豆腐・削り節", p: 23, keywords: ["豚", "ゴーヤ", "血糖値"] },
                { main: "蒸し牡蠣（レモン搾り）", side: "ほうれん草のソテー", p: 22, keywords: ["牡蠣", "亜鉛", "テストステロン"] },
                { main: "鶏レバーの甘辛煮", side: "ピーマンの素焼き", p: 22, keywords: ["レバー", "鶏", "粘膜保護"] },
                { main: "秋刀魚の塩焼き", side: "きのこたっぷり味噌汁", p: 22, keywords: ["サンマ", "魚", "オメガ3"] },
                { main: "銀だらの西京焼き", side: "具沢山けんちん汁", p: 21, keywords: ["魚", "発酵"] },
                { main: "サバ味噌煮缶", side: "雑穀米・生姜漬", p: 20.9, keywords: ["サバ", "魚", "Tie2", "時短"] },
                { main: "牛丼", side: "生野菜サラダ・味噌汁", p: 20.2, keywords: ["牛", "外食"] },
                { main: "いわし団子汁", side: "根菜たっぷり煮物", p: 20, keywords: ["いわし", "魚", "血管年齢"] }
            ];

            let filteredMenu = menuPool.filter(menu => {
                const lowerMain = menu.main.toLowerCase();
                return !recentMains.some(recent => lowerMain.includes(recent) || menu.keywords.some(k => recent.includes(k.toLowerCase())));
            });

            if (filteredMenu.length < 3) filteredMenu = menuPool;
            
            filteredMenu.sort((a, b) => {
                if (gap >= 80) return b.p - a.p;
                return Math.abs(gap - b.p) - Math.abs(gap - a.p);
            });

            const finalOptions = [
                { tag: "A案: 戦略的補完", ...filteredMenu[0], desc: "不足分を最短で埋めるための高効率案。INTJ-Aの合理性を追求した選択肢です。" },
                { tag: "B案: 履歴重複回避", ...filteredMenu[1], desc: "直近の食材を避けたリスク分散案。多角的な栄養摂取を狙います。" },
                { tag: "C案: コンディション維持", ...filteredMenu[2], desc: "身体のケアを優先した機能性重視案。明日の営業パフォーマンスを支えます。" }
            ];

            list.innerHTML = finalOptions.map(opt => `
                <div class="bg-slate-900 border border-slate-800 p-4 rounded-[1.5rem] shadow-2xl space-y-2 animate-in slide-in-from-bottom-2">
                    <div class="flex justify-between items-center">
                        <span class="text-[8px] font-black text-emerald-500 uppercase tracking-widest">${opt.tag}</span>
                        <span class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-lg text-lg font-black">+${opt.p}g P</span>
                    </div>
                    <h3 class="text-white font-bold text-lg leading-tight">${opt.main}</h3>
                    <p class="text-slate-400 text-xs flex items-center"><i data-lucide="info" class="w-3 h-3 mr-1 text-emerald-600"></i> ${opt.side}</p>
                    <p class="text-slate-500 text-[10px] italic border-t border-slate-800 pt-2 opacity-80">${opt.desc}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateProteinLabel(val) { document.getElementById('protein-val').innerText = parseFloat(val).toFixed(1) + 'g'; }
        
        async function saveMeal() {
            const main = document.getElementById('main-menu').value;
            const side = document.getElementById('side-menu').value;
            const p = parseFloat(document.getElementById('protein-slider').value);
            if (!main) return;

            const meal = { 
                id: state.editingId || Date.now(), 
                type: state.currentType, 
                main, 
                side: side || '-', 
                protein: p, 
                time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) 
            };

            if (state.editingId) {
                const idx = state.meals.findIndex(m => m.id === state.editingId);
                state.meals[idx] = meal;
                state.editingId = null;
            } else {
                state.meals.unshift(meal);
            }

            updateUI(); resetForm();
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            
            try { 
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(meal) }); 
                showStatus("同期完了");
            } catch(e) { showStatus("同期失敗", true); }
        }

        function recordQuickBreakfast() {
            const b = { id: Date.now(), type: '朝', main: '朝セット（納豆込み）', side: 'マカ・プロテイン・コーヒー', protein: 45, time: new Date().toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'}) };
            state.meals.unshift(b); updateUI();
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
            localStorage.setItem('nimo_last_save_date', new Date().toDateString());
            fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(b) });
        }

        function editMeal(id) {
            const meal = state.meals.find(m => m.id === id);
            if (!meal) return;
            state.editingId = id;
            document.getElementById('main-menu').value = meal.main;
            document.getElementById('side-menu').value = meal.side;
            document.getElementById('protein-slider').value = meal.protein;
            updateProteinLabel(meal.protein);
            setType(meal.type);
            document.getElementById('form-container').classList.add('edit-mode');
            document.getElementById('form-title').innerText = "Edit Entry";
            document.getElementById('cancel-edit').classList.remove('hidden');
            document.getElementById('main-scroll').scrollTop = 0;
        }

        function deleteMeal(id) {
            if (!confirm("このレポを削除しますか？")) return;
            state.meals = state.meals.filter(m => m.id !== id);
            updateUI();
            localStorage.setItem('nimo_today_meals', JSON.stringify(state.meals));
        }

        function cancelEdit() {
            state.editingId = null; resetForm();
            document.getElementById('form-container').classList.remove('edit-mode');
            document.getElementById('form-title').innerText = "Meal Entry";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        function updateUI() {
            const totalP = state.meals.reduce((sum, m) => sum + m.protein, 0);
            document.getElementById('current-p').innerHTML = `${totalP.toFixed(1)}<span class="text-sm text-slate-600 font-normal ml-1">/ 120g</span>`;
            document.getElementById('p-bar').style.width = Math.min((totalP / 120) * 100, 100) + '%';
            document.getElementById('log-list').innerHTML = state.meals.map(m => `
                <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex items-center justify-between shadow-lg">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center text-[10px] font-black text-slate-500 uppercase border border-slate-700">${m.type}</div>
                        <div>
                            <p class="text-base font-bold text-white tracking-tight">${m.main}</p>
                            <p class="text-[10px] text-slate-500">${m.side} • ${m.time}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-3">
                        <div class="text-right"><span class="text-lg font-black text-emerald-400">+${parseFloat(m.protein).toFixed(1)}g</span></div>
                        <div class="flex flex-col space-y-2 border-l border-slate-800 pl-3">
                            <button onclick="editMeal(${m.id})" class="text-slate-600 hover:text-emerald-400"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                            <button onclick="deleteMeal(${m.id})" class="text-slate-600 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setType(type) {
            state.currentType = type;
            const btns = document.querySelectorAll('.type-btn');
            btns.forEach(b => {
                const isActive = b.innerText === type;
                b.classList.toggle('bg-emerald-600', isActive);
                b.classList.toggle('text-white', isActive);
                b.classList.toggle('text-slate-600', !isActive);
            });
        }

        function showStatus(msg, isError = false) {
            const status = document.getElementById('sync-status');
            const pill = document.createElement('div');
            pill.className = `status-pill ${isError ? 'bg-red-500' : 'bg-emerald-500'} text-white px-4 py-1 rounded-full text-[10px] font-black`;
            pill.innerText = msg;
            status.innerHTML = ''; status.appendChild(pill);
            setTimeout(() => pill.remove(), 2000);
        }

        function testConnection() { showStatus("CONNECTION CHECK: OK"); }
        function resetForm() { 
            document.getElementById('main-menu').value = ''; document.getElementById('side-menu').value = ''; 
            document.getElementById('protein-slider').value = 25; updateProteinLabel(25); setType('昼');
        }
        window.onload = init;
    </script>
</body>
</html>
